name: 🗄️ Daily Supabase Data Backup

on:
  schedule:
    # كل يوم الساعة 12:00 منتصف الليل بتوقيت السعودية (UTC+3) = 21:00 UTC
    - cron: '0 21 * * *'
  workflow_dispatch: # تشغيل يدوي عند الحاجة

jobs:
  backup:
    runs-on: ubuntu-latest
    name: Auto-discover & Backup All Supabase Tables
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create smart backup script
        run: |
          cat > backup.js << 'SCRIPT'
          const https = require('https');
          const fs = require('fs');
          const path = require('path');

          const SUPABASE_URL = process.env.SUPABASE_URL;
          const SUPABASE_KEY = process.env.SUPABASE_ANON_KEY;

          // دالة مساعدة لطلبات HTTPS
          function httpsGet(urlStr, headers = {}) {
            return new Promise((resolve, reject) => {
              const url = new URL(urlStr);
              const options = {
                hostname: url.hostname,
                path: url.pathname + url.search,
                method: 'GET',
                headers: {
                  'apikey': SUPABASE_KEY,
                  'Authorization': `Bearer ${SUPABASE_KEY}`,
                  'Content-Type': 'application/json',
                  ...headers
                }
              };
              const req = https.request(options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try { resolve({ status: res.statusCode, data: JSON.parse(data) }); }
                  catch (e) { resolve({ status: res.statusCode, data: null, raw: data }); }
                });
              });
              req.on('error', reject);
              req.end();
            });
          }

          // ===== اكتشاف كل الجداول تلقائياً =====
          async function discoverAllTables() {
            console.log('🔍 اكتشاف الجداول تلقائياً من Supabase...');

            // الطريقة 1: استعلام information_schema عبر PostgREST
            try {
              const res = await httpsGet(
                `${SUPABASE_URL}/rest/v1/information_schema.tables?select=table_name&table_schema=eq.public&table_type=eq.BASE%20TABLE`
              );
              if (res.status === 200 && Array.isArray(res.data) && res.data.length > 0) {
                const tables = res.data.map(r => r.table_name).filter(t => !t.startsWith('_'));
                console.log(`✅ الطريقة 1 نجحت: ${tables.length} جدول`);
                return tables;
              }
            } catch (e) {}

            // الطريقة 2: استخدام OpenAPI schema من Supabase
            try {
              const res = await httpsGet(`${SUPABASE_URL}/rest/v1/`);
              if (res.status === 200 && res.data && res.data.definitions) {
                const tables = Object.keys(res.data.definitions).filter(t => !t.startsWith('_'));
                console.log(`✅ الطريقة 2 (OpenAPI) نجحت: ${tables.length} جدول`);
                return tables;
              }
            } catch (e) {}

            // الطريقة 3: فحص الجداول المعروفة + أي جداول إضافية محتملة
            console.log('⚠️  الطرق التلقائية لم تنجح، استخدام الفحص الشامل...');
            const candidates = [
              'tasks', 'brands', 'projects', 'personal_tasks',
              'expenses', 'biz_expenses', 'employees', 'decisions',
              'events', 'archive', 'finance_notes', 'weekly_focus',
              'salla_orders', 'daily_tasks', 'notes', 'contacts',
              'products', 'orders', 'invoices', 'categories',
              'tags', 'attachments', 'comments', 'notifications',
              'settings', 'users', 'profiles', 'logs', 'metrics',
              'goals', 'habits', 'journal', 'ideas', 'reminders',
              'clients', 'vendors', 'inventory', 'reports', 'documents'
            ];

            const found = [];
            for (const table of candidates) {
              const res = await httpsGet(
                `${SUPABASE_URL}/rest/v1/${table}?select=count&limit=1`,
                { 'Prefer': 'count=exact' }
              );
              if (res.status !== 404 && res.status !== 400) {
                found.push(table);
              }
            }
            console.log(`✅ الطريقة 3 (فحص شامل) نجحت: ${found.length} جدول`);
            return found;
          }

          // ===== جلب بيانات جدول كامل مع pagination =====
          async function fetchAllRows(table) {
            const pageSize = 1000;
            let allRows = [];
            let offset = 0;

            while (true) {
              const res = await httpsGet(
                `${SUPABASE_URL}/rest/v1/${table}?select=*&limit=${pageSize}&offset=${offset}`
              );

              if (res.status !== 200 || !Array.isArray(res.data)) break;
              allRows = allRows.concat(res.data);
              if (res.data.length < pageSize) break;
              offset += pageSize;
            }

            return allRows;
          }

          // ===== الدالة الرئيسية =====
          async function main() {
            const date = new Date().toISOString().split('T')[0];
            const backupDir = path.join('backups', date);
            fs.mkdirSync(backupDir, { recursive: true });

            console.log(`\n📦 بدء النسخة الاحتياطية الذكية ليوم: ${date}`);
            console.log('='.repeat(50));

            // اكتشاف الجداول
            const tables = await discoverAllTables();
            console.log(`\n📋 الجداول المكتشفة (${tables.length}): ${tables.join(', ')}\n`);

            // نسخ كل جدول
            const summary = {
              backup_date: date,
              backup_time: new Date().toISOString(),
              tables_discovered: tables.length,
              tables: {},
              total_records: 0,
              status: 'success'
            };

            for (const table of tables) {
              try {
                process.stdout.write(`  📥 ${table}... `);
                const rows = await fetchAllRows(table);
                
                fs.writeFileSync(
                  path.join(backupDir, `${table}.json`),
                  JSON.stringify(rows, null, 2),
                  'utf8'
                );

                summary.tables[table] = rows.length;
                summary.total_records += rows.length;
                console.log(`${rows.length} سجل ✅`);
              } catch (err) {
                console.log(`فشل ❌ (${err.message})`);
                summary.tables[table] = 0;
                summary.status = 'partial';
              }
            }

            // حفظ الملخص
            fs.writeFileSync(path.join(backupDir, '_summary.json'), JSON.stringify(summary, null, 2), 'utf8');
            fs.writeFileSync('backups/LATEST.json', JSON.stringify({ ...summary, backup_folder: `backups/${date}` }, null, 2), 'utf8');

            // حذف النسخ القديمة (أكثر من 30 يوم)
            const allFolders = fs.readdirSync('backups')
              .filter(f => /^\d{4}-\d{2}-\d{2}$/.test(f))
              .sort();
            const toDelete = allFolders.slice(0, Math.max(0, allFolders.length - 30));
            for (const folder of toDelete) {
              fs.rmSync(path.join('backups', folder), { recursive: true });
              console.log(`🗑️  حذف نسخة قديمة: ${folder}`);
            }

            console.log('\n' + '='.repeat(50));
            console.log(`✅ النسخة الاحتياطية مكتملة!`);
            console.log(`📊 ${summary.total_records} سجل في ${tables.length} جدول`);
            console.log(`📁 محفوظة في: backups/${date}/`);
          }

          main().catch(err => {
            console.error('❌ خطأ فادح:', err);
            process.exit(1);
          });
          SCRIPT

      - name: Run smart backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node backup.js

      - name: Commit and push backup
        run: |
          git config user.name "Ghazi OS Backup Bot"
          git config user.email "backup@ghazi-os.com"
          git add backups/

          if git diff --staged --quiet; then
            echo "لا توجد تغييرات جديدة"
          else
            DATE=$(date -u +"%Y-%m-%d")
            TABLES=$(node -e "try{const s=JSON.parse(require('fs').readFileSync('backups/LATEST.json','utf8'));console.log(s.tables_discovered+' جدول، '+s.total_records+' سجل');}catch(e){console.log('');}")
            git commit -m "🗄️ نسخة احتياطية تلقائية ${DATE} — ${TABLES}"
            git push origin main
            echo "✅ تم رفع النسخة الاحتياطية"
          fi
