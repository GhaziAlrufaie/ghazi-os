// ── Attachments ──
var _attCurrentTaskId = null;
var _attCurrentSource = null; // 'brand' | 'personal' | 'finance'

function _getTaskObj(taskId, source) {
  if (source === 'personal') return PERSONAL_TASKS.find(function(t){ return t.id === taskId; });
  if (source === 'finance')  return FINANCE_TASKS.find(function(t){ return t.id === taskId; });
  return TASKS.find(function(t){ return t.id === taskId; });
}

function buildAttThumbs(taskId, attachments) {
  if (!attachments || !attachments.length) return '';
  return attachments.map(function(att, idx){
    return '<div class="att-thumb">'
      +'<img src="'+att.data+'" alt="مرفق" onclick="openAttLightbox(\''+att.data+'\')" loading="lazy">'
      +'<button class="att-del" onclick="event.stopPropagation();deleteAttachment(\''+taskId+'\','+idx+',\''+(_attCurrentSource||'brand')+'\')" title="حذف">✕</button>'
      +'</div>';
  }).join('');
}

function triggerAttUpload(taskId, source) {
  _attCurrentTaskId = taskId;
  _attCurrentSource = source;
  var inp = document.getElementById('att-file-input');
  if (inp) inp.click();
}

function handleAttUpload(event) {
  var files = Array.from(event.target.files);
  if (!files.length) return;
  var taskId = _attCurrentTaskId;
  var source = _attCurrentSource;
  var t = _getTaskObj(taskId, source);
  if (!t) return;
  if (!t.attachments) t.attachments = [];
  var remaining = files.length;
  files.forEach(function(file){
    if (!file.type.startsWith('image/')) { remaining--; return; }
    var reader = new FileReader();
    reader.onload = function(e){
      snap('إضافة مرفق');
      t.attachments.push({ data: e.target.result, name: file.name, addedAt: todayStr() });
      saveData();
      remaining--;
      if (remaining === 0) {
        // Refresh the grid in-place
        var grid = document.getElementById('att-grid-'+taskId);
        if (grid) {
          var newHtml = buildAttThumbs(taskId, t.attachments);
          newHtml += '<button class="att-upload-btn" onclick="triggerAttUpload(\''+taskId+'\',\''+source+'\')" title="رفع صورة">+</button>';
          grid.innerHTML = newHtml;
        }
        if (source === 'brand') renderBrandDetail();
        else if (source === 'personal') renderPersonal();
        else if (source === 'finance') renderFinance();
      }
    };
    reader.readAsDataURL(file);
  });
  // Reset input so same file can be re-selected
  event.target.value = '';
}

function deleteAttachment(taskId, idx, source) {
  if (!confirm('حذف هذه الصورة؟')) return;
  var t = _getTaskObj(taskId, source);
  if (!t || !t.attachments) return;
  snap('حذف مرفق');
  t.attachments.splice(idx, 1);
  saveData();
  var grid = document.getElementById('att-grid-'+taskId);
  if (grid) {
    var newHtml = buildAttThumbs(taskId, t.attachments);
    newHtml += '<button class="att-upload-btn" onclick="triggerAttUpload(\''+taskId+'\',\''+source+'\')" title="رفع صورة">+</button>';
    grid.innerHTML = newHtml;
  }
  if (source === 'brand') renderBrandDetail();
  else if (source === 'personal') renderPersonal();
  else if (source === 'finance') renderFinance();
}

function updateTaskField(taskId, field, value) {
  var t = TASKS.find(function(x){ return x.id === taskId; });
  if (!t) return;
  snap('تعديل مهمة');
  t[field] = value;
  t.updatedAt = todayStr();
  if (field === 'status' && value === 'done' && !t.completedAt) t.completedAt = todayStr();
  if (field === 'status' && value !== 'done') t.completedAt = null;
  if (field === 'status') tpAutoNotifyOnStatusChange(taskId, value);
  saveData();
  if (state.currentPage === 'project-detail') renderProjectDetail();
  if (state.currentPage === 'brand-detail') renderBrandDetail();
  if (state.currentPage === 'personal') renderPersonal();
  toast('✅ تم الحفظ');
}

function checkAutoComplete(taskId) {
  var t = TASKS.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var cl = t.checklist || [];
  // Gather all subtasks from groups
  var allGroupSts = (t.subtaskGroups||[]).reduce(function(acc,g){ return acc.concat(g.subtasks||[]); },[]);
  var sts = allGroupSts.length > 0 ? allGroupSts : (t.subtasks || []);
  // Only auto-complete if there's something to evaluate
  if (cl.length === 0 && sts.length === 0) return;
  var clOk = cl.length === 0 || cl.every(function(ci){ return ci.done; });
  var stOk = sts.length === 0 || sts.every(function(st){ return st.status === 'done' || st.done === true; });
  var changed = false;
  if (clOk && stOk) {
    if (t.status !== 'done') {
      t.status = 'done';
      t.completedAt = todayStr();
      toast('🎉 اكتملت المهمة تلقائياً!');
      changed = true;
    }
  } else {
    // If task was done but something unchecked → revert
    if (t.status === 'done') {
      t.status = 'in_progress';
      t.completedAt = null;
      changed = true;
    }
  }
  if (changed) {
    if (state.currentPage === 'brand-detail') renderBrandDetail();
    else if (state.currentPage === 'personal') renderPersonal();
    else if (state.currentPage === 'project-detail') renderProjectDetail();
  }
}

// BRAND BOARD DRAG & DROP
// ============================
var _draggedTaskId = null;

var _draggedSourceCol = null;
function brandBoardDragStart(event, taskId) {
  _draggedTaskId = taskId;
  var card = event.currentTarget || event.target;
  _draggedSourceCol = card.dataset ? card.dataset.col : null;
  event.dataTransfer.effectAllowed = 'move';
  setTimeout(function(){
    var el = document.getElementById('btc-'+taskId);
    if (el) el.classList.add('dragging');
  }, 0);
}

function brandBoardDragEnd(event) {
  // Always clean up dragging state - runs whether drop succeeded or was cancelled
  var el = event.currentTarget || event.target;
  if (el) el.classList.remove('dragging');
  // Also clean up any leftover indicators
  document.querySelectorAll('.brand-task-card.dragging').forEach(function(c){ c.classList.remove('dragging'); });
  document.querySelectorAll('.brand-task-card.drag-above,.brand-task-card.drag-below').forEach(function(c){ c.classList.remove('drag-above','drag-below'); });
  document.querySelectorAll('.brand-board-col.drag-over').forEach(function(c){ c.classList.remove('drag-over'); });
  _draggedTaskId = null;
  _draggedSourceCol = null;
}

function brandCardDragOver(event) {
  event.preventDefault();
  event.stopPropagation();
  var card = event.currentTarget;
  if (!card || card.classList.contains('dragging')) return;
  // Remove indicators from all cards
  document.querySelectorAll('.brand-task-card.drag-above,.brand-task-card.drag-below')
    .forEach(function(c){ c.classList.remove('drag-above','drag-below'); });
  // Determine above or below based on mouse Y
  var rect = card.getBoundingClientRect();
  var midY = rect.top + rect.height / 2;
  if (event.clientY < midY) {
    card.classList.add('drag-above');
  } else {
    card.classList.add('drag-below');
  }
}

function brandCardDragLeave(event) {
  var card = event.currentTarget;
  if (card) { card.classList.remove('drag-above','drag-below'); }
}

function brandCardDrop(event, colId, brandId) {
  event.preventDefault();
  event.stopPropagation();
  var targetCard = event.currentTarget;
  var isAbove = targetCard.classList.contains('drag-above');
  targetCard.classList.remove('drag-above','drag-below');
  document.querySelectorAll('.brand-task-card.drag-above,.brand-task-card.drag-below')
    .forEach(function(c){ c.classList.remove('drag-above','drag-below'); });

  if (!_draggedTaskId) return;
  var targetId = targetCard.dataset ? targetCard.dataset.tid : null;
  if (!targetId || targetId === _draggedTaskId) { _draggedTaskId = null; return; }

  var draggedTask = TASKS.find(function(x){ return x.id === _draggedTaskId; });
  if (!draggedTask) { _draggedTaskId = null; return; }

  snap('إعادة ترتيب المهام');

  // If moving to different column, update status
  if (draggedTask.status !== colId) {
    draggedTask.status = colId;
    draggedTask.updatedAt = todayStr();
    if (colId === 'done' && !draggedTask.completedAt) draggedTask.completedAt = todayStr();
    if (colId !== 'done') draggedTask.completedAt = null;
  }

  // Reorder: remove dragged task from TASKS array, insert near target
  var fromIdx = TASKS.indexOf(draggedTask);
  if (fromIdx !== -1) TASKS.splice(fromIdx, 1);

  var targetTask = TASKS.find(function(x){ return x.id === targetId; });
  var toIdx = TASKS.indexOf(targetTask);
  if (toIdx === -1) {
    TASKS.push(draggedTask);
  } else {
    if (isAbove) {
      TASKS.splice(toIdx, 0, draggedTask);
    } else {
      TASKS.splice(toIdx + 1, 0, draggedTask);
    }
  }

  _draggedTaskId = null;
  _draggedSourceCol = null;
  saveData();
  renderBrandDetail();
}

function brandBoardDrop(event, newStatus, brandId) {
  event.preventDefault();
  // Clean up card indicators
  document.querySelectorAll('.brand-task-card.drag-above,.brand-task-card.drag-below')
    .forEach(function(c){ c.classList.remove('drag-above','drag-below'); });
  var col = document.getElementById('bbc-'+newStatus);
  if (col) col.classList.remove('drag-over');
  if (!_draggedTaskId) return;
  var t = TASKS.find(function(x){ return x.id === _draggedTaskId; });
  if (!t) return;
  // If same column drop on empty space → no reorder needed (card drop handled it)
  if (t.status === newStatus) { _draggedTaskId = null; return; }
  snap('نقل مهمة');
  t.status = newStatus;
  t.updatedAt = todayStr();
  if (newStatus === 'done' && !t.completedAt) t.completedAt = todayStr();
  if (newStatus !== 'done') t.completedAt = null;
  _draggedTaskId = null;
  saveData();
  renderBrandDetail();
  toast('✅ تم نقل المهمة');
}

var _qaPending = null; // {type, colId, arg1, arg2}
var _qaTimer = null;

function showQAPriPicker(type, colId, arg1, arg2) {
  // Determine input id based on type
  var inputId;
  if (type === 'brand')    inputId = 'bba-'+colId+'-'+arg2;  // arg1=brandId, arg2=boardId
  if (type === 'personal') inputId = 'pba-'+colId+(arg1 ? '-'+arg1 : '-all');
  if (type === 'fin')      inputId = 'finbba-'+colId+'-'+arg1; // arg1=boardId
  var inp = document.getElementById(inputId);
  if (!inp) return;
  var title = inp.value.trim();
  if (!title) return;

  // Remove any existing picker
  var old = document.getElementById('qa-pri-popup');
  if (old) old.remove();
  clearTimeout(_qaTimer);

  _qaPending = {type:type, colId:colId, arg1:arg1, arg2:arg2, title:title, inputId:inputId};

  // Build popup
  var popup = document.createElement('div');
  popup.className = 'qa-pri-popup';
  popup.id = 'qa-pri-popup';
  popup.innerHTML =
    '<button class="qp-low"    onclick="doQAWithPriority(\'low\')">منخفض</button>' +
    '<button class="qp-medium" onclick="doQAWithPriority(\'medium\')">متوسط</button>' +
    '<button class="qp-high"   onclick="doQAWithPriority(\'high\')">عالي</button>' +
    '<button class="qp-critical" onclick="doQAWithPriority(\'critical\')">حرج</button>';

  // Append to the brand-board-add wrapper
  var wrapId;
  if (type === 'brand')    wrapId = 'bba-wrap-'+colId+'-'+arg2;
  if (type === 'personal') wrapId = 'pbaw-'+colId+'-'+arg1;
  if (type === 'fin')      wrapId = 'finbba-wrap-'+colId+'-'+arg1;
  var wrap = document.getElementById(wrapId);
  if (wrap) wrap.appendChild(popup);
  else document.body.appendChild(popup);

  // Auto-dismiss after 10s with 'low' priority
  _qaTimer = setTimeout(function() { doQAWithPriority('low'); }, 10000);

  // Dismiss on outside click
  setTimeout(function() {
    document.addEventListener('click', _qaDismissHandler);
  }, 50);
}

function _qaDismissHandler(e) {
  var popup = document.getElementById('qa-pri-popup');
  if (popup && !popup.contains(e.target)) {
    clearTimeout(_qaTimer);
    popup.remove();
    _qaPending = null;
    document.removeEventListener('click', _qaDismissHandler);
  }
}

function doQAWithPriority(priority) {
  clearTimeout(_qaTimer);
  document.removeEventListener('click', _qaDismissHandler);
  var popup = document.getElementById('qa-pri-popup');
  if (popup) popup.remove();
  if (!_qaPending) return;
  var p = _qaPending;
  _qaPending = null;

  var inp = document.getElementById(p.inputId);
  if (!inp) return;
  var title = p.title;
  inp.value = '';

  if (p.type === 'brand') {
    var brandId = p.arg1, boardId = p.arg2;
    snap('إضافة مهمة سريعة');
    var assignedProjectId = (boardId && boardId !== 'all') ? boardId : null;
    TASKS.push({
      id: 'task-'+Date.now(), title: title, status: p.colId, priority: priority,
      brandId: brandId, projectId: assignedProjectId,
      dueDate: null, createdAt: todayStr(), updatedAt: todayStr(),
      checklist: [], subtasks: [], notes: '', links: [], attachments: []
    });
    saveData(); renderBrandDetail(); toast('✅ تمت الإضافة');
  } else if (p.type === 'personal') {
    var catId = p.arg1;
    snap('إضافة مهمة شخصية');
    PERSONAL_TASKS.push({
      id: 'pt'+Date.now(), title: title, status: p.colId, priority: priority,
      category: catId || (PERSONAL_CATS[0] ? PERSONAL_CATS[0].id : 'personal'),
      dueDate: '', notes: '', checklist: [], subtasks: [], attachments: []
    });
    saveData(); renderPersonal(); toast('✅ تمت الإضافة');
  } else if (p.type === 'fin') {
    var boardId2 = p.arg1;
    snap('إضافة مهمة مالية');
    var projId = boardId2 === 'all' ? null : boardId2;
    FINANCE_TASKS.push({
      id: 'ft_'+Date.now()+'_'+Math.random().toString(36).substr(2,5),
      title: title, status: p.colId, priority: priority, projectId: projId,
      checklist: [], subtasks: [], links: [], notes: '', attachments: [],
      createdAt: new Date().toISOString()
    });
    saveData(); renderFinance(); toast('✅ تمت الإضافة');
  }

// ===== LOGIN vars moved to before init() =====

function checkAuth() {
  var auth = localStorage.getItem(SESSION_KEY);
  if (auth === 'ok') {
    document.getElementById('login-screen').classList.add('hidden');
  }
  // Pre-fill saved credentials
  var savedUser = localStorage.getItem('ghazi_saved_user');
  var savedPass = localStorage.getItem('ghazi_saved_pass');
  if (savedUser) document.getElementById('login-user').value = savedUser;
  if (savedPass) document.getElementById('login-pass').value = savedPass;
  // Enter key support
  document.getElementById('login-pass').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-user').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-pass').focus();
  });
}

function doLogout() {
  localStorage.removeItem(SESSION_KEY);
  var screen = document.getElementById('login-screen');
  screen.style.opacity = '1';
  screen.classList.remove('hidden');
  // Re-fill saved credentials
  var savedUser = localStorage.getItem('ghazi_saved_user');
  var savedPass = localStorage.getItem('ghazi_saved_pass');
  document.getElementById('login-user').value = savedUser || '';
  document.getElementById('login-pass').value = savedPass || '';
  document.getElementById('login-err').textContent = '';
  setTimeout(function(){ document.getElementById('login-pass').focus(); }, 150);
}

function doLogin() {
  var u = document.getElementById('login-user').value.trim();
  var p = document.getElementById('login-pass').value;
  var err = document.getElementById('login-err');
  if (u === LOGIN_USER && p === LOGIN_PASS) {
    localStorage.setItem(SESSION_KEY, 'ok');
    localStorage.setItem('ghazi_saved_user', u);
    localStorage.setItem('ghazi_saved_pass', p);
    document.getElementById('login-screen').style.transition = 'opacity .4s';
    document.getElementById('login-screen').style.opacity = '0';
    setTimeout(function() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('login-screen').style.opacity = '';
    }, 400);
    err.textContent = '';
  } else {
    err.textContent = '❌ اسم المستخدم أو كلمة المرور غير صحيحة';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    // Shake animation
    var box = document.querySelector('.login-box');
    box.style.animation = 'none';
    box.style.transform = 'translateX(8px)';
    setTimeout(function() { box.style.transform = 'translateX(-8px)'; }, 80);
    setTimeout(function() { box.style.transform = 'translateX(4px)'; }, 160);
    setTimeout(function() { box.style.transform = 'translateX(0)'; }, 240);
  }
}

// ── Drag and drop for finance board v2 ──
var _finDragId2 = null;

function finBoardDragStart(e, tid) {
  _finDragId2 = tid;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging');
}

function finBoardDragEnd(e) {
  document.querySelectorAll('.brand-task-card.dragging').forEach(function(el){ el.classList.remove('dragging'); });
  document.querySelectorAll('.drag-above,.drag-below,.drag-over').forEach(function(el){ el.classList.remove('drag-above','drag-below','drag-over'); });
  _finDragId2 = null;
}

function finColDrop2(e, colId, boardId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!_finDragId2) return;
  var task = FINANCE_TASKS.find(function(t){ return t.id === _finDragId2; });
  if (!task) return;
  snap('سحب مهمة مالية');
  task.status = colId;
  if (boardId !== 'all') task.projectId = boardId;
  saveData();
  renderFinance();
}

function finBoardCardOver(e) {
  e.preventDefault();
  e.stopPropagation();
  var card = e.currentTarget;
  var rect = card.getBoundingClientRect();
  document.querySelectorAll('.drag-above,.drag-below').forEach(function(el){ el.classList.remove('drag-above','drag-below'); });
  if (e.clientY < rect.top + rect.height / 2) card.classList.add('drag-above');
  else card.classList.add('drag-below');
}

function finBoardCardLeave(e) {
  e.currentTarget.classList.remove('drag-above','drag-below');
}

function finBoardCardDrop(e, targetId, colId, boardId) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.drag-above,.drag-below').forEach(function(el){ el.classList.remove('drag-above','drag-below'); });
  if (!_finDragId2 || _finDragId2 === targetId) return;
  var dragTask = FINANCE_TASKS.find(function(t){ return t.id === _finDragId2; });
  var targetTask = FINANCE_TASKS.find(function(t){ return t.id === targetId; });
  if (!dragTask || !targetTask) return;
  snap('إعادة ترتيب مهمة مالية');
  dragTask.status = colId;
  if (boardId !== 'all') dragTask.projectId = boardId;
  var rect = e.currentTarget.getBoundingClientRect();
  var insertBefore = e.clientY < rect.top + rect.height / 2;
  FINANCE_TASKS = FINANCE_TASKS.filter(function(t){ return t.id !== _finDragId2; });
  var targetIdx = FINANCE_TASKS.findIndex(function(t){ return t.id === targetId; });
  if (insertBefore) FINANCE_TASKS.splice(targetIdx, 0, dragTask);
  else FINANCE_TASKS.splice(targetIdx + 1, 0, dragTask);
  saveData();
  renderFinance();
}

  var p = FINANCE_PROJECTS.find(function(x){ return x.id === projId; });
  if (!p) return;
  var newName = prompt('اسم المشروع الجديد:', p.title);

  p.title = newName;
  saveData();
  renderFinance();
  toast('✏️ تم تعديل الاسم');

function deleteFinProject(projId) {
  if (FINANCE_PROJECTS.length <= 1) { toast('⚠️ لا يمكن حذف المشروع الوحيد'); return; }
  if (!confirm('هل تريد حذف هذا المشروع نهائياً؟ سيتم حذف جميع مهامه أيضاً.')) return;
  snap('حذف مشروع مالي');
  FINANCE_TASKS = FINANCE_TASKS.filter(function(t){ return t.projectId !== projId; });
  FINANCE_PROJECTS = FINANCE_PROJECTS.filter(function(p){ return p.id !== projId; });
  if (state.finProjIdx >= FINANCE_PROJECTS.length) state.finProjIdx = 0;
  saveData();
  renderFinance();
  toast('🗑 تم حذف المشروع');
}

function toggleFinMenu(menuId, btnEl) {
  var menu = document.getElementById(menuId);
  if (!menu) return;
  var isOpen = menu.classList.contains('on');
  document.querySelectorAll('.proj-opts-menu.on').forEach(function(m){ m.classList.remove('on'); });
  if (!isOpen) {
    menu.classList.add('on');
    if (btnEl) {
      var rect = btnEl.getBoundingClientRect();
      menu.style.top = (rect.bottom + 4) + 'px';
      menu.style.right = (window.innerWidth - rect.right) + 'px';
      menu.style.left = 'auto';
    }
    setTimeout(function() {
      document.addEventListener('click', function handler(e) {
        if (!e.target.closest('.proj-opts-menu') && !e.target.closest('.bbn-tab-opts')) {
          document.querySelectorAll('.proj-opts-menu.on').forEach(function(m){ m.classList.remove('on'); });
          document.removeEventListener('click', handler);
        }
      });
    }, 10);
  }
}

function closeFinMenu(menuId) {
  var menu = document.getElementById(menuId);
  if (menu) menu.classList.remove('on');
}

// Drag and drop for finance board
var _finDragId = null;
var _finDragCol = null;

function finCardDragStart(e, tid, col) {
  _finDragId = tid;
  _finDragCol = col;
  e.dataTransfer.effectAllowed = 'move';
  var el = e.currentTarget;
  el.classList.add('dragging');
}

function finCardDragEnd(e) {
  document.querySelectorAll('.brand-task-card.dragging').forEach(function(el){ el.classList.remove('dragging'); });
  document.querySelectorAll('.drag-above,.drag-below,.drag-over').forEach(function(el){ el.classList.remove('drag-above','drag-below','drag-over'); });
  _finDragId = null;
  _finDragCol = null;
}

function finColDragOver(e, colId, projId) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function finColDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function finColDrop(e, colId, projId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!_finDragId) return;
  var task = FINANCE_TASKS.find(function(t){ return t.id === _finDragId; });
  if (!task) return;
  snap('سحب مهمة مالية');
  task.status = colId;
  task.projectId = projId;
  saveData();
  renderFinance();
}

function finCardDragOver(e) {
  e.preventDefault();
  e.stopPropagation();
  var card = e.currentTarget;
  var rect = card.getBoundingClientRect();
  var mid = rect.top + rect.height / 2;
  document.querySelectorAll('.drag-above,.drag-below').forEach(function(el){ el.classList.remove('drag-above','drag-below'); });
  if (e.clientY < mid) card.classList.add('drag-above');
  else card.classList.add('drag-below');
}

function finCardDrop(e, targetId, colId, projId) {
  e.preventDefault();
  e.stopPropagation();
  document.querySelectorAll('.drag-above,.drag-below').forEach(function(el){ el.classList.remove('drag-above','drag-below'); });
  if (!_finDragId || _finDragId === targetId) return;
  var dragTask = FINANCE_TASKS.find(function(t){ return t.id === _finDragId; });
  var targetTask = FINANCE_TASKS.find(function(t){ return t.id === targetId; });
  if (!dragTask || !targetTask) return;
  snap('إعادة ترتيب مهمة مالية');
  // Change column if different
  dragTask.status = colId;
  dragTask.projectId = projId;
  // Reorder
  var rect = e.currentTarget.getBoundingClientRect();
  var mid = rect.top + rect.height / 2;
  var insertBefore = e.clientY < mid;
  FINANCE_TASKS = FINANCE_TASKS.filter(function(t){ return t.id !== _finDragId; });
  var targetIdx = FINANCE_TASKS.findIndex(function(t){ return t.id === targetId; });
  if (insertBefore) FINANCE_TASKS.splice(targetIdx, 0, dragTask);
  else FINANCE_TASKS.splice(targetIdx + 1, 0, dragTask);
  saveData();
  renderFinance();
}

function addFinLink(taskId) {
  var task = FINANCE_TASKS.find(function(t){ return t.id === taskId; });
  var urlEl = document.getElementById('finlink-url-'+taskId);
  var lblEl = document.getElementById('finlink-lbl-'+taskId);
  if (!task || !urlEl) return;
  var url = urlEl.value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  if (!task.links) task.links = [];
  snap('إضافة رابط مالي');
  task.links.push({url: url, label: lblEl ? lblEl.value.trim() : ''});
  saveData();
  openFinTaskPanel(taskId);
}
function removeFinLink(taskId, idx) {
  var task = FINANCE_TASKS.find(function(t){ return t.id === taskId; });
  if (!task || !task.links) return;
  snap('حذف رابط مالي');
  task.links.splice(idx, 1);
  saveData();
  openFinTaskPanel(taskId);
}

  task.subtasks[si].status = status;

function toggleFinSubExpand(taskId, si) {

  if (!task || !task.subtasks[si]) return;
  task.subtasks[si]._expanded = !task.subtasks[si]._expanded;

function addFinSubCheck(taskId, si) {

  snap('إضافة خطوة فرعية مالية');

  saveData();
  openFinTaskPanel(taskId);
}
function updateFinSubCheckText(taskId, si, ci, text) {
  var task = FINANCE_TASKS.find(function(t){ return t.id === taskId; });
  if (!task || !task.subtasks[si] || !task.subtasks[si].checklist[ci]) return;
  task.subtasks[si].checklist[ci].text = text;
  saveData();

function removeFinSubCheck(taskId, si, ci) {
  var task = FINANCE_TASKS.find(function(t){ return t.id === taskId; });
  if (!task || !task.subtasks[si] || !task.subtasks[si].checklist) return;
  snap('حذف خطوة فرعية مالية');
  task.subtasks[si].checklist.splice(ci, 1);
  saveData();
  openFinTaskPanel(taskId);

var _searchTimeout = null;

function globalSearch(query) {
  clearTimeout(_searchTimeout);
  query = query.trim();
  if (!query) { hideSearchDropdown(); return; }
  _searchTimeout = setTimeout(function(){ runSearch(query); }, 120);
}

function runSearch(query) {
  var q = query.toLowerCase();
  var results = [];

  // ── Brand Tasks (TASKS) ──
  TASKS.forEach(function(t) {
    if (t.archived) return;
    var titleMatch = t.title && t.title.toLowerCase().indexOf(q) >= 0;
    var descMatch  = t.desc  && t.desc.toLowerCase().indexOf(q) >= 0;
    if (titleMatch || descMatch) {
      var brand = t.brandId ? getBrand(t.brandId) : null;
      var proj  = t.projectId ? getProject(t.projectId) : null;
      results.push({
        type: 'task', group: 'مهام البراندات',
        icon: brand ? brand.icon : '📋',
        title: t.title,
        meta: (brand ? brand.name : '') + (proj ? ' ← ' + proj.title : ''),
        badge: statusLabel(t.status),
        action: function(id){ return function(){ openTaskPanel(id); }; }(t.id),
        matchIn: titleMatch ? t.title : t.desc,
        score: titleMatch ? 2 : 1
      });
    }
  });

  // ── Personal Tasks ──
  PERSONAL_TASKS.forEach(function(t) {
    if (t.archived) return;
    var titleMatch = t.title && t.title.toLowerCase().indexOf(q) >= 0;
    var notesMatch = t.notes && t.notes.toLowerCase().indexOf(q) >= 0;
    if (titleMatch || notesMatch) {
      var catLabels = {health:'صحة',personal:'شخصي',financial:'مالي',family:'عائلة',learning:'تعلم',social:'اجتماعي',other:'أخرى'};
      results.push({
        type: 'personal', group: 'الشخصي',
        icon: '🧘',
        title: t.title,
        meta: 'الشخصي' + (t.category ? ' — ' + (catLabels[t.category] || t.category) : ''),
        badge: statusLabel(t.status),
        action: function(id){ return function(){
          go('personal');
          setTimeout(function(){ openPersonalTaskPanel(id); }, 200);
        }; }(t.id),
        matchIn: titleMatch ? t.title : t.notes,
        score: titleMatch ? 2 : 1
      });
    }
  });

  // ── Finance Tasks ──
  FINANCE_TASKS.forEach(function(t) {
    if (t.archived) return;
    var titleMatch = t.title && t.title.toLowerCase().indexOf(q) >= 0;
    var notesMatch = t.notes && t.notes.toLowerCase().indexOf(q) >= 0;
    var descMatch  = t.desc  && t.desc.toLowerCase().indexOf(q) >= 0;
    if (titleMatch || notesMatch || descMatch) {
      results.push({
        type: 'finance', group: 'حسابات وماليات',
        icon: '💰',
        title: t.title,
        meta: 'حسابات وماليات',
        badge: statusLabel(t.status),
        action: function(id){ return function(){
          go('finance');
          setTimeout(function(){ openFinTaskPanel(id); }, 200);
        }; }(t.id),
        matchIn: titleMatch ? t.title : (descMatch ? t.desc : t.notes),
        score: titleMatch ? 2 : 1
      });
    }
  });

  // ── Decisions ──
  DECISIONS.forEach(function(d) {
    if (d.archived) return;
    var titleMatch   = d.title   && d.title.toLowerCase().indexOf(q) >= 0;
    var contextMatch = d.context && d.context.toLowerCase().indexOf(q) >= 0;
    if (titleMatch || contextMatch) {
      var brand = d.brandId ? getBrand(d.brandId) : null;
      results.push({
        type: 'decision', group: 'القرارات',
        icon: '⚖️',
        title: d.title,
        meta: (brand ? brand.name + ' — ' : '') + (d.status === 'decided' ? 'محسوم' : 'معلق'),
        badge: d.impact === 'high' ? 'عالي' : d.impact === 'medium' ? 'متوسط' : 'منخفض',
        action: function(){ go('decisions'); },
        matchIn: titleMatch ? d.title : d.context,
        score: titleMatch ? 2 : 1
      });
    }
  });

  // ── Projects ──
  PROJECTS.forEach(function(p) {
    if (p.archived) return;
    var titleMatch = p.title && p.title.toLowerCase().indexOf(q) >= 0;
    var descMatch  = p.desc  && p.desc.toLowerCase().indexOf(q) >= 0;
    if (titleMatch || descMatch) {
      var brand = p.brandId ? getBrand(p.brandId) : null;
      results.push({
        type: 'project', group: 'المشاريع',
        icon: '📁',
        title: p.title,
        meta: brand ? brand.name : 'مشروع',
        badge: p.status === 'active' ? 'نشط' : p.status === 'done' ? 'مكتمل' : 'تخطيط',
        action: function(bid, pid){ return function(){
          go('brand-detail', bid);
          setTimeout(function(){ openProjectDetail(pid); }, 200);
        }; }(p.brandId, p.id),
        matchIn: titleMatch ? p.title : p.desc,
        score: titleMatch ? 2 : 1
      });
    }
  });

  // ── Finance Projects ──
  if (typeof FINANCE_PROJECTS !== 'undefined') {
    FINANCE_PROJECTS.forEach(function(p) {
      if (p.archived || p.id === 'fp_default') return;
      if (p.title && p.title.toLowerCase().indexOf(q) >= 0) {
        results.push({
          type: 'finproject', group: 'مشاريع الماليات',
          icon: '💼',
          title: p.title,
          meta: 'حسابات وماليات',
          badge: 'مشروع',
          action: function(){ go('finance'); },
          matchIn: p.title,
          score: 2
        });
      }
    });
  }

  // ── Subtasks (from TASKS) ──
  TASKS.forEach(function(t) {
    if (t.archived) return;
    var sts = t.subtasks || [];
    sts.forEach(function(st) {
      if (st.title && st.title.toLowerCase().indexOf(q) >= 0) {
        var brand = t.brandId ? getBrand(t.brandId) : null;
        results.push({
          type: 'subtask', group: 'المهام الفرعية',
          icon: '🔀',
          title: st.title,
          meta: t.title + (brand ? ' — ' + brand.name : ''),
          badge: statusLabel(st.status),
          action: function(id){ return function(){ openTaskPanel(id); }; }(t.id),
          matchIn: st.title,
          score: 1
        });
      }
    });
  });

  // ── Brands ──
  BRANDS.forEach(function(b) {
    if (b.archived) return;
    if (b.name && b.name.toLowerCase().indexOf(q) >= 0) {
      results.push({
        type: 'brand', group: 'البراندات',
        icon: b.icon || '🏷️',
        title: b.name,
        meta: b.desc || '',
        badge: b.status === 'active' ? 'نشط' : b.status === 'selling' ? 'بيع' : b.status,
        action: function(id){ return function(){ go('brand-detail', id); }; }(b.id),
        matchIn: b.name,
        score: 2
      });
    }
  });

  // ── Reminders ──
  REMINDERS.forEach(function(r, idx) {
    if (r.toLowerCase().indexOf(q) >= 0) {
      results.push({
        type: 'reminder', group: 'التذكيرات',
        icon: '💡',
        title: r,
        meta: 'تذكيرات',
        badge: '',
        action: function(){ go('cmd'); },
        matchIn: r,
        score: 1
      });
    }
  });

  // Sort by score desc
  results.sort(function(a, b){ return b.score - a.score; });

  renderSearchResults(results, query);
}

function statusLabel(s) {
  var labels = {todo:'قيد الانتظار', in_progress:'جاري', waiting:'معلق', done:'تم', ideas:'أفكار'};
  return labels[s] || s || '';
}

function renderSearchResults(results, query) {
  var dd = document.getElementById('search-dropdown');
  if (!dd) return;

  if (!results.length) {
    dd.innerHTML = '<div class="search-empty">🔍 لا توجد نتائج لـ "' + escHtml(query) + '"</div>';
    dd.classList.add('on');
    return;
  }

  // Group results
  var groups = {};
  var groupOrder = [];
  results.forEach(function(r) {
    if (!groups[r.group]) { groups[r.group] = []; groupOrder.push(r.group); }
    groups[r.group].push(r);
  });

  var html = '';
  var totalShown = 0;
  var MAX = 10;

  groupOrder.forEach(function(grp) {
    if (totalShown >= MAX) return;
    var items = groups[grp];
    html += '<div class="search-group-label">' + escHtml(grp) + '</div>';
    items.forEach(function(r) {
      if (totalShown >= MAX) return;
      var highlightedTitle = highlightMatch(r.title, query);
      html += '<div class="search-item" onclick="handleSearchItemClick(' + totalShown + ')" data-search-idx="' + totalShown + '">';
      html += '<div class="search-item-icon">' + r.icon + '</div>';
      html += '<div class="search-item-body">';
      html += '<div class="search-item-title">' + highlightedTitle + '</div>';
      if (r.meta) html += '<div class="search-item-meta">' + escHtml(r.meta) + '</div>';
      html += '</div>';
      if (r.badge) html += '<div class="search-item-badge">' + escHtml(r.badge) + '</div>';
      html += '</div>';
      totalShown++;
    });
  });

  // Store actions for click handling
  window._searchActions = [];
  var idx = 0;
  groupOrder.forEach(function(grp) {
    groups[grp].forEach(function(r) {
      if (idx < MAX) { window._searchActions[idx] = r.action; idx++; }
    });
  });

  dd.innerHTML = html;
  dd.classList.add('on');
}

function handleSearchItemClick(idx) {
  hideSearchDropdown();
  document.getElementById('global-search-input').value = '';
  if (window._searchActions && window._searchActions[idx]) {
    window._searchActions[idx]();
  }
}

function handleSearchKey(e) {
  if (e.key === 'Escape') {
    hideSearchDropdown();
    document.getElementById('global-search-input').blur();
  }
}

function showSearchDropdown() {
  var dd = document.getElementById('search-dropdown');
  if (dd && dd.innerHTML.trim()) dd.classList.add('on');
}

function hideSearchDropdown() {
  var dd = document.getElementById('search-dropdown');
  if (dd) dd.classList.remove('on');
}

function highlightMatch(text, query) {
  if (!text) return '';
  var escaped = escHtml(text);
  var qEsc = escHtml(query);
  var re = new RegExp('(' + qEsc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(re, '<span class="search-highlight">$1</span>');
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('global-search-wrap');
  if (wrap && !wrap.contains(e.target)) {
    hideSearchDropdown();
  }
});

// ── State: Weekly Focus Data ──
var WEEKLY_FOCUS = {}; // { 'YYYY-MM-DD': { target_type, target_id, target_name, target_color, notes, metrics_cache } }
var _wfLoaded = false;
var _wfEditorDate = null; // التاريخ الذي يتم تعديله
var _wfDragSrc = null;   // Drag & Drop

// ── Helper: get date string for day offset ──
function wfDateStr(offsetDays) {
  var d = new Date();
  d.setDate(d.getDate() + offsetDays);
  return d.toISOString().split('T')[0];
}

// ── Helper: get day name in Arabic ──
function wfDayName(dateStr) {
  var days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  var d = new Date(dateStr + 'T00:00:00');
  return days[d.getDay()];
}

// ── Helper: format date short ──
function wfDateShort(dateStr) {
  var d = new Date(dateStr + 'T00:00:00');
  return (d.getDate()) + '/' + (d.getMonth()+1);
}

// ── Load weekly focus from Supabase ──
function wfLoad(callback) {
  var sb = _sb;
  if (!sb) { _wfLoaded = true; if(callback) callback(); return; }
  
  // Load 14 days (7 past + 7 future)
  var dates = [];
  for (var i = -7; i <= 7; i++) dates.push(wfDateStr(i));
  
  sb.from('weekly_focus')
    .select('*')
    .in('focus_date', dates)
    .then(function(res) {
      if (res.data) {
        res.data.forEach(function(row) {
          WEEKLY_FOCUS[row.focus_date] = {
            target_type: row.target_type,
            target_id: row.target_id,
            target_name: row.target_name,
            target_color: row.target_color || '#C9A84C',
            notes: row.notes || '',
            metrics_cache: row.metrics_cache || {}
          };
        });
      }
      _wfLoaded = true;
      if (callback) callback();
    }).catch(function() {
      _wfLoaded = true;
      if (callback) callback();
    });
}

// ── Save focus for a date ──
function wfSave(dateStr, data, callback) {
  WEEKLY_FOCUS[dateStr] = data;
  
  var sb = _sb;
  if (!sb) { if(callback) callback(); return; }
  
  sb.from('weekly_focus')
    .upsert({
      focus_date: dateStr,
      target_type: data.target_type,
      target_id: data.target_id || null,
      target_name: data.target_name || null,
      target_color: data.target_color || '#C9A84C',
      notes: data.notes || '',
      metrics_cache: data.metrics_cache || {},
      updated_at: new Date().toISOString()
    }, { onConflict: 'focus_date' })
    .then(function() { if(callback) callback(); })
    .catch(function() { if(callback) callback(); });
}

// ── Delete focus for a date ──
function wfDelete(dateStr, callback) {
  delete WEEKLY_FOCUS[dateStr];
  var sb = _sb;
  if (!sb) { if(callback) callback(); return; }
  sb.from('weekly_focus').delete().eq('focus_date', dateStr)
    .then(function() { if(callback) callback(); })
    .catch(function() { if(callback) callback(); });
}

// ── Detect "hungry" brands (no focus in last 7 days) ──
function wfGetHungryBrands() {
  var brandFocusDates = {};
  var today = todayStr();
  
  // Count focus days per brand in last 14 days
  for (var i = -14; i <= 0; i++) {
    var d = wfDateStr(i);
    var f = WEEKLY_FOCUS[d];
    if (f && f.target_type === 'brand' && f.target_id) {
      if (!brandFocusDates[f.target_id]) brandFocusDates[f.target_id] = 0;
      brandFocusDates[f.target_id]++;
    }
  }
  
  var hungry = [];
  BRANDS.forEach(function(b) {
    if (b.status !== 'active' && b.status !== 'selling') return;
    var count = brandFocusDates[b.id] || 0;
    if (count === 0) {
      hungry.push({ brand: b, daysSince: 14 });
    } else if (count <= 1) {
      hungry.push({ brand: b, daysSince: 7 });
    }
  });
  
  return hungry;
}

// ── Get today's sales from salla_orders ──
function wfGetTodaySales(callback) {
  var sb = _sb;
  if (!sb) { callback(null); return; }
  
  var today = todayStr();
  sb.from('salla_orders')
    .select('total_amount')
    .gte('created_at', today + 'T00:00:00')
    .lte('created_at', today + 'T23:59:59')
    .then(function(res) {
      if (res.data && res.data.length) {
        var total = res.data.reduce(function(s, r) { return s + (parseFloat(r.total_amount) || 0); }, 0);
        callback(total);
      } else {
        callback(0);
      }
    }).catch(function() { callback(null); });
}

// ── Render Sticky Banner ──
function wfRenderStickyBanner() {
  var banner = document.getElementById('cockpit-sticky-banner');
  if (!banner) return;
  
  var today = todayStr();
  var focus = WEEKLY_FOCUS[today];
  
  if (!focus || focus.target_type === 'empty') {
    banner.classList.remove('visible');
    return;
  }
  
  banner.classList.add('visible');
  
  if (focus.target_type === 'recharge') {
    // Recharge mode
    banner.innerHTML = '<div class="csb-recharge">' +
      '<span class="csb-recharge-icon">🌿</span>' +
      '<div>' +
        '<div style="font-size:10px;color:var(--txt3);font-weight:600">وضع الشحن</div>' +
        '<div style="font-size:13px;font-weight:700;color:var(--success)">يوم استراحة — اشحن طاقتك</div>' +
      '</div>' +
    '</div>' +
    '<div class="csb-ops">' +
      '<span class="csb-ops-text">⚙️ خلّص روتينك التشغيلي أولاً</span>' +
    '</div>' +
    '<button class="csb-edit-btn" onclick="wfOpenEditor(\'' + today + '\')">تعديل</button>';
    return;
  }
  
  var color = focus.target_color || '#C9A84C';
  var typeIcon = {brand:'🎯', project:'📁', task:'✅', personal:'👤', finance:'💰'}[focus.target_type] || '🎯';
  var typeLabel = {brand:'براند', project:'مشروع', task:'مهمة', personal:'شخصي', finance:'مالي'}[focus.target_type] || 'فوكس';
  
  var html = '<div class="csb-focus">' +
    '<span class="csb-dot" style="background:' + color + '"></span>' +
    '<div>' +
      '<div class="csb-label">⚙️ خلّص روتينك أولاً — ' + typeIcon + ' بوصلتك اليوم:</div>' +
      '<div class="csb-name">' + (focus.target_name || '') + '</div>' +
    '</div>' +
  '</div>';
  
  // Sales data for brand focus
  if (focus.target_type === 'brand') {
    var cached = focus.metrics_cache && focus.metrics_cache.today_sales;
    if (cached !== undefined) {
      html += '<div class="csb-sales">' +
        '<span class="csb-sales-icon">📈</span>' +
        '<span class="csb-sales-val">مبيعات اليوم: ' + fmt(cached) + ' ريال</span>' +
      '</div>';
    } else {
      // Load sales async
      wfGetTodaySales(function(total) {
        if (total !== null) {
          // Update cache
          if (WEEKLY_FOCUS[today]) {
            if (!WEEKLY_FOCUS[today].metrics_cache) WEEKLY_FOCUS[today].metrics_cache = {};
            WEEKLY_FOCUS[today].metrics_cache.today_sales = total;
          }
          wfRenderStickyBanner(); // Re-render with data
        }
      });
    }
  }
  
  html += '<button class="csb-edit-btn" onclick="wfOpenEditor(\'' + today + '\')">تعديل</button>';
  banner.innerHTML = html;
}

// ── Render 7-day cockpit strip ──
function wfRenderWeekStrip(container) {
  var today = todayStr();
  var html = '<div class="cockpit-section">';
  html += '<div class="cockpit-section-hdr">';
  html += '<div class="cockpit-section-title">🧭 بوصلة الأسبوع';
  
  // Hungry brands alert
  var hungry = wfGetHungryBrands();
  if (hungry.length) {
    html += ' <span class="hungry-brand-badge">💡 ' + hungry.length + ' براند يشتكي</span>';
  }
  html += '</div>';
  html += '<div class="cockpit-section-actions">';
  html += '<button class="cockpit-action-btn" onclick="wfOpenEditor(\'' + today + '\')">+ تعيين اليوم</button>';
  html += '</div>';
  html += '</div>';
  
  html += '<div class="cockpit-week-strip"><div class="cockpit-week-inner" id="cockpit-week-inner">';
  
  // Show 7 days: today + 6 future
  for (var i = 0; i < 7; i++) {
    var dateStr = wfDateStr(i);
    var focus = WEEKLY_FOCUS[dateStr] || null;
    var isToday = (dateStr === today);
    var dayName = wfDayName(dateStr);
    var dateShort = wfDateShort(dateStr);
    
    var cardClass = 'cockpit-day-card';
    if (isToday) cardClass += ' today';
    if (focus && focus.target_type === 'recharge') cardClass += ' recharge';
    if (!focus || focus.target_type === 'empty') cardClass += ' empty';
    
    html += '<div class="' + cardClass + '" ' +
      'data-date="' + dateStr + '" ' +
      'onclick="wfOpenEditor(\'' + dateStr + '\')" ' +
      'draggable="true" ' +
      'ondragstart="wfDragStart(event,\'' + dateStr + '\')" ' +
      'ondragover="wfDragOver(event)" ' +
      'ondragenter="wfDragEnter(event)" ' +
      'ondragleave="wfDragLeave(event)" ' +
      'ondrop="wfDrop(event,\'' + dateStr + '\')">';
    
    // Drag handle
    html += '<span class="cdc-drag-handle">⠿</span>';
    
    // Header
    html += '<div class="cdc-header">';
    html += '<span class="cdc-day-name">' + dayName + '</span>';
    if (isToday) {
      html += '<span class="cdc-today-badge">اليوم</span>';
    } else {
      html += '<span class="cdc-date">' + dateShort + '</span>';
    }
    html += '</div>';
    
    if (!focus || focus.target_type === 'empty') {
      // Empty card
      html += '<div style="font-size:22px;margin-bottom:4px">➕</div>';
      html += '<div class="cdc-name" style="color:var(--txt3)">غير محدد</div>';
      html += '<div class="cdc-empty-hint">اضغط لتعيين فوكس</div>';
    } else if (focus.target_type === 'recharge') {
      // Recharge card
      html += '<div style="font-size:22px;margin-bottom:4px">🌿</div>';
      html += '<div class="cdc-name">استراحة</div>';
      html += '<span class="cdc-type-badge recharge">شحن طاقة</span>';
      html += '<div class="cdc-recharge-msg">يوم راحة مقصود ✓</div>';
    } else {
      // Normal focus card
      var color = focus.target_color || '#C9A84C';
      var typeLabel = {brand:'براند', project:'مشروع', task:'مهمة', personal:'شخصي', finance:'مالي'}[focus.target_type] || '';
      var typeClass = focus.target_type || 'brand';
      
      // Icon from brand
      var icon = '';
      if (focus.target_type === 'brand' && focus.target_id) {
        var b = BRANDS.find(function(x){ return x.id === focus.target_id; });
        if (b) icon = b.icon || '';
      }
      
      html += '<div class="cdc-icon">' + (icon || '🎯') + '</div>';
      html += '<div class="cdc-name" style="color:' + color + '">' + (focus.target_name || '') + '</div>';
      html += '<span class="cdc-type-badge ' + typeClass + '">' + typeLabel + '</span>';
      
      // Progress bar (for brand: task completion %)
      if (focus.target_type === 'brand' && focus.target_id) {
        var brandTasks = TASKS.filter(function(t){ return t.brandId === focus.target_id && t.status !== 'cancelled'; });
        var doneTasks = brandTasks.filter(function(t){ return t.status === 'done'; });
        if (brandTasks.length > 0) {
          var pct = Math.round(doneTasks.length / brandTasks.length * 100);
          html += '<div class="cdc-progress">';
          html += '<div class="cdc-progress-bar"><div class="cdc-progress-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
          html += '<div class="cdc-progress-label">' + doneTasks.length + '/' + brandTasks.length + ' مهمة</div>';
          html += '</div>';
        }
      } else if (focus.target_type === 'project' && focus.target_id) {
        var projTasks = TASKS.filter(function(t){ return t.projectId === focus.target_id && t.status !== 'cancelled'; });
        var projDone = projTasks.filter(function(t){ return t.status === 'done'; });
        if (projTasks.length > 0) {
          var pct2 = Math.round(projDone.length / projTasks.length * 100);
          html += '<div class="cdc-progress">';
          html += '<div class="cdc-progress-bar"><div class="cdc-progress-fill" style="width:' + pct2 + '%;background:' + color + '"></div></div>';
          html += '<div class="cdc-progress-label">' + projDone.length + '/' + projTasks.length + ' مهمة</div>';
          html += '</div>';
        }
      }
      
      // Sales cache for brand
      if (focus.target_type === 'brand' && isToday && focus.metrics_cache && focus.metrics_cache.today_sales !== undefined) {
        html += '<div style="font-size:9px;color:var(--success);margin-top:3px;font-weight:600">📈 ' + fmt(focus.metrics_cache.today_sales) + ' ريال</div>';
      }
    }
    
    html += '</div>'; // end card
  }
  
  html += '</div></div>'; // end week-inner + week-strip
  html += '</div>'; // end cockpit-section
  
  return html;
}

  var hungry = wfGetHungryBrands();

    hungryHtml = '<div class="cem-hungry-alert visible">' +

    // Type selector

      '<div class="cem-section-title">نوع الفوكس</div>' +
      '<div class="cem-type-grid">' +
        wfTypeBtn('brand', '🎯', 'براند', focus.target_type) +
        wfTypeBtn('project', '📁', 'مشروع', focus.target_type) +
        wfTypeBtn('task', '✅', 'مهمة', focus.target_type) +
        wfTypeBtn('personal', '👤', 'شخصي', focus.target_type) +
        wfTypeBtn('finance', '💰', 'مالي', focus.target_type) +
        wfTypeBtn('recharge', '🌿', 'استراحة', focus.target_type) +
      '</div>' +
    '</div>' +
    
    // Target selector (dynamic)
    '<div class="cem-section" id="cem-target-section">' +
      '<div class="cem-section-title" id="cem-target-title">اختر البراند</div>' +
      '<div class="cem-target-list" id="cem-target-list">' +
        wfBuildTargetList(focus.target_type, focus.target_id) +
      '</div>' +
    '</div>' +
    
    // Notes
    '<div class="cem-section">' +
      '<div class="cem-section-title">ملاحظات (اختياري)</div>' +
      '<textarea class="cem-notes" id="cem-notes" rows="2" placeholder="أضف ملاحظة...">' + (focus.notes || '') + '</textarea>' +
    '</div>' +
    
    '<button class="cem-save-btn" onclick="wfSaveFromEditor()">💾 حفظ</button>' +
    '<div class="cem-bottom-row">' +
      '<button class="cem-migrate-btn" onclick="wfMigrateToNext(\'' + dateStr + '\')" title="انقل الفوكس لليوم التالي">ترحيل للغد ➡️</button>' +
      '<button class="cem-clear-btn" onclick="wfClearDay(\'' + dateStr + '\')" title="مسح فوكس هذا اليوم">🗑 مسح هذا اليوم</button>' +
    '</div>' +
  '</div>';
  
  modal.querySelector('.cockpit-editor-box').innerHTML = html;

  // Store selected type/id
  modal._selectedType = focus.target_type;
  modal._selectedId = focus.target_id;
  modal._selectedName = focus.target_name;
  modal._selectedColor = focus.target_color;
}

function wfTypeBtn(type, icon, label, activeType) {
  var cls = 'cem-type-btn' + (type === activeType ? ' active' : '') + (type === 'recharge' ? ' recharge' : '');
  return '<button class="' + cls + '" onclick="wfSelectType(\'' + type + '\')">' +
    '<span class="cem-type-icon">' + icon + '</span>' +
    '<span>' + label + '</span>' +
  '</button>';
}

function wfBuildTargetList(type, activeId) {
  if (type === 'recharge' || type === 'empty') {
    return '<div style="padding:12px;text-align:center;color:var(--txt3);font-size:12px">لا يوجد هدف محدد — يوم راحة مقصود 🌿</div>';
  }
  
  var items = [];
  
  if (type === 'brand') {
    BRANDS.filter(function(b){ return b.status === 'active' || b.status === 'selling'; }).forEach(function(b) {
      items.push({ id: b.id, name: b.name, sub: {active:'نشط',selling:'بيع'}[b.status] || '', color: b.color, icon: b.icon });
    });
  } else if (type === 'project') {
    PROJECTS.filter(function(p){ return p.status === 'active' || p.status === 'planning'; }).forEach(function(p) {
      var b = BRANDS.find(function(x){ return x.id === p.brandId; });
      items.push({ id: p.id, name: p.title, sub: b ? b.name : '', color: b ? b.color : '#888', icon: '📁' });
    });
  } else if (type === 'task') {
    // فلترة الأولوية النشطة (default: critical)
    var _modal = document.getElementById('cockpit-editor-modal');
    var _activePrio = (_modal && _modal._taskPriorityFilter) ? _modal._taskPriorityFilter : 'critical';
    if (_modal) _modal._taskPriorityFilter = _activePrio; // تأكيد الحفظ
    var allT = TASKS.filter(function(t) {
      return (t.status === 'todo' || t.status === 'in_progress') && t.priority === _activePrio;
    });
    allT.forEach(function(t) {
      var b = t.brandId ? BRANDS.find(function(x){ return x.id === t.brandId; }) : null;
      items.push({ id: t.id, name: t.title, sub: b ? b.name : '', color: b ? b.color : '#888', icon: '\u2705' });
    });
    // بناء شريط أزرار الفلترة
    var prioChips = [
      { key: 'critical', icon: '\ud83d\udd25', label: 'حرج', color: '#FF3B30' },
      { key: 'high',     icon: '\u26a1',       label: 'عالي', color: '#FF9500' },
      { key: 'medium',   icon: '\ud83d\udfe1', label: 'متوسط', color: '#FFCC00' },
      { key: 'low',      icon: '\u2b07\ufe0f',  label: 'منخفض', color: '#AEAEB2' }
    ];
    var chipsHtml = '<div id="cem-prio-chips" style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:nowrap;">';
    prioChips.forEach(function(p) {
      var isActive = p.key === _activePrio;
      var activeSt = isActive
        ? 'background:' + p.color + ';color:#fff;border-color:' + p.color + ';'
        : 'background:transparent;color:var(--txt2);border-color:var(--brd);';
      chipsHtml += '<button onclick="wfFilterTasksByPriority(\'' + p.key + '\')" style="' + activeSt + 'flex:1;padding:5px 4px;border-radius:8px;border:1.5px solid;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;white-space:nowrap;transition:all 0.15s">' + p.icon + ' ' + p.label + '</button>';
    });
    chipsHtml += '</div>';
    // إضافة شريط الفلترة في أول items كعنصر خاص
    items.unshift({ _chipsHtml: chipsHtml, _isChips: true });
  } else if (type === 'personal') {
    PERSONAL_TASKS.filter(function(t){ return t.status === 'todo' || t.status === 'in_progress'; }).slice(0, 10).forEach(function(t) {
      items.push({ id: t.id, name: t.title, sub: 'شخصي', color: '#8B5CF6', icon: '👤' });
    });
    if (!items.length) items.push({ id: 'personal_general', name: 'يوم شخصي عام', sub: '', color: '#8B5CF6', icon: '👤' });
  } else if (type === 'finance') {
    FINANCE_TASKS.filter(function(t){ return t.status === 'todo' || t.status === 'in_progress'; }).slice(0, 10).forEach(function(t) {
      items.push({ id: t.id, name: t.title, sub: 'مالي', color: '#4CAF50', icon: '💰' });
    });
    if (!items.length) items.push({ id: 'finance_general', name: 'يوم مالي عام', sub: '', color: '#4CAF50', icon: '💰' });
  }
  
  // فصل chips عن باقي العناصر
  var chipsItem = null;
  var realItems = items.filter(function(item) {
    if (item._isChips) { chipsItem = item; return false; }
    return true;
  });

  var chipsHtmlStr = chipsItem ? chipsItem._chipsHtml : '';

  if (!realItems.length) {
    var emptyMsg = '<div style="padding:12px;text-align:center;color:var(--txt3);font-size:12px">';
    if (chipsItem) emptyMsg += 'لا توجد مهام بهذه الأولوية';
    else emptyMsg += 'لا توجد عناصر متاحة';
    emptyMsg += '</div>';
    return chipsHtmlStr + emptyMsg;
  }
  
  return chipsHtmlStr + realItems.map(function(item) {
    var cls = 'cem-target-item' + (item.id === activeId ? ' active' : '');
    return '<button class="' + cls + '" onclick="wfSelectTarget(\'' + item.id + '\',\'' + (item.name||'').replace(/'/g,"'") + '\',\'' + item.color + '\')">'
      + '<span class="cem-target-dot" style="background:' + item.color + '"></span>'
      + '<span class="cem-target-name">' + (item.icon||'') + ' ' + item.name + '</span>'
      + (item.sub ? '<span class="cem-target-sub">' + item.sub + '</span>' : '')
    + '</button>';
  }).join('');
}

function wfSelectType(type) {
  var modal = document.getElementById('cockpit-editor-modal');
  if (!modal) return;
  modal._selectedType = type;
  modal._selectedId = null;
  modal._selectedName = null;
  modal._selectedColor = '#C9A84C';
  // إعادة تعيين فلتر الأولوية إلى critical عند التبديل لتبويب مهمة
  if (type === 'task') modal._taskPriorityFilter = 'critical';
  
  // Update type buttons
  document.querySelectorAll('.cem-type-btn').forEach(function(btn) {
    btn.classList.remove('active');
    if (btn.getAttribute('onclick') === 'wfSelectType(\'' + type + '\')') btn.classList.add('active');
  });
  
  // Update target list
  var titleEl = document.getElementById('cem-target-title');
  var listEl = document.getElementById('cem-target-list');
  var titles = {brand:'اختر البراند', project:'اختر المشروع', task:'اختر المهمة', personal:'اختر المهمة الشخصية', finance:'اختر المهمة المالية', recharge:'وضع الاستراحة'};
  if (titleEl) titleEl.textContent = titles[type] || 'اختر الهدف';
  if (listEl) listEl.innerHTML = wfBuildTargetList(type, null);
  
  // Hide target section for recharge
  var sec = document.getElementById('cem-target-section');
  if (sec) sec.style.display = (type === 'recharge') ? 'none' : '';
}

// دالة تحديث قائمة المهام عند الضغط على زر فلترة الأولوية
function wfFilterTasksByPriority(priority) {
  var modal = document.getElementById('cockpit-editor-modal');
  if (!modal) return;
  // حفظ الفلترة الجديدة
  modal._taskPriorityFilter = priority;
  // إعادة بناء القائمة فوراً
  var listEl = document.getElementById('cem-target-list');
  if (listEl) listEl.innerHTML = wfBuildTargetList('task', modal._selectedId);
}

function wfSelectTarget(id, name, color) {
  var modal = document.getElementById('cockpit-editor-modal');
  if (!modal) return;
  modal._selectedId = id;
  modal._selectedName = name;
  modal._selectedColor = color;
  
  // Update active state
  document.querySelectorAll('.cem-target-item').forEach(function(btn) {
    btn.classList.remove('active');
  });
  event.currentTarget.classList.add('active');
  
  // Check collision
  var type = modal._selectedType;
  if (type === 'brand' && id) {
    var sameCount = 0;
    for (var i = 0; i < 7; i++) {
      var d = wfDateStr(i);
      if (d !== _wfEditorDate && WEEKLY_FOCUS[d] && WEEKLY_FOCUS[d].target_id === id) sameCount++;
    }
    var warn = document.getElementById('cem-collision');
    if (warn) {
      if (sameCount > 0) {
        warn.textContent = '⚠️ هذا البراند مُعيَّن في ' + sameCount + ' يوم آخر هذا الأسبوع. هل تريد توزيع الفوكس؟';
        warn.classList.add('visible');
      } else {
        warn.classList.remove('visible');
      }
    }
  }
}

function wfSaveFromEditor() {
  var modal = document.getElementById('cockpit-editor-modal');
  if (!modal || !_wfEditorDate) return;
  
  var type = modal._selectedType || 'brand';
  var id = modal._selectedId;
  var name = modal._selectedName;
  var color = modal._selectedColor || '#C9A84C';
  var notes = (document.getElementById('cem-notes') || {}).value || '';
  
  // For recharge, no target needed
  if (type === 'recharge') {
    id = null; name = 'استراحة'; color = '#34C759';
  }
  
  // Validate: non-recharge types need a target
  if (type !== 'recharge' && !id) {
    toast('اختر هدفاً أولاً', 'wrn');
    return;
  }
  
  var data = {
    target_type: type,
    target_id: id,
    target_name: name,
    target_color: color,
    notes: notes,
    metrics_cache: (WEEKLY_FOCUS[_wfEditorDate] || {}).metrics_cache || {}
  };
  
  wfSave(_wfEditorDate, data, function() {
    wfCloseEditor();
    wfRenderStickyBanner();
    renderCmd(); // Re-render the dashboard
    toast('✅ تم حفظ الفوكس');
  });
}

function wfClearDay(dateStr) {
  if (!confirm('مسح فوكس هذا اليوم؟')) return;
  wfDelete(dateStr, function() {
    wfCloseEditor();
    wfRenderStickyBanner();
    renderCmd();
    toast('🗑 تم المسح');
  });
}

function wfMigrateToNext(dateStr) {
  var modal = document.getElementById('cockpit-editor-modal');
  // استخدم _wfEditorDate كـ fallback إذا لم يُمرَّر dateStr
  var targetDate = dateStr || _wfEditorDate;
  if (!targetDate) { toast('\u26a0\ufe0f لا يوجد يوم محدد', 'wrn'); return; }

  var type = modal ? modal._selectedType : null;
  var id   = modal ? modal._selectedId   : null;

  // التحقق من وجود فوكس محدد أو فوكس محفوظ لهذا اليوم
  if (!type || !id) {
    var existing = WEEKLY_FOCUS[targetDate];
    if (existing && existing.target_type && existing.target_id) {
      type = existing.target_type;
      id   = existing.target_id;
      if (modal) {
        modal._selectedType  = existing.target_type;
        modal._selectedId    = existing.target_id;
        modal._selectedName  = existing.target_name;
        modal._selectedColor = existing.target_color;
      }
    } else {
      toast('\u26a0\ufe0f لا يوجد فوكس محدد لترحيله — اختر هدفاً أولاً', 'wrn'); return;
    }
  }

  // حساب اليوم التالي مع تخطي الويكند إذا كان مخفياً
  var d = new Date(targetDate + 'T12:00:00');
  d.setDate(d.getDate() + 1);
  var showWeekend = (typeof _wfShowWeekend !== 'undefined') ? _wfShowWeekend : false;
  if (!showWeekend) {
    while (d.getDay() === 5 || d.getDay() === 6) {
      d.setDate(d.getDate() + 1);
    }
  }
  var nextDate = d.toISOString().slice(0, 10);
  var dayNames = {0:'الأحد', 1:'الاثنين', 2:'الثلاثاء', 3:'الأربعاء', 4:'الخميس', 5:'الجمعة', 6:'السبت'};
  var nextDayName = dayNames[d.getDay()];

  // بناء بيانات الفوكس الجديد
  var srcFocus = WEEKLY_FOCUS[targetDate] || {};
  var data = {
    target_type: modal ? (modal._selectedType || srcFocus.target_type) : srcFocus.target_type,
    target_id:   modal ? (modal._selectedId   || srcFocus.target_id)   : srcFocus.target_id,
    target_name: modal ? (modal._selectedName || srcFocus.target_name) : srcFocus.target_name,
    target_color:modal ? (modal._selectedColor|| srcFocus.target_color): srcFocus.target_color || '#C9A84C',
    notes: (document.getElementById('cem-notes') || {}).value || srcFocus.notes || '',
    metrics_cache: {}
  };

  // حفظ في قاعدة البيانات بالـ signature الصحيح: wfSave(dateStr, data, callback)
  wfSave(nextDate, data, function() {
    // تحديث الـ state المحلي فوراً
    WEEKLY_FOCUS[nextDate] = data;
    // إغلاق النافذة
    wfCloseEditor();
    // تحديث الواجهة
    wfRenderStickyBanner();
    renderCmd();
    // Toast أخضر
    toast('تم ترحيل الفوكس بنجاح ✅ — ' + nextDayName + ' ' + nextDate);
  });
}

function wfCloseEditor() {
  var modal = document.getElementById('cockpit-editor-modal');
  if (modal) modal.classList.remove('open');
  _wfEditorDate = null;
}

// ── Drag & Drop ──
function wfDragStart(e, dateStr) {
  _wfDragSrc = dateStr;
  e.currentTarget.classList.add('drag-src');
  e.dataTransfer.effectAllowed = 'move';
}

function wfDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function wfDragEnter(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function wfDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function wfDrop(e, targetDate) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  
  if (!_wfDragSrc || _wfDragSrc === targetDate) {
    _wfDragSrc = null;
    return;
  }
  
  // Swap focus data between the two dates
  var srcFocus = WEEKLY_FOCUS[_wfDragSrc] ? JSON.parse(JSON.stringify(WEEKLY_FOCUS[_wfDragSrc])) : null;
  var tgtFocus = WEEKLY_FOCUS[targetDate] ? JSON.parse(JSON.stringify(WEEKLY_FOCUS[targetDate])) : null;
  
  var saves = 0;
  var total = (srcFocus ? 1 : 0) + (tgtFocus ? 1 : 0);
  if (!total) { _wfDragSrc = null; return; }
  
  function done() {
    saves++;
    if (saves >= total) {
      _wfDragSrc = null;
      wfRenderStickyBanner();
      renderCmd();
      toast('↔️ تم تبديل الفوكس');
    }
  }
  
  if (tgtFocus) {
    wfSave(_wfDragSrc, tgtFocus, done);
  } else {
    wfDelete(_wfDragSrc, done);
  }
  
  if (srcFocus) {
    wfSave(targetDate, srcFocus, done);
  } else {
    wfDelete(targetDate, done);
  }
}

// ── Initialize Cockpit ──
function wfInit() {
  // Load data then render
  wfLoad(function() {
    wfRenderStickyBanner();
    if (typeof renderCmd === 'function') renderCmd();
  });
}

// ── Inject sticky banner into DOM ──
function wfInjectBanner() {
  if (document.getElementById('cockpit-sticky-banner')) return;
  var banner = document.createElement('div');
  banner.id = 'cockpit-sticky-banner';
  var main = document.querySelector('.main');
  var topbar = document.querySelector('.topbar');
  if (main && topbar) {
    main.insertBefore(banner, topbar.nextSibling);
  }
}

// ── Inject modal into DOM ──
function wfInjectModal() {
  if (document.getElementById('cockpit-editor-modal')) return;
  var modal = document.createElement('div');
  modal.id = 'cockpit-editor-modal';
  modal.innerHTML = '<div class="cockpit-editor-box"></div>';
  modal.addEventListener('click', function(e) {
    if (e.target === modal) wfCloseEditor();
  });
  document.body.appendChild(modal);
}

// ── Patch renderCmd to include cockpit strip ──
var _origRenderCmd = null;
function wfPatchRenderCmd() {
  if (_origRenderCmd) return; // Already patched
  _origRenderCmd = renderCmd;
  renderCmd = function() {
    _origRenderCmd();
    // Inject cockpit strip at top of cmd page
    var el = document.getElementById('s-cmd');
    if (el) {
      var cockpitHtml = wfRenderWeekStrip();
      // Insert at the beginning
      el.insertAdjacentHTML('afterbegin', cockpitHtml);
    }
    wfRenderStickyBanner();
  };
}

// ── Boot ──
(function() {
  // Wait for DOM ready
  function boot() {
    wfInjectBanner();
    wfInjectModal();
    wfPatchRenderCmd();
    wfInit();
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    // DOM already ready, wait a tick for other scripts
    setTimeout(boot, 100);
  }
})();


</script>
