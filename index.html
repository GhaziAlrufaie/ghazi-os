function toggleCmdSec(key) {
  // Read current state from localStorage
  var stored = {};
  try { stored = JSON.parse(localStorage.getItem('cmdSecState') || '{}'); } catch(e){}
  // Default collapsed for zone2/zone3 sections
  var defaults = {overdue:false, decisions:false, health:false, calendar_upcoming:false, daily:false};
  var cur = stored[key] !== undefined ? stored[key] : (defaults[key] !== undefined ? defaults[key] : false);
  var next = !cur;
  stored[key] = next;
  localStorage.setItem('cmdSecState', JSON.stringify(stored));
  // Update DOM
  var body = document.getElementById('cmd-sec-body-'+key);
  var arrow = document.getElementById('cmd-sec-arrow-'+key);
  if (body) { body.classList.toggle('open', next); }
  if (arrow) { arrow.classList.toggle('open', next); }
}
function getCmdSecOpen(key) {
  var defaults = {overdue:false, decisions:false, health:false, calendar_upcoming:false, daily:false};
  try {
    var stored = JSON.parse(localStorage.getItem('cmdSecState') || '{}');
    return stored[key] !== undefined ? stored[key] : (defaults[key] !== undefined ? defaults[key] : true);
  } catch(e) { return defaults[key] !== undefined ? defaults[key] : true; }
}

// Upsert a single row to Supabase (fire-and-forget)
function sbUpsert(table, row) {
  if (!_sbReady || !_sb) return;
  _sb.from(table).upsert(row, {onConflict:'id'}).then(function(res){
    if (res.error) console.warn('[Supabase] upsert', table, res.error.message);
  });
}

// Delete a row from Supabase
function sbDelete(table, id) {
  if (!_sbReady || !_sb) return;
  _sb.from(table).delete().eq('id', id).then(function(res){
    if (res.error) console.warn('[Supabase] delete', table, res.error.message);
  });
}

// Upsert settings key
function sbSaveSettings(key, value) {
  if (!_sbReady || !_sb) return;
  _sb.from('app_settings').upsert({key: key, value: value}, {onConflict:'key'}).then(function(res){
    if (res.error) console.warn('[Supabase] settings', key, res.error.message);
  });
}

// ============================
// SUPABASE LOAD (async)
// ============================
function loadFromSupabase(callback) {
  if (!_sbReady || !_sb) { callback(false); return; }
  
  var results = {};
  var pending = 13;
  
  function done(key, data) {
    results[key] = data;
    pending--;
    if (pending === 0) callback(true, results);
  }
  
  function fetchTable(table, key) {
    _sb.from(table).select('*').then(function(res) {
      if (res.error) { console.warn('[Supabase] load', table, res.error.message); done(key, null); }
      else done(key, res.data);
    });
  }
  
  fetchTable('brands', 'brands');
  fetchTable('projects', 'projects');
  fetchTable('tasks', 'tasks');
  fetchTable('decisions', 'decisions');
  fetchTable('campaigns', 'campaigns');
  fetchTable('metrics', 'metrics');
  fetchTable('events', 'events');
  fetchTable('employees', 'employees');
  fetchTable('archive', 'archive');
  fetchTable('expenses', 'expenses');
  fetchTable('biz_expenses', 'biz_expenses');
  fetchTable('personal_tasks', 'personal_tasks');
  fetchTable('app_settings', 'app_settings');
}

  if (results.events && results.events.length) EVENTS = results.events.map(rowToEvent);
  if (results.employees && results.employees.length) EMPLOYEES = results.employees.map(rowToEmployee);
  if (results.archive && results.archive.length) ARCHIVE = results.archive;
  if (results.expenses && results.expenses.length) EXPENSES = results.expenses;
  if (results.biz_expenses && results.biz_expenses.length) BIZ_EXPENSES = results.biz_expenses;
  if (results.personal_tasks && results.personal_tasks.length) PERSONAL_TASKS = results.personal_tasks.map(rowToTask);
  
  // Apply settings
  if (results.app_settings && results.app_settings.length) {
    results.app_settings.forEach(function(s) {
      if (s.key === 'REMINDERS' && s.value) REMINDERS = s.value;
      if (s.key === 'DAILY_TASKS' && s.value) DAILY_TASKS = s.value;
      if (s.key === 'PERSONAL_CATS' && s.value) PERSONAL_CATS = s.value;
      if (s.key === 'FINANCE_TASKS' && s.value) FINANCE_TASKS = s.value;
      if (s.key === 'FINANCE_PROJECTS' && s.value) FINANCE_PROJECTS = s.value;
      if (s.key === 'FIN_BUDGET') state.finBudget = parseInt(s.value) || 0;
      if (s.key === 'FIN_COMPARE') state.finCompare = (s.value === 1 || s.value === '1' || s.value === true);
      if (s.key === 'FIN_PREV' && s.value) state.finPrev = s.value;
      if (s.key === 'FIN_SNAP_MONTH' && s.value) state.finSnapMonth = s.value;
      if (s.key === 'BIZ_BUDGET') state.bizBudget = parseInt(s.value) || 0;
      if (s.key === 'BIZ_COMPARE') state.bizCompare = (s.value === 1 || s.value === '1' || s.value === true);
      if (s.key === 'BIZ_PREV' && s.value) state.bizPrev = s.value;
      if (s.key === 'BIZ_SNAP_MONTH' && s.value) state.bizSnapMonth = s.value;
      if (s.key === 'FOCUS_STATE' && s.value) {
        var fs = s.value;
        if (fs.focusTaskId !== undefined) state.focusTaskId = fs.focusTaskId;
        if (fs.focusProjectId !== undefined) state.focusProjectId = fs.focusProjectId;
        if (fs.focusType !== undefined) state.focusType = fs.focusType;
        if (fs.focusTaskIndex !== undefined) state.focusTaskIndex = fs.focusTaskIndex;
        if (fs.focusDetailsOpen !== undefined) state.focusDetailsOpen = fs.focusDetailsOpen;
      }
      if (s.key === 'APP_STATE' && s.value) {
        var as = s.value;
        if (as.archive) state.archive = as.archive;
        if (as.useEasternNumerals !== undefined) state.useEasternNumerals = as.useEasternNumerals;
        if (as.dashPanels) state.dashPanels = as.dashPanels;
        if (as.dashOrder && as.dashOrder.length >= 5) state.dashOrder = as.dashOrder;
        if (as.activeMonth !== undefined) state.activeMonth = as.activeMonth;
        if (as.activeYear !== undefined) state.activeYear = as.activeYear;
      }
    });
  }
}

// ============================
// MIGRATION: localStorage → Supabase
// ============================
function migrateLocalToSupabase() {
  var migKey = 'ghazi_sb_migrated_v1';
  if (localStorage.getItem(migKey)) return; // already migrated
  
  var saved = localStorage.getItem('ghazi-os-v8');
  if (!saved) { localStorage.setItem(migKey, '1'); return; } // nothing to migrate
  
  console.log('[Migration] Starting localStorage → Supabase migration...');
  showToast('جاري نقل بياناتك إلى السحابة...', 'wrn', 8000);
  
  try {
    var d = JSON.parse(saved);
    
    // Upload all data to Supabase
    var promises = [];
    
    if (d.brands && d.brands.length) {
      promises.push(_sb.from('brands').upsert(d.brands.map(brandToRow), {onConflict:'id'}));
    }
    if (d.projects && d.projects.length) {
      promises.push(_sb.from('projects').upsert(d.projects.map(projectToRow), {onConflict:'id'}));
    }
    if (d.tasks && d.tasks.length) {
      var taskBatches = [];
      for (var i=0; i<d.tasks.length; i+=50) taskBatches.push(d.tasks.slice(i,i+50));
      taskBatches.forEach(function(b){ promises.push(_sb.from('tasks').upsert(b.map(taskToRow), {onConflict:'id'})); });
    }
    if (d.decisions && d.decisions.length) {
      promises.push(_sb.from('decisions').upsert(d.decisions.map(decisionToRow), {onConflict:'id'}));
    }
    if (d.employees && d.employees.length) {
      promises.push(_sb.from('employees').upsert(d.employees.map(employeeToRow), {onConflict:'id'}));
    }
    if (d.personalTasks && d.personalTasks.length) {
      promises.push(_sb.from('personal_tasks').upsert(d.personalTasks.map(taskToRow), {onConflict:'id'}));
    }
    if (d.expenses && d.expenses.length) {
      promises.push(_sb.from('expenses').upsert(d.expenses.map(expenseToRow), {onConflict:'id'}));
    }
    if (d.bizExpenses && d.bizExpenses.length) {
      promises.push(_sb.from('biz_expenses').upsert(d.bizExpenses.map(expenseToRow), {onConflict:'id'}));
    }
    if (d.events && d.events.length) {
      promises.push(_sb.from('events').upsert(d.events.map(eventToRow), {onConflict:'id'}));
    }
    if (d.archive && d.archive.length) {
      promises.push(_sb.from('archive').upsert(d.archive, {onConflict:'id'}));
    }
    
    // Settings
    var settingsRows = [];
    if (d.reminders) settingsRows.push({key:'REMINDERS', value:d.reminders});
    if (d.dailyTasks) settingsRows.push({key:'DAILY_TASKS', value:d.dailyTasks});
    if (d.personalCats) settingsRows.push({key:'PERSONAL_CATS', value:d.personalCats});
    if (d.financeTasks) settingsRows.push({key:'FINANCE_TASKS', value:d.financeTasks});
    if (d.financeProjects) settingsRows.push({key:'FINANCE_PROJECTS', value:d.financeProjects});
    settingsRows.push({key:'FOCUS_STATE', value:{
      focusTaskId: d.focusTaskId, focusProjectId: d.focusProjectId,
      focusType: d.focusType, focusTaskIndex: d.focusTaskIndex,
      focusDetailsOpen: d.focusDetailsOpen
    }});
    if (d.state) settingsRows.push({key:'APP_STATE', value:d.state});
    if (settingsRows.length) {
      promises.push(_sb.from('app_settings').upsert(settingsRows, {onConflict:'key'}));
    }
    
    Promise.all(promises).then(function(results) {
      var hasError = results.some(function(r){ return r && r.error; });
      if (hasError) {
        console.warn('[Migration] Some errors occurred');
        showToast('تحذير: بعض البيانات لم تُنقل بالكامل', 'err', 5000);
      } else {
        localStorage.setItem(migKey, '1');
        showToast('✓ تم نقل بياناتك إلى السحابة بنجاح', 'ok', 4000);
        console.log('[Migration] Complete!');
      }
    }).catch(function(e) {
      console.error('[Migration] Error:', e);
      showToast('خطأ في نقل البيانات — ستبقى محفوظة محلياً', 'err', 5000);
    });
    
  } catch(e) {
    console.error('[Migration] Parse error:', e);
  }
}

// loadData: يقرأ من localStorage (كاشه) أولاً للسرعة، ثم يحدّث من Supabase في الخلفية
function loadData() {
  // 1. Load from localStorage cache first (instant)
  try {
    var saved = localStorage.getItem('ghazi-os-v8');
    if (saved) {
      var d = JSON.parse(saved);
      if (d.brands) BRANDS = d.brands;
      if (d.projects) PROJECTS = d.projects;
      if (d.tasks) TASKS = d.tasks;
      if (d.decisions) DECISIONS = d.decisions;
      if (d.campaigns) CAMPAIGNS = d.campaigns;
      if (d.metrics) METRICS = d.metrics;
      if (d.events) EVENTS = d.events;
      if (d.archive) ARCHIVE = d.archive;
      if (d.employees) EMPLOYEES = d.employees;
      if (d.expenses) EXPENSES = d.expenses;
      if (d.bizExpenses) BIZ_EXPENSES = d.bizExpenses;
      if (d.personalTasks) PERSONAL_TASKS = d.personalTasks;
      if (d.personalCats) PERSONAL_CATS = d.personalCats;
      if (d.financeTasks) FINANCE_TASKS = d.financeTasks;
      if (d.financeProjects) FINANCE_PROJECTS = d.financeProjects;
      if (d.reminders) REMINDERS = d.reminders;
      if (d.dailyTasks) DAILY_TASKS = d.dailyTasks;
      if (d.focusTaskId !== undefined) state.focusTaskId = d.focusTaskId;
      if (d.focusProjectId !== undefined) state.focusProjectId = d.focusProjectId;
      if (d.focusType !== undefined) state.focusType = d.focusType;
      if (d.focusTaskIndex !== undefined) state.focusTaskIndex = d.focusTaskIndex;
      if (d.focusDetailsOpen !== undefined) state.focusDetailsOpen = d.focusDetailsOpen;
      if (d.state) {
        state.archive = d.state.archive || {tasks:[],decisions:[]};
        state.useEasternNumerals = d.state.useEasternNumerals !== undefined ? d.state.useEasternNumerals : true;
        state.dashPanels = d.state.dashPanels || state.dashPanels;
        if (d.state.dashOrder && d.state.dashOrder.length >= 5) state.dashOrder = d.state.dashOrder;
        if (d.state.activeMonth !== undefined) state.activeMonth = d.state.activeMonth;
        if (d.state.activeYear !== undefined) state.activeYear = d.state.activeYear;
      }
    }
  } catch(e) { console.log('Load error', e); }
}

  if (!_sbReady || !_sb) return;

// Debounced Supabase sync (waits 1.5s after last change)
var _sbSyncTimer = null;
function scheduleSbSync() {
  if (!_sbReady || !_sb) return;
  clearTimeout(_sbSyncTimer);
  _sbSyncTimer = setTimeout(function() { syncAllToSupabase(); }, 1500);
}

// Full sync to Supabase
function syncAllToSupabase() {
  if (!_sbReady || !_sb) return;
  var p = [];
  // Brands
  if (BRANDS.length) p.push(_sb.from('brands').upsert(BRANDS.map(brandToRow), {onConflict:'id'}));
  // Projects
  if (PROJECTS.length) p.push(_sb.from('projects').upsert(PROJECTS.map(projectToRow), {onConflict:'id'}));
  // Tasks (in batches)
  for (var i=0; i<TASKS.length; i+=50) {
    var b = TASKS.slice(i,i+50);
    p.push(_sb.from('tasks').upsert(b.map(taskToRow), {onConflict:'id'}));
  }
  // Decisions
  if (DECISIONS.length) p.push(_sb.from('decisions').upsert(DECISIONS.map(decisionToRow), {onConflict:'id'}));
  // Employees
  if (EMPLOYEES.length) p.push(_sb.from('employees').upsert(EMPLOYEES.map(employeeToRow), {onConflict:'id'}));
  // Events
  if (EVENTS.length) p.push(_sb.from('events').upsert(EVENTS.map(eventToRow), {onConflict:'id'}));
  // Archive
  if (ARCHIVE.length) p.push(_sb.from('archive').upsert(ARCHIVE, {onConflict:'id'}));
  // Expenses
  if (EXPENSES.length) p.push(_sb.from('expenses').upsert(EXPENSES.map(expenseToRow), {onConflict:'id'}));
  if (BIZ_EXPENSES.length) p.push(_sb.from('biz_expenses').upsert(BIZ_EXPENSES.map(expenseToRow), {onConflict:'id'}));
  // Personal Tasks
  for (var j=0; j<PERSONAL_TASKS.length; j+=50) {
    var pb = PERSONAL_TASKS.slice(j,j+50);
    p.push(_sb.from('personal_tasks').upsert(pb.map(taskToRow), {onConflict:'id'}));
  }
  // Settings
  var settings = [
    {key:'REMINDERS', value:REMINDERS},
    {key:'DAILY_TASKS', value:DAILY_TASKS},
    {key:'PERSONAL_CATS', value:PERSONAL_CATS},
    {key:'FINANCE_TASKS', value:FINANCE_TASKS},
    {key:'FINANCE_PROJECTS', value:FINANCE_PROJECTS},
    {key:'FOCUS_STATE', value:{focusTaskId:state.focusTaskId, focusProjectId:state.focusProjectId, focusType:state.focusType, focusTaskIndex:state.focusTaskIndex, focusDetailsOpen:state.focusDetailsOpen}},
    {key:'APP_STATE', value:{archive:state.archive, useEasternNumerals:state.useEasternNumerals, dashPanels:state.dashPanels, dashOrder:state.dashOrder, activeMonth:state.activeMonth, activeYear:state.activeYear}},
    {key:'FIN_BUDGET', value:state.finBudget || 0},
    {key:'FIN_COMPARE', value:state.finCompare ? 1 : 0},
    {key:'FIN_PREV', value:state.finPrev || null},
    {key:'FIN_SNAP_MONTH', value:state.finSnapMonth || null},
    {key:'BIZ_BUDGET', value:state.bizBudget || 0},
    {key:'BIZ_COMPARE', value:state.bizCompare ? 1 : 0},
    {key:'BIZ_PREV', value:state.bizPrev || null},
    {key:'BIZ_SNAP_MONTH', value:state.bizSnapMonth || null}
  ];
  p.push(_sb.from('app_settings').upsert(settings, {onConflict:'key'}));
  
  Promise.all(p).then(function(results) {
    var errs = results.filter(function(r){ return r && r.error; });
    if (errs.length) console.warn('[Supabase] Sync errors:', errs.map(function(r){ return r.error.message; }));
    else console.log('[Supabase] Sync complete');
  }).catch(function(e){ console.warn('[Supabase] Sync failed:', e); });
}

  });

function calculateMonthlyFixed() {
  var fixed = EMPLOYEES.filter(function(e){ return e.status === 'active' && e.salaryType === 'fixed'; })
    .reduce(function(sum, e){ return sum + (e.salaryAmount || 0); }, 0);
  var variable = EMPLOYEES.filter(function(e){
    return e.status === 'active' && (e.salaryType === 'commission' || e.salaryType === 'per_unit' || e.salaryType === 'freelance');
  }).length;
  return {fixed: fixed, variable: variable};
}

function isLastDayOfMonth() {
  var now = new Date();
  var tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  return tomorrow.getDate() === 1;
}

function getOverdueHRDecisions() {
  var now = new Date();
  return DECISIONS.filter(function(d){
    if (d.type !== 'hr' || d.status !== 'pending') return false;
    var created = new Date(d.createdAt || d.deadline || now);
    var days = Math.floor((now - created) / 86400000);
    return days > 7;
  });
}

function isCurrentMonth() {
  var now = new Date();
  return state.activeMonth === now.getMonth() && state.activeYear === now.getFullYear();
}

function monthNav(dir) {
  var m = state.activeMonth + dir;
  var y = state.activeYear;
  if (m > 11) { m = 0; y++; }
  if (m < 0) { m = 11; y--; }
  state.activeMonth = m;
  state.activeYear = y;
  state.calMonth = m;
  state.calYear = y;
  updateMonthBar();
  render();
}

function goToCurrentMonth() {
  var now = new Date();
  state.activeMonth = now.getMonth();
  state.activeYear = now.getFullYear();
  state.calMonth = now.getMonth();
  state.calYear = now.getFullYear();
  updateMonthBar();
  render();
  document.getElementById('month-picker').classList.remove('on');
}

function toggleMonthPicker() {
  var picker = document.getElementById('month-picker');
  var isOpen = picker.classList.contains('on');
  if (isOpen) {
    picker.classList.remove('on');
  } else {
    state.pickerYear = state.activeYear;
    renderMonthPicker();
    picker.classList.add('on');
  }
}

function pickerYearNav(dir) {
  state.pickerYear += dir;
  renderMonthPicker();
}

function renderMonthPicker() {
  document.getElementById('mp-year-label').textContent = num(state.pickerYear);
  var html = MONTHS.map(function(m, i) {
    var isCur = (i === state.activeMonth && state.pickerYear === state.activeYear);
    return '<div class="mp-m '+(isCur?'cur':'')+'" onclick="selectMonth('+i+','+state.pickerYear+')">'+m+'</div>';
  }).join('');
  document.getElementById('mp-months').innerHTML = html;

function selectMonth(m, y) {
  state.activeMonth = m;
  state.activeYear = y;
  state.calMonth = m;
  state.calYear = y;
  document.getElementById('month-picker').classList.remove('on');
  updateMonthBar();
  render();
}

function updateMonthBar() {
  var now = new Date();
  var isCurrent = isCurrentMonth();
  var label = MONTHS[state.activeMonth] + ' ' + num(state.activeYear);
  var el = document.getElementById('mb-label');
  if (el) {
    el.textContent = isCurrent ? '📅 ' + label + ' — الحالي' : '📅 ' + label;
    el.className = 'mb-cur' + (isCurrent ? '' : ' past');
  }
  var badge = document.getElementById('past-mode-badge');
  var badgeLabel = document.getElementById('past-mode-label');
  if (badge && badgeLabel) {
    if (!isCurrent) {
      badge.classList.add('on');
      badgeLabel.textContent = 'تصفح: ' + MONTHS[state.activeMonth] + ' ' + num(state.activeYear);
    } else {
      badge.classList.remove('on');
    }
  }
  // Close picker on outside click
  document.addEventListener('click', function handler(e) {
    var picker = document.getElementById('month-picker');
    var wrap = document.querySelector('.month-bar-wrap');
    if (picker && wrap && !wrap.contains(e.target)) {
      picker.classList.remove('on');
      document.removeEventListener('click', handler);
    }
  });
}

function calcBrandHealth(brandId) {
  var tasks = TASKS.filter(function(t){ return t.brandId === brandId && t.projectId; });
  if (!tasks.length) return 75;
  var done = tasks.filter(function(t){ return t.status === 'done'; }).length;
  var overdue = tasks.filter(function(t){ return t.status !== 'done' && t.dueDate && new Date(t.dueDate) < new Date(); }).length;
  var base = tasks.length ? Math.round(done / tasks.length * 100) : 50;
  return Math.max(0, Math.min(100, base - overdue * 5 + 20));
}

function calcProjectProgress(projectId) {
  var tasks = TASKS.filter(function(t){ return t.projectId === projectId; });
  if (!tasks.length) return 0;
  return Math.round(tasks.filter(function(t){ return t.status === 'done'; }).length / tasks.length * 100);
}

function isOverdue(task) {
  return task.status !== 'done' && task.status !== 'cancelled' && task.dueDate && new Date(task.dueDate) < new Date();
}

function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function priorityLabel(p) {
  return {critical:'حرج',high:'عالي',medium:'متوسط',low:'منخفض'}[p] || p;
}

function statusLabel(s) {
  return {todo:'قيد الانتظار',in_progress:'جاري',waiting:'منتظر',done:'مكتمل',cancelled:'ملغي',planning:'تخطيط',active:'نشط',blocked:'موقوف',completed:'مكتمل',archived:'مؤرشف',draft:'مسودة',planned:'مخطط',selling:'بيع',paused:'موقوف'}[s] || s;
}

function impactLabel(i) { return {high:'عالي',medium:'متوسط',low:'منخفض'}[i] || i; }

function daysLeft(dateStr) {
  if (!dateStr) return null;
  var diff = Math.ceil((new Date(dateStr) - new Date()) / 86400000);
  return diff;
}

function daysLeftLabel(dateStr) {
  var d = daysLeft(dateStr);
  if (d === null) return '';
  if (d < 0) return 'متأخر ' + num(Math.abs(d)) + ' يوم';
  if (d === 0) return 'اليوم';
  if (d === 1) return 'غداً';
  return num(d) + ' أيام متبقية';
}

function genId() { return 'x' + Date.now() + Math.random().toString(36).substr(2,5); }

function snap(msg) {
  var s = JSON.stringify({brands:BRANDS,projects:PROJECTS,tasks:TASKS,decisions:DECISIONS,campaigns:CAMPAIGNS,metrics:METRICS,events:EVENTS,employees:EMPLOYEES,expenses:EXPENSES});
  state.undoStack.push({s:s,msg:msg});
  if (state.undoStack.length > 20) state.undoStack.shift();
}

function doUndo() {
  if (!state.undoStack.length) return;
  var u = state.undoStack.pop();
  var d = JSON.parse(u.s);
  BRANDS = d.brands; PROJECTS = d.projects; TASKS = d.tasks;
  DECISIONS = d.decisions; CAMPAIGNS = d.campaigns; METRICS = d.metrics; EVENTS = d.events;
  if (d.employees) EMPLOYEES = d.employees;
  saveData(); toast('↩ تراجعنا!', 'wrn'); render();
}

// ── Brand Nav Drag-to-Reorder ──
var _brandDragId = null;
function brandNavDragStart(e) {
  _brandDragId = e.currentTarget.dataset.bid;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function brandNavDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  var el = e.currentTarget;
  el.classList.remove('drag-over-top','drag-over-bot');
  var rect = el.getBoundingClientRect();
  if (e.clientY < rect.top + rect.height / 2) {
    el.classList.add('drag-over-top');
  } else {
    el.classList.add('drag-over-bot');
  }
}
function brandNavDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-top','drag-over-bot');
}
function brandNavDrop(e) {
  e.preventDefault();
  var targetId = e.currentTarget.dataset.bid;
  e.currentTarget.classList.remove('drag-over-top','drag-over-bot');
  if (!_brandDragId || _brandDragId === targetId) return;
  // Determine insert position
  var rect = e.currentTarget.getBoundingClientRect();
  var insertBefore = e.clientY < rect.top + rect.height / 2;
  // Build current sorted order
  var sorted = BRANDS.slice().sort(function(a,b){ return (a.navOrder||0)-(b.navOrder||0); });
  var dragIdx = sorted.findIndex(function(b){ return b.id === _brandDragId; });
  var targetIdx = sorted.findIndex(function(b){ return b.id === targetId; });
  if (dragIdx === -1 || targetIdx === -1) return;
  var dragged = sorted.splice(dragIdx, 1)[0];
  targetIdx = sorted.findIndex(function(b){ return b.id === targetId; });
  var insertIdx = insertBefore ? targetIdx : targetIdx + 1;
  sorted.splice(insertIdx, 0, dragged);
  // Save navOrder back
  sorted.forEach(function(b, i){ b.navOrder = i; });
  saveData();
  renderNav();
}
function brandNavDragEnd(e) {
  e.currentTarget.classList.remove('dragging','drag-over-top','drag-over-bot');
  _brandDragId = null;
}

function renderNav() {
  var pendingDec = DECISIONS.filter(function(d){ return d.status === 'pending'; }).length;
  var overdueTasks = TASKS.filter(function(t){ return isOverdue(t); }).length;

  var html = '';
  NAV_ITEMS.forEach(function(item) {
    if (item.id === 'brands') {
      var hdrActive = state.currentPage === 'brands' || state.currentPage === 'brand-detail';
      html += '<div class="sn-brands-hdr '+(hdrActive?'on':'')+' " onclick="go(\'brands\')">'+item.icon+'<span>البراندات</span><span class="sn-chevron '+(state.brandsExpanded?'open':'')+' " onclick="event.stopPropagation();toggleBrandsExpanded()">&#x25BE;</span></div>';
      var activeBrands = BRANDS.filter(function(b){ return b.status !== 'archived'; });
      html += '<div class="sn-brand-group" style="max-height:'+(state.brandsExpanded?(activeBrands.length*34+4)+'px':'0')+'">';
      var sortedBrands = BRANDS.slice().sort(function(a,b){ return (a.navOrder||0)-(b.navOrder||0); });
      sortedBrands.forEach(function(b) {
        var bActive = state.currentPage === 'brand-detail' && state.currentBrandId === b.id;
        var dotColor = b.color || '#888';
        html += '<div class="sn-brand '+(bActive?'on':'')+' " draggable="true" data-bid="'+b.id+'" onclick="go(\'brand-detail\',\''+b.id+'\')" ondragstart="brandNavDragStart(event)" ondragover="brandNavDragOver(event)" ondragleave="brandNavDragLeave(event)" ondrop="brandNavDrop(event)" ondragend="brandNavDragEnd(event)">';
        html += '<span class="dot" style="background:'+dotColor+'"></span>';
        html += '<span>'+b.name+'</span>';
        html += '</div>';
      });
      html += '</div>';
    } else {

      var active = state.currentPage === item.id;
      html += '<div class="sn '+(active?'on':'')+' " onclick="go(\''+item.id+'\')">' +item.icon+'<span>'+item.label+'</span>'+bdg+'</div>';

  var pageTitle = titles[state.currentPage] || '';
  if (state.currentPage === 'brand-detail' && state.currentBrandId) {
    var ab = BRANDS.find(function(b){ return b.id === state.currentBrandId; });

  }
  document.getElementById('page-title').textContent = pageTitle;

  var actions = '';
  if (state.currentPage === 'cmd') actions = '<button class="btn btn-sm" onclick="quickAddM()">⌘K إضافة</button>';
  if (state.currentPage === 'brands' || state.currentPage === 'brand-detail') actions = '<button class="btn btn-sm" onclick="addBrandM()">+ براند</button>';
  if (state.currentPage === 'tasks') actions = '<button class="btn btn-sm" onclick="addTaskM()">+ مهمة</button>';
  if (state.currentPage === 'decisions') actions = '<button class="btn btn-sm" onclick="quickAddM()">+ قرار</button>';
  if (state.currentPage === 'performance') actions = '<button class="btn btn-sm" onclick="addMetricM()">+ بيانات</button>';
  document.getElementById('topbar-actions').innerHTML = actions;
}

// ============================
// COMMAND CENTER
// ============================
function renderCmd() {
  var el = document.getElementById('s-cmd');
  var now = new Date();
  var today = todayStr();

  // Today's tasks (due today or overdue)
  var todayTasks = TASKS.filter(function(t){
    return t.status !== 'done' && t.status !== 'cancelled' && t.dueDate && (t.dueDate === today || new Date(t.dueDate) < now);
  }).sort(function(a,b){
    var po = {critical:0,high:1,medium:2,low:3};
    return (po[a.priority]||3) - (po[b.priority]||3);
  });

  var overdueTasks = todayTasks.filter(function(t){ return t.dueDate < today; });
  var dueTodayTasks = todayTasks.filter(function(t){ return t.dueDate === today; });

  // Pending decisions
  var pendingDec = DECISIONS.filter(function(d){ return d.status === 'pending'; })
    .sort(function(a,b){
      var ia = {high:0,medium:1,low:2}[a.impact]||1;
      var ib = {high:0,medium:1,low:2}[b.impact]||1;
      if (ia !== ib) return ia - ib;
      if (a.deadline && b.deadline) return new Date(a.deadline) - new Date(b.deadline);
      return 0;
    });

  // Top focus task — new pick-list logic
  // Collect best candidate from each brand (active/selling) + personal + finance
  var focusCandidates = [];
  // Add end-of-month financial tasks at the TOP of the pick list
  if (isLastDayOfMonth()) {
    var mf = calculateMonthlyFixed();
    var expTotal = calcExpenseTotal();
    focusCandidates.push({
      task: {id: '__salary_review__', title: 'مراجعة الرواتب — '+fmt(mf.fixed)+' ريال'+(mf.variable?' + '+num(mf.variable)+' متغير':''), status: 'todo', priority: 'critical'},
      brand: {name: 'حسابات وماليات', color: '#C9A84C', icon: ''},
      isSpecial: true,
      specialAction: "go('settings')"
    });
    focusCandidates.push({
      task: {id: '__expense_review__', title: 'مراجعة المصاريف الشهرية — '+fmt(expTotal)+' ريال', status: 'todo', priority: 'critical'},
      brand: {name: 'الإعدادات', color: '#C9A84C', icon: ''},
      isSpecial: true,
      specialAction: "go('settings')"
    });
  }
  // ── Build allFocusCandidates: projects + standalone tasks ──
  var allFocusCandidates = [];
  var prioRank = {critical:0, high:1, medium:2, low:3};
  // Add active projects from each brand
  BRANDS.forEach(function(b) {
    if (b.status !== 'active' && b.status !== 'selling') return;
    var bProjs = PROJECTS.filter(function(p){ return p.brandId === b.id; });
    bProjs.forEach(function(p) {
      var activeTasks = TASKS.filter(function(t){ return t.projectId === p.id && (t.status === 'todo' || t.status === 'in_progress'); });
      if (!activeTasks.length) return;
      // Project priority = highest task priority
      var topPrio = activeTasks.reduce(function(best, t){ return (prioRank[t.priority]||3) < (prioRank[best.priority]||3) ? t : best; }, activeTasks[0]);
      allFocusCandidates.push({
        id: p.id, type: 'project', title: p.title,
        brandId: b.id, brandName: b.name, brandColor: b.color,
        priority: topPrio.priority, dueDate: topPrio.dueDate || null
      });
    });
    // Standalone brand tasks (no projectId)
    var standaloneTasks = TASKS.filter(function(t){ return t.brandId === b.id && !t.projectId && (t.status === 'todo' || t.status === 'in_progress'); });
    standaloneTasks.forEach(function(t) {
      allFocusCandidates.push({
        id: t.id, type: 'task', title: t.title,
        brandId: b.id, brandName: b.name, brandColor: b.color,
        priority: t.priority, dueDate: t.dueDate || null
      });
    });
  });
  // Personal tasks
  PERSONAL_TASKS.filter(function(t){ return t.status === 'todo' || t.status === 'in_progress'; }).forEach(function(t) {
    allFocusCandidates.push({
      id: t.id, type: 'task', title: t.title,
      brandId: null, brandName: 'شخصي', brandColor: '#888',
      priority: t.priority, dueDate: t.dueDate || null
    });
  });
  // Finance tasks
  FINANCE_TASKS.filter(function(t){ return t.status === 'todo' || t.status === 'in_progress'; }).forEach(function(t) {
    allFocusCandidates.push({
      id: t.id, type: 'task', title: t.title,
      brandId: null, brandName: 'حسابات وماليات', brandColor: '#4CAF50',
      priority: t.priority, dueDate: t.dueDate || null
    });
  });
  // Sort by priority then dueDate
  allFocusCandidates.sort(function(a, b) {
    var pa = prioRank[a.priority] !== undefined ? prioRank[a.priority] : 3;
    var pb = prioRank[b.priority] !== undefined ? prioRank[b.priority] : 3;
    if (pa !== pb) return pa - pb;
    return (a.dueDate||'9999') > (b.dueDate||'9999') ? 1 : -1;
  });
  // Extract special candidates (end-of-month) from old focusCandidates
  var specialCands = focusCandidates.filter(function(c){ return c.isSpecial; });
  // Determine focusMode
  var focusMode = state.focusType || null;
  var focusProject = null;
  var focusTask = null;
  var focusBrand = null;
  if (focusMode === 'project' && state.focusProjectId) {
    focusProject = PROJECTS.find(function(p){ return p.id === state.focusProjectId; });
    if (!focusProject) { state.focusProjectId = null; state.focusType = null; focusMode = null; }
    else {
      focusBrand = BRANDS.find(function(b){ return b.id === focusProject.brandId; }) || {name:'براند', color:'#888'};
    }
  } else if (focusMode === 'task' && state.focusTaskId) {
    var allTasks2 = TASKS.concat(PERSONAL_TASKS).concat(FINANCE_TASKS);
    var ft2 = allTasks2.find(function(t){ return t.id === state.focusTaskId; });
    if (ft2 && ft2.status !== 'done' && ft2.status !== 'cancelled') {
      focusTask = ft2;
      var fb2 = ft2.brandId ? BRANDS.find(function(b){ return b.id === ft2.brandId; }) : null;
      focusBrand = fb2 || {name: PERSONAL_TASKS.indexOf(ft2) >= 0 ? 'شخصي' : 'حسابات وماليات', color: '#888', icon: ''};
    } else {
      state.focusTaskId = null; state.focusType = null; focusMode = null;
    }
  }
  // Helper: get active tasks in project
  function getProjectActiveTasks(projId) {
    return TASKS.filter(function(t){ return t.projectId === projId && (t.status === 'todo' || t.status === 'in_progress'); })
      .sort(function(a,b){ var po={critical:0,high:1,medium:2,low:3}; return (po[a.priority]||3)-(po[b.priority]||3); });
  }
  // Helper: get project progress
  function getProjectProgress(projId) {
    var all = TASKS.filter(function(t){ return t.projectId === projId && t.status !== 'cancelled'; });
    var done = all.filter(function(t){ return t.status === 'done'; });
    return {total: all.length, done: done.length};
  }

  // Brand health
  var healthHtml = BRANDS.map(function(b){
    var h = calcBrandHealth(b.id);
    var hColor = h >= 70 ? 'var(--success)' : h >= 40 ? 'var(--warning)' : 'var(--danger)';
    var statusColors = {active:'var(--success)',selling:'var(--accent)',paused:'var(--warning)',archived:'var(--txt3)'};
    var statusColor = statusColors[b.status] || 'var(--txt3)';
    var statusLabel = function(s){return {active:'نشط',selling:'بيع',paused:'موقف',archived:'أرشيف'}[s]||s;};
    return '<div class="brand-compact-card" onclick="go(\'brand-detail\',\''+b.id+'\')" style="border-top:2px solid '+b.color+'"><div style="font-size:16px;margin-bottom:3px">'+b.icon+'</div><div style="font-size:10px;font-weight:700;color:var(--txt);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+b.name+'</div><div style="font-size:14px;font-weight:800;color:'+hColor+'">'+num(h)+'%</div><div class="progress-bar" style="margin:3px 0;height:3px"><div class="progress-fill" style="width:'+h+'%;background:'+hColor+'"></div></div><div style="font-size:9px;color:'+statusColor+';font-weight:600">'+statusLabel(b.status)+'</div></div>';
  }).join('');
  // Today's tasks section removed

  // Pending decisions
  var decHtml = '<div class="pnl" style="border-color:rgba(245,158,11,0.15)"><div class="pnl-h"><h3 style="color:var(--warning)">⚖️ قرارات معلقة</h3><span class="badge badge-warning">'+num(pendingDec.length)+'</span></div>';
  if (!pendingDec.length) {
    decHtml += '<div style="text-align:center;padding:16px;color:var(--txt3);font-size:12px">✅ كل القرارات محسومة!</div>';
  } else {
    pendingDec.slice(0,5).forEach(function(d){
      var bc = d.brandId ? brandColor(d.brandId) : '#555';
      decHtml += '<div style="padding:8px 0;border-bottom:1px solid var(--brd);cursor:pointer" onclick="go(\'decisions\')">';
      decHtml += '<div style="font-size:12px;font-weight:600;margin-bottom:4px">'+d.title+'</div>';
      decHtml += '<div style="display:flex;gap:8px;align-items:center">';
      decHtml += '<span class="badge '+(d.impact==='high'?'badge-danger':d.impact==='medium'?'badge-warning':'badge-muted')+'">'+impactLabel(d.impact)+'</span>';
      if (d.deadline) decHtml += '<span style="font-size:10px;color:'+(daysLeft(d.deadline)<3?'var(--danger)':'var(--txt2)')+'">'+daysLeftLabel(d.deadline)+'</span>';
      if (d.brandId) decHtml += '<span class="brand-tag" style="background:'+bc+'22;color:'+bc+'">'+brandName(d.brandId)+'</span>';
      decHtml += '</div></div>';
    });
  }
  decHtml += '</div>';

  // Calendar mini
  var calHtml = '<div class="pnl"><div class="pnl-h"><h3>📅 '+MONTHS[state.calMonth]+' '+num(state.calYear)+'</h3></div>'+buildCalGrid(state.calMonth,state.calYear)+'</div>';

  // Upcoming events
  var upcomingHtml = '<div class="pnl"><div class="pnl-h"><h3>📌 قادم</h3></div>';
  var upcoming = EVENTS.filter(function(e){ return e.month === state.calMonth && e.year === state.calYear && e.day >= now.getDate(); }).sort(function(a,b){ return a.day - b.day; });
  if (!upcoming.length) upcomingHtml += '<div style="text-align:center;padding:12px;color:var(--txt3);font-size:11px">لا توجد أحداث قادمة</div>';
  upcoming.slice(0,5).forEach(function(e){
    var bc = e.brandId ? brandColor(e.brandId) : '#555';
    upcomingHtml += '<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--brd)"><div style="min-width:22px;color:var(--gold);font-weight:700;font-size:11px">'+num(e.day)+'</div><div style="flex:1;font-size:11px">'+e.title+'</div>';
    if (e.brandId) upcomingHtml += '<span style="font-size:9px;color:'+bc+'">'+brandName(e.brandId)+'</span>';
    upcomingHtml += '</div>';
  });
  upcomingHtml += '</div>';

  // Focus hero — pick-list or selected task
  var heroHtml = '<div class="hero">';
  heroHtml += '<div class="hero-lbl"><span class="pulse"></span>الشيء الواحد الآن</div>';
  if (focusTask) {
    var bc = focusBrand ? focusBrand.color : '#555';
    heroHtml += '<div class="hero-t">'+focusTask.title+'</div>';
    heroHtml += '<div class="hero-b" style="color:'+bc+'">'+(focusBrand ? focusBrand.name : brandName(focusTask.brandId))+'</div>';
    heroHtml += '<div class="fates">';
    heroHtml += '<button class="ft f1" onclick="focusDone(\''+focusTask.id+'\')">✓ خلصت</button>';
    heroHtml += '<button class="ft f2" onclick="focusBlock(\''+focusTask.id+'\')">⊘ عائق</button>';
    heroHtml += '<button class="ft f3" onclick="focusSnooze(\''+focusTask.id+'\')">◷ بعدين</button>';
    heroHtml += '<button class="ft f4" onclick="focusDrop(\''+focusTask.id+'\')">✕ أتركه</button>';
    heroHtml += '</div>';
  } else {
    // Show pick list
    if (!focusCandidates.length) {
      heroHtml += '<div class="focus-empty">ما فيه مهام حالياً — أجاد!</div>';
    } else {
      heroHtml += '<div style="font-size:11px;color:var(--txt3);margin-bottom:8px">اختر مهمة تركز عليها الآن:</div>';
      heroHtml += '<div class="focus-pick-list">';
      focusCandidates.forEach(function(c) {
        var bColor = c.brand.color || '#888';
        var prioColors = {critical:'#FF3B30', high:'#FF9500', medium:'#FFCC00', low:'#AEAEB2'};
        var prioColor = c.isSpecial ? bColor : (prioColors[c.task.priority] || '#AEAEB2');
        if (c.isSpecial) {
          heroHtml += '<button class="focus-pick-item" onclick="'+c.specialAction+'" style="border-right:2px solid var(--gold);padding-right:8px">';
          heroHtml += '<span class="focus-pick-dot" style="background:'+prioColor+'"></span>';
          heroHtml += '<span class="focus-pick-title" style="color:var(--gold)">'+c.task.title+'</span>';
          heroHtml += '<span class="focus-pick-brand">'+c.brand.name+'</span>';
          heroHtml += '</button>';
        } else {
          heroHtml += '<button class="focus-pick-item" onclick="setFocusTask(\''+c.task.id+'\')">';
          heroHtml += '<span class="focus-pick-dot" style="background:'+prioColor+'"></span>';
          heroHtml += '<span class="focus-pick-title">'+c.task.title+'</span>';
          heroHtml += '<span class="focus-pick-brand">'+c.brand.name+'</span>';
          heroHtml += '</button>';
        }
      });
      heroHtml += '</div>';
    }
  }
  heroHtml += '</div>';

  // HR: Salary reminder (last day of month) + overdue HR decisions
  var hrHtml = '';
  var overdueHRDec = getOverdueHRDecisions();
  if (overdueHRDec.length) {
    hrHtml += '<div class="pnl" style="border-color:rgba(139,92,246,0.25);background:rgba(139,92,246,0.03)"><div class="pnl-h"><h3 style="color:var(--purple)">👥 قرارات فريق متأخرة</h3><span class="badge" style="background:rgba(139,92,246,0.2);color:var(--purple)">'+num(overdueHRDec.length)+'</span></div>';
    overdueHRDec.forEach(function(d){
      var emp = d.linkedEmployeeId ? getEmployee(d.linkedEmployeeId) : null;
      var created = new Date(d.createdAt || d.deadline || now);
      var days = Math.floor((now - created) / 86400000);
      hrHtml += '<div style="padding:6px 0;border-bottom:1px solid var(--brd);cursor:pointer" onclick="go(\'decisions\')">';
      hrHtml += '<div style="font-size:12px;font-weight:600">'+d.title+'</div>';
      hrHtml += '<div style="font-size:10px;color:var(--danger);margin-top:2px">معلق منذ '+num(days)+' أيام'+(emp?' — '+emp.name:'')+'</div>';
      hrHtml += '</div>';
    });
    hrHtml += '</div>';
  }
  // خلّص أولاً section removed — tasks now appear in focus pick list

  // ── Build reminders strip (Zone 1 - always open) ──
  var remStripHtml = '';
  if (REMINDERS && REMINDERS.length) {
    remStripHtml = '<div class="reminders-strip">';
    remStripHtml += '<div class="reminders-strip-title" onclick="go(\'reminders\')">💡</div>';
    // عرض أول تذكيرين فقط في سطر واحد
    var remToShow = REMINDERS.slice(0, 2);
    remToShow.forEach(function(r, idx){
      remStripHtml += '<div class="reminder-line">' + r + (idx < remToShow.length - 1 ? ' &nbsp;·&nbsp; ' : '') + '</div>';
    });
    if (REMINDERS.length > 2) remStripHtml += '<div class="reminder-line" style="color:var(--txt3)">+' + (REMINDERS.length - 2) + '</div>';
    remStripHtml += '</div>';
  }

  // ── Build focus hero (4 states) ──
  var prioColors2 = {critical:'#FF3B30', high:'#FF9500', medium:'#FFCC00', low:'#AEAEB2'};
  var heroHtmlNew = '<div class="hero" style="padding:0;overflow:hidden">';
  heroHtmlNew += '<div style="padding:10px 14px 6px;display:flex;align-items:center;gap:6px"><span class="pulse"></span><span style="font-size:11px;font-weight:700;color:var(--txt2)">الشيء الواحد الآن</span></div>';

  if (focusMode === 'project' && focusProject) {
    // ── State 2: Project mode ──
    var prog2 = getProjectProgress(focusProject.id);
    var progPct = prog2.total ? Math.round(prog2.done / prog2.total * 100) : 0;
    var projColor = focusBrand ? focusBrand.color : '#888';
    var activeProjTasks = getProjectActiveTasks(focusProject.id);
    var taskIdx = state.focusTaskIndex || 0;
    if (taskIdx >= activeProjTasks.length) taskIdx = 0;
    var nextTask = activeProjTasks[taskIdx] || null;
    if (!nextTask && prog2.total > 0) {
      heroHtmlNew += '<div class="focus-done-msg">🎉 تم المشروع! كل المهام منجزة</div>';
      heroHtmlNew += '<div style="padding:8px 14px"><button class="focus-proj-btn" onclick="clearFocusProject()" style="width:100%">← اختر تركيزاً جديداً</button></div>';
    } else if (!nextTask) {
      heroHtmlNew += '<div class="focus-done-msg">لا توجد مهام في هذا المشروع</div>';
      heroHtmlNew += '<div style="padding:8px 14px"><button class="focus-proj-btn" onclick="clearFocusProject()" style="width:100%">← اختر تركيزاً جديداً</button></div>';
    } else {
      heroHtmlNew += '<div class="focus-project-header">';
      heroHtmlNew += '<div class="focus-project-name"><span class="focus-type-badge project">مشروع</span>'+focusProject.title+'</div>';
      heroHtmlNew += '<div class="focus-project-brand" style="color:'+projColor+'">'+focusBrand.name+'</div>';
      heroHtmlNew += '<div class="focus-progress-bar"><div class="focus-progress-fill" style="width:'+progPct+'%;background:'+projColor+'"></div></div>';
      heroHtmlNew += '<div class="focus-progress-label">'+prog2.done+' من '+prog2.total+' مهمة</div>';
      heroHtmlNew += '<div class="focus-project-actions">';
      heroHtmlNew += '<button class="focus-proj-btn" onclick="clearFocusProject()">تغيير التركيز</button>';
      heroHtmlNew += '<button class="focus-proj-btn primary" onclick="openProjectFromFocus(\''+focusProject.id+'\',\''+focusProject.brandId+'\')">فتح المشروع ←</button>';
      heroHtmlNew += '</div></div>';
      var ntPrio = prioColors2[nextTask.priority] || '#AEAEB2';
      heroHtmlNew += '<div class="focus-next-task">';
      heroHtmlNew += '<div class="focus-next-label">⚡ التالي:</div>';
      heroHtmlNew += '<div class="focus-next-title"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:'+ntPrio+';margin-left:5px;vertical-align:middle"></span>'+nextTask.title+'</div>';
      heroHtmlNew += '<div class="focus-task-actions">';
      heroHtmlNew += '<button class="focus-task-btn done" onclick="focusProjTaskDone(\''+nextTask.id+'\')">✓ خلصت</button>';
      heroHtmlNew += '<button class="focus-task-btn stuck" onclick="focusProjTaskStuck(\''+nextTask.id+'\')">⊘ عالق</button>';
      heroHtmlNew += '<button class="focus-task-btn skip" onclick="focusProjTaskSkip()">← التالي</button>';
      heroHtmlNew += '</div></div>';
      var quickCands = allFocusCandidates.filter(function(c){ return c.type === 'task'; }).slice(0,3);
      if (quickCands.length) {
        heroHtmlNew += '<div class="focus-quick-section">';
        heroHtmlNew += '<button class="focus-quick-btn" onclick="toggleQuickTasks()">⚡ + مهمة سريعة</button>';
        heroHtmlNew += '<div id="focus-quick-list" class="focus-quick-list">';
        quickCands.forEach(function(c){
          var qPrio = prioColors2[c.priority] || '#AEAEB2';
          heroHtmlNew += '<button class="focus-pick-item" onclick="doQuickTask(\''+c.id+'\')" style="margin-bottom:3px">';
          heroHtmlNew += '<span class="focus-pick-dot" style="background:'+qPrio+'"></span>';
          heroHtmlNew += '<span class="focus-pick-title">'+c.title+'</span>';
          heroHtmlNew += '<span class="focus-pick-brand">'+c.brandName+'</span>';
          heroHtmlNew += '</button>';
        });
        heroHtmlNew += '</div></div>';
      }
    }
  } else if (focusMode === 'task' && focusTask) {
    // ── State 3: Standalone task mode (ENHANCED v2) ──
    var stColor = focusBrand ? focusBrand.color : '#888';
    var ftCl = focusTask.checklist || [];
    // Gather subtasks from groups (new system) or flat (old)
    var ftAllSubs = [];
    if (focusTask.subtaskGroups && focusTask.subtaskGroups.length) {
      focusTask.subtaskGroups.forEach(function(g){
        (g.subtasks||[]).forEach(function(st){ ftAllSubs.push({st:st, groupTitle:g.title}); });
      });
    } else {
      (focusTask.subtasks||[]).forEach(function(st){ ftAllSubs.push({st:st, groupTitle:''}); });
    }
    var ftDesc = focusTask.desc || '';
    var prioLabels = {critical:'حرج', high:'عالي', medium:'متوسط', low:'منخفض'};
    var prioClass = focusTask.priority || 'none';
    var prioLbl = prioLabels[prioClass] || '';
    // Progress
    var clTotal = ftCl.length;
    var clDone = ftCl.filter(function(c){ return c.done; }).length;
    var stTotal = ftAllSubs.length;
    var stDone = ftAllSubs.filter(function(x){ return x.st.status === 'done'; }).length;
    // Next steps: drill into subtask checklists first, then subtasks themselves, then task checklist
    var nextSteps = [];
    // 1. From subtask checklists (each subtask may have its own checklist)
    ftAllSubs.forEach(function(x, i){
      if (x.st.status !== 'done') {
        var stCl = x.st.checklist || [];
        if (stCl.length > 0) {
          stCl.forEach(function(ci, ci_idx){

// ═══════════════════════════════════════════════════════
// INBOX — صندوق الوارد
// جدول Supabase: inbox_tasks
// Schema: id TEXT, text TEXT, created_at TEXT, user_id TEXT
// ═══════════════════════════════════════════════════════

var INBOX_TASKS = []; // مصفوفة المهام المحلية
var _inboxLoaded = false;

// تحميل مهام الصندوق من Supabase أو localStorage
function loadInboxTasks(callback) {
  // أولاً: حاول من localStorage كـ cache سريع
  try {
    var cached = localStorage.getItem('inbox_tasks_cache');
    if (cached) {
      INBOX_TASKS = JSON.parse(cached);
    }
  } catch(e) {}

  // ثانياً: حاول من Supabase
  if (_sbReady && _sb) {
    _sb.from('inbox_tasks').select('*').order('created_at', {ascending: false}).then(function(res) {
      if (!res.error && res.data) {
        INBOX_TASKS = res.data.map(function(r) {
          return { id: r.id, text: r.text, created_at: r.created_at };
        });
        try { localStorage.setItem('inbox_tasks_cache', JSON.stringify(INBOX_TASKS)); } catch(e) {}
        _inboxLoaded = true;
        if (callback) callback();
        // إعادة رسم الصندوق إذا كانت لوحة القيادة مفتوحة
        var el = document.getElementById('inbox-list-container');
        if (el) renderInboxList();
      } else {
        // جدول غير موجود أو خطأ — استخدم localStorage فقط
        _inboxLoaded = true;
        if (callback) callback();
      }
    });
  } else {
    _inboxLoaded = true;
    if (callback) callback();
  }
}

// حساب عدد المهام القديمة (أكثر من 3 أيام)
function inboxStaleCount() {
  var now = Date.now();
  var THREE_DAYS = 3 * 24 * 60 * 60 * 1000;
  return INBOX_TASKS.filter(function(t) {
    return (now - new Date(t.created_at).getTime()) > THREE_DAYS;
  }).length;
}

// رسم قائمة المهام فقط (بدون إعادة رسم الهيدر)
function renderInboxList() {
  var el = document.getElementById('inbox-list-container');
  if (!el) return;

  var now = Date.now();
  var THREE_DAYS = 3 * 24 * 60 * 60 * 1000;

  if (INBOX_TASKS.length === 0) {
    el.innerHTML = '<div class="inbox-empty"><div class="inbox-empty-icon">📭</div>الصندوق فارغ — أضف مهمة سريعة</div>';
    return;
  }

  var html = '<div class="inbox-list">';
  INBOX_TASKS.forEach(function(task) {
    var createdDate = new Date(task.created_at);
    var isStale = (now - createdDate.getTime()) > THREE_DAYS;
    var staleClass = isStale ? ' stale' : '';

    // تنسيق التاريخ
    var dateStr = createdDate.toLocaleDateString('ar-SA', {month:'short', day:'numeric'});
    var daysAgo = Math.floor((now - createdDate.getTime()) / (1000 * 60 * 60 * 24));
    var daysStr = daysAgo === 0 ? 'اليوم' : daysAgo === 1 ? 'أمس' : daysAgo + ' أيام';

    html += '<div class="inbox-item' + staleClass + '" id="inbox-item-' + task.id + '">';
    html += '<div style="flex:1;min-width:0">';
    html += '<div class="inbox-item-text">' + escHtml(task.text) + '</div>';
    html += '<div style="display:flex;align-items:center;gap:6px;margin-top:3px">';
    html += '<span class="inbox-item-date">' + dateStr + ' · ' + daysStr + '</span>';
    if (isStale) {
      html += '<span class="inbox-item-stale-badge">⏰ تحتاج تصنيف</span>';
    }
    html += '</div>';
    html += '</div>';
    html += '<div class="inbox-item-actions">';
    html += '<button class="inbox-move-btn" onclick="showInboxMoveMenu(\'' + task.id + '\', event)" title="نقل لبراند">نقل ↗</button>';
    html += '<button class="inbox-del-btn" onclick="deleteInboxTask(\'' + task.id + '\')" title="حذف">×</button>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  // Footer
  var staleCount = inboxStaleCount();
  if (staleCount > 0) {
    html += '<div class="inbox-footer">⏰ ' + staleCount + ' مهمة تنتظر التصنيف أكثر من ٣ أيام</div>';
  }

  el.innerHTML = html;
}

// إضافة مهمة جديدة
function addInboxTask() {
  var input = document.getElementById('inbox-add-input');
  if (!input) return;
  var text = input.value.trim();
  if (!text) return;

  var task = {
    id: 'inb_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
    text: text,
    created_at: new Date().toISOString()
  };

  INBOX_TASKS.unshift(task);
  input.value = '';

  // حفظ في localStorage
  try { localStorage.setItem('inbox_tasks_cache', JSON.stringify(INBOX_TASKS)); } catch(e) {}

  // حفظ في Supabase
  if (_sbReady && _sb) {
    _sb.from('inbox_tasks').insert([{ id: task.id, text: task.text, created_at: task.created_at }]).then(function(res) {
      if (res.error) console.warn('[Inbox] insert error:', res.error.message);
    });
  }

  // تحديث العداد والقائمة
  updateInboxBadge();
  renderInboxList();
}

// حذف مهمة
function deleteInboxTask(id) {
  INBOX_TASKS = INBOX_TASKS.filter(function(t) { return t.id !== id; });
  try { localStorage.setItem('inbox_tasks_cache', JSON.stringify(INBOX_TASKS)); } catch(e) {}

  if (_sbReady && _sb) {
    _sb.from('inbox_tasks').delete().eq('id', id).then(function(res) {
      if (res.error) console.warn('[Inbox] delete error:', res.error.message);
    });
  }

  // إزالة العنصر من DOM مباشرة
  var el = document.getElementById('inbox-item-' + id);
  if (el) {
    el.style.opacity = '0';
    el.style.transform = 'translateX(10px)';
    el.style.transition = 'all 0.2s';
    setTimeout(function() {
      updateInboxBadge();
      renderInboxList();
    }, 200);
  } else {
    updateInboxBadge();
    renderInboxList();
  }

  // إغلاق أي dropdown مفتوح
  closeInboxDropdowns();
}

// تحديث عداد الشارة في الهيدر
function updateInboxBadge() {
  var badge = document.getElementById('inbox-count-badge');
  if (!badge) return;
  var count = INBOX_TASKS.length;
  var stale = inboxStaleCount();
  badge.textContent = count;
  if (stale > 0) {
    badge.className = 'inbox-count-badge warn';
    badge.title = stale + ' مهمة تنتظر التصنيف';
  } else {
    badge.className = 'inbox-count-badge';
  }
  // إخفاء الشارة إذا كانت صفر
  badge.style.display = count === 0 ? 'none' : '';
}

// إظهار قائمة النقل
function showInboxMoveMenu(taskId, event) {
  event.stopPropagation();
  closeInboxDropdowns();

  var btn = event.currentTarget || event.target;
  var rect = btn.getBoundingClientRect();

  var dropdown = document.createElement('div');
  dropdown.className = 'inbox-move-dropdown';
  dropdown.id = 'inbox-dropdown-' + taskId;

  // تحديد الموضع — fixed بالنسبة للشاشة
  var top = rect.bottom + 4;
  var left = rect.left;
  // التأكد من عدم الخروج من الشاشة
  if (top + 280 > window.innerHeight) { top = Math.max(4, rect.top - 284); }
  if (left + 190 > window.innerWidth) { left = Math.max(4, rect.right - 190); }
  dropdown.style.top = top + 'px';
  dropdown.style.left = left + 'px';

  var options = [
    { id: 'personal', name: 'الشخصي', color: '#888', icon: '👤' },
  ];
  if (typeof BRANDS !== 'undefined') {
    BRANDS.forEach(function(b) {
      options.push({ id: b.id, name: b.name, color: b.color, icon: b.icon || '●' });
    });
  }

  var html = '<div class="inbox-move-dropdown-header">نقل إلى ↗</div>';
  options.forEach(function(opt) {
    html += '<div class="inbox-move-option" onclick="moveInboxTask(\'' + taskId + '\',\'' + opt.id + '\')">';
    if (opt.id === 'personal') {
      html += '<span style="font-size:13px">' + opt.icon + '</span>';
    } else {
      html += '<span class="dot" style="background:' + opt.color + '"></span>';
    }
    html += '<span>' + escHtml(opt.name) + '</span>';
    html += '</div>';
  });

  dropdown.innerHTML = html;
  document.body.appendChild(dropdown);

  // إغلاق عند النقر خارجه
  setTimeout(function() {
    document.addEventListener('click', function _closeHandler(e) {
      if (!dropdown.contains(e.target)) {
        closeInboxDropdowns();
        document.removeEventListener('click', _closeHandler);
      }
    });
  }, 10);
}

// إغلاق كل dropdowns
function closeInboxDropdowns() {
  document.querySelectorAll('.inbox-move-dropdown').forEach(function(el) { el.remove(); });
}

function initDashDrag() {
  var panels = document.querySelectorAll('.dash-panel-wrap');
  var dragSrcKey = null;
  var dragSrcCol = null;

  panels.forEach(function(panel) {
    // Desktop drag
    panel.addEventListener('dragstart', function(e) {
      dragSrcKey = panel.getAttribute('data-panel-key');
      // Find which column this panel is in
      dragSrcCol = panel.closest('.cmd-dash-cols > div');
      panel.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragSrcKey);
    });
    panel.addEventListener('dragend', function() {
      panel.classList.remove('dragging');
      document.querySelectorAll('.dash-panel-wrap').forEach(function(p){
        p.classList.remove('drag-over-top','drag-over-bot');
      });
    });
    panel.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      var targetKey = panel.getAttribute('data-panel-key');
      if (targetKey === dragSrcKey) return;
      document.querySelectorAll('.dash-panel-wrap').forEach(function(p){
        p.classList.remove('drag-over-top','drag-over-bot');
      });
      var rect = panel.getBoundingClientRect();
      var mid = rect.top + rect.height / 2;
      if (e.clientY < mid) {
        panel.classList.add('drag-over-top');
      } else {
        panel.classList.add('drag-over-bot');
      }
    });
    panel.addEventListener('dragleave', function() {
      panel.classList.remove('drag-over-top','drag-over-bot');
    });
    panel.addEventListener('drop', function(e) {
      e.preventDefault();
      var targetKey = panel.getAttribute('data-panel-key');
      if (!dragSrcKey || targetKey === dragSrcKey) return;
      panel.classList.remove('drag-over-top','drag-over-bot');
      var rect = panel.getBoundingClientRect();
      var mid = rect.top + rect.height / 2;
      var insertBefore = e.clientY < mid;
      // Reorder within dashOrder
      var order = state.dashOrder;
      var srcIdx = order.indexOf(dragSrcKey);
      var tgtIdx = order.indexOf(targetKey);
      if (srcIdx < 0 || tgtIdx < 0) return;
      order.splice(srcIdx, 1);
      tgtIdx = order.indexOf(targetKey);
      if (insertBefore) {
        order.splice(tgtIdx, 0, dragSrcKey);
      } else {
        order.splice(tgtIdx + 1, 0, dragSrcKey);
      }
      state.dashOrder = order;
      saveData();
      renderCmd();
    });

    // Mobile touch drag
    var touchStartY = 0;
    var touchPanel = null;
    var touchClone = null;
    panel.addEventListener('touchstart', function(e) {
      if (e.touches.length !== 1) return;
      var touch = e.touches[0];
      touchStartY = touch.clientY;
      touchPanel = panel;
      dragSrcKey = panel.getAttribute('data-panel-key');
      // Long press detection
      touchPanel._touchTimer = setTimeout(function() {
        touchPanel.classList.add('dragging');
        // Create visual clone
        touchClone = touchPanel.cloneNode(true);
        touchClone.style.cssText = 'position:fixed;left:'+touchPanel.getBoundingClientRect().left+'px;top:'+touchPanel.getBoundingClientRect().top+'px;width:'+touchPanel.offsetWidth+'px;opacity:0.8;z-index:9999;pointer-events:none;background:var(--card);border:1px solid var(--gold-b);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,0.15)';
        document.body.appendChild(touchClone);
      }, 400);
    }, {passive: true});
    panel.addEventListener('touchmove', function(e) {
      if (!touchClone) { clearTimeout(touchPanel._touchTimer); return; }
      e.preventDefault();
      var touch = e.touches[0];
      var dy = touch.clientY - touchStartY;
      touchClone.style.top = (touchPanel.getBoundingClientRect().top + dy) + 'px';
      // Find target panel under touch
      touchClone.style.display = 'none';
      var el2 = document.elementFromPoint(touch.clientX, touch.clientY);
      touchClone.style.display = '';
      var targetPanel = el2 ? el2.closest('.dash-panel-wrap') : null;
      document.querySelectorAll('.dash-panel-wrap').forEach(function(p){
        p.classList.remove('drag-over-top','drag-over-bot');
      });
      if (targetPanel && targetPanel !== touchPanel) {
        var rect = targetPanel.getBoundingClientRect();
        if (touch.clientY < rect.top + rect.height / 2) {
          targetPanel.classList.add('drag-over-top');
        } else {
          targetPanel.classList.add('drag-over-bot');
        }
      }
    }, {passive: false});
    panel.addEventListener('touchend', function(e) {
      clearTimeout(touchPanel._touchTimer);
      if (!touchClone) return;
      document.body.removeChild(touchClone);
      touchClone = null;
      touchPanel.classList.remove('dragging');
      var touch = e.changedTouches[0];
      var el2 = document.elementFromPoint(touch.clientX, touch.clientY);
      var targetPanel = el2 ? el2.closest('.dash-panel-wrap') : null;
      document.querySelectorAll('.dash-panel-wrap').forEach(function(p){
        p.classList.remove('drag-over-top','drag-over-bot');
      });
      if (targetPanel && targetPanel !== touchPanel) {
        var targetKey = targetPanel.getAttribute('data-panel-key');
        var rect = targetPanel.getBoundingClientRect();
        var insertBefore = touch.clientY < rect.top + rect.height / 2;
        var order = state.dashOrder;
        var srcIdx = order.indexOf(dragSrcKey);
        var tgtIdx = order.indexOf(targetKey);
        if (srcIdx >= 0 && tgtIdx >= 0) {
          order.splice(srcIdx, 1);
          tgtIdx = order.indexOf(targetKey);
          if (insertBefore) {
            order.splice(tgtIdx, 0, dragSrcKey);
          } else {
            order.splice(tgtIdx + 1, 0, dragSrcKey);
          }
          state.dashOrder = order;
          saveData();
          renderCmd();
        }
      }
    }, {passive: true});
  });
}

// ── Project options menu ──
function toggleProjMenu(menuId, btnEl) {
  var menu = document.getElementById(menuId);
  if (!menu) return;
  var isOpen = menu.classList.contains('on');
  // Close all menus first
  document.querySelectorAll('.proj-opts-menu.on').forEach(function(m){ m.classList.remove('on'); });
  if (!isOpen) {
    // Position the menu below the button using fixed coords
    var btn = btnEl || document.querySelector('[onclick*="'+menuId+'"]');
    if (btn) {
      var rect = btn.getBoundingClientRect();
      menu.style.top = (rect.bottom + 4) + 'px';
      menu.style.right = (window.innerWidth - rect.right) + 'px';
      menu.style.left = 'auto';
    }
    menu.classList.add('on');
    // Close on outside click
    setTimeout(function(){
      document.addEventListener('click', function _c(e){
        if (!e.target.closest('.proj-opts-menu') && !e.target.closest('.bbn-tab-opts')) {
          document.querySelectorAll('.proj-opts-menu.on').forEach(function(m){ m.classList.remove('on'); });
        }
        document.removeEventListener('click', _c);
      });
    }, 10);
  }
}

function closeProjMenu(menuId) {
  var menu = document.getElementById(menuId);
  if (menu) menu.classList.remove('on');
}
// ── Tab drag-to-reorder ──
var _tabDragId = null;
function tabDragStart(e, el) {
  _tabDragId = el.dataset.projid;
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', _tabDragId);
  setTimeout(function(){ el.style.opacity = '0.45'; }, 0);
}
function tabDragOver(e, el) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  // Show insert indicator: highlight left or right edge based on cursor position
  var rect = el.getBoundingClientRect();
  var midX = rect.left + rect.width / 2;
  el.classList.remove('tab-drop-left','tab-drop-right');
  if (el.dataset.projid !== _tabDragId) {
    el.classList.add(e.clientX < midX ? 'tab-drop-right' : 'tab-drop-left');
  }
}
function tabDragLeave(e, el) {
  el.classList.remove('tab-drop-left','tab-drop-right');
}
function tabDragEnd(e) {
  document.querySelectorAll('.bbn-tab-wrap').forEach(function(w){
    w.style.opacity = '';
    w.classList.remove('tab-drop-left','tab-drop-right');
  });
  _tabDragId = null;
}
function tabDrop(e, el, brandId) {
  e.preventDefault();
  el.classList.remove('tab-drop-left','tab-drop-right');
  var draggedId = e.dataTransfer.getData('text/plain') || _tabDragId;
  var targetId  = el.dataset.projid;
  if (!draggedId || draggedId === targetId) return;
  // Determine insert position: before or after target
  var rect = el.getBoundingClientRect();
  var insertBefore = e.clientX < rect.left + rect.width / 2;
  // Get brand projects in current order
  var brandProjs = PROJECTS.filter(function(p){ return p.brandId === brandId; });
  var draggedIdx = brandProjs.findIndex(function(p){ return p.id === draggedId; });
  var targetIdx  = brandProjs.findIndex(function(p){ return p.id === targetId; });
  if (draggedIdx === -1 || targetIdx === -1) return;
  // Remove dragged from array
  var dragged = brandProjs.splice(draggedIdx, 1)[0];
  // Recalculate targetIdx after removal
  targetIdx = brandProjs.findIndex(function(p){ return p.id === targetId; });
  var insertAt = insertBefore ? targetIdx : targetIdx + 1;
  brandProjs.splice(insertAt, 0, dragged);
  // Assign sortOrder based on new positions
  brandProjs.forEach(function(p, i){ p.sortOrder = i; });
  saveData();
  // Switch to the dragged project tab
  var newBoards = [{type:'brand', id:'all'}].concat(brandProjs);
  var newIdx = newBoards.findIndex(function(b){ return b.id === draggedId; });
  state.boardSlideIndex = newIdx > 0 ? newIdx : 1;
  renderBrandDetail();
}

function archiveProjectFromBrand(projId, brandId) {
  if (!confirm('هل تريد أرشفة هذا المشروع؟')) return;
  archiveItem('project', projId, 'manual');
  state.boardSlideIndex = 0;
  renderBrandDetail();
  toast('🗄️ تم أرشفة المشروع');
}

function deleteProjectFromBrand(projId, brandId) {
  if (!confirm('هل تريد حذف هذا المشروع نهائياً؟ سيتم حذف جميع مهامه أيضاً.')) return;
  snap('حذف مشروع');
  // Remove all tasks in this project
  TASKS = TASKS.filter(function(t){ return t.projectId !== projId; });
  // Remove the project
  PROJECTS = PROJECTS.filter(function(p){ return p.id !== projId; });
  saveData();
  state.boardSlideIndex = 0;
  renderBrandDetail();
  toast('🗑 تم حذف المشروع');
}

function renameProjectFromBrand(projId) {
  var p = PROJECTS.find(function(x){ return x.id === projId; });
  if (!p) return;
  var newName = prompt('اسم المشروع الجديد:', p.title);
  if (newName === null) return; // cancelled
  newName = newName.trim();
  if (!newName) { toast('⚠️ الاسم لا يمكن أن يكون فارغاً'); return; }
  snap('تعديل اسم مشروع');
  p.title = newName;
  saveData();
  renderBrandDetail();
  toast('✏️ تم تعديل الاسم');
}
function renameBrandMainTab(brandId) {
  // Rename the main tab label only — separate from brand name
  var b = getBrand(brandId);
  if (!b) return;
  var current = b.mainTabLabel || 'المهام الرئيسية';
  var newLabel = prompt('اسم التبويب الجديد:', current);
  if (newLabel === null) return;
  newLabel = newLabel.trim();
  if (!newLabel) { toast('⚠️ الاسم لا يمكن أن يكون فارغاً'); return; }
  snap('تعديل اسم تبويب');
  b.mainTabLabel = newLabel;
  saveData();
  renderBrandDetail();
  toast('✏️ تم تعديل اسم التبويب');
}
function deleteBrandConfirm(brandId) {
  var b = getBrand(brandId);
  if (!b) return;
  if (!confirm('هل تريد حذف براند "' + b.name + '" نهائياً؟ سيتم حذف جميع مهامه ومشاريعه أيضاً.')) return;
  snap('حذف براند');
  // Remove all tasks and projects belonging to this brand
  TASKS = TASKS.filter(function(t){ return t.brandId !== brandId; });
  PROJECTS = PROJECTS.filter(function(p){ return p.brandId !== brandId; });
  BRANDS = BRANDS.filter(function(x){ return x.id !== brandId; });
  saveData();
  state.currentBrandId = null;
  state.currentSection = 'dashboard';
  render();
  toast('🗑 تم حذف البراند');
}

function renderProjectDetail() {
  var el = document.getElementById('s-project-detail');
  if (!el) return;

  if (!p) { el.innerHTML = '<div class="empty-state"><div class="icon">😕</div><h3>المشروع غير موجود</h3><button class="btn" onclick="history.back()">رجوع</button></div>'; return; }

  var prog = calcProjectProgress(p.id);
  var pTasks = TASKS.filter(function(t){ return t.projectId === p.id; });
  var pDec = DECISIONS.filter(function(d){ return d.projectId === p.id; });

  // Breadcrumb
  var breadcrumb = '<div class="breadcrumb">';
  breadcrumb += '<span class="bc-link" onclick="go(\'brands\')">البراندات</span>';
  if (b) breadcrumb += '<span class="bc-sep">←</span><span class="bc-link" onclick="go(\'brand-detail\',\''+b.id+'\')">'+b.icon+' '+b.name+'</span>';
  breadcrumb += '<span class="bc-sep">←</span><span class="bc-current">'+p.title+'</span>';
  breadcrumb += '</div>';

  // Header
  var statusColors = {active:'var(--success)',planning:'var(--accent)',blocked:'var(--danger)',completed:'var(--txt3)'};
  var statusLabels2 = {active:'جاري',planning:'مخطط',blocked:'متوقف',completed:'تم'};
  var headerHtml = '<div class="proj-detail-header">';
  headerHtml += '<div style="flex:1;min-width:0">';
  headerHtml += '<div style="font-size:22px;font-weight:800;margin-bottom:4px">'+p.title+'</div>';
  if (p.desc) headerHtml += '<div style="font-size:13px;color:var(--txt2);margin-bottom:8px">'+p.desc+'</div>';
  headerHtml += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  headerHtml += '<span class="badge" style="background:'+(statusColors[p.status]||'var(--txt3)')+'22;color:'+(statusColors[p.status]||'var(--txt3)')+';border:1px solid '+(statusColors[p.status]||'var(--txt3)')+'44">'+(statusLabels2[p.status]||p.status)+'</span>';
  if (b) headerHtml += '<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--txt2)"><span style="width:8px;height:8px;border-radius:50%;background:'+b.color+';display:inline-block"></span>'+b.name+'</span>';
  if (p.targetDate) headerHtml += '<span style="font-size:11px;color:'+(daysLeft(p.targetDate)<0?'var(--danger)':'var(--txt3)')+'">'+daysLeftLabel(p.targetDate)+'</span>';
  headerHtml += '</div>';
  headerHtml += '</div>';
  headerHtml += '<div style="text-align:center;flex-shrink:0"><div style="font-size:32px;font-weight:800;color:'+(b?b.color:'var(--accent)')+'">'+prog+'%</div><div style="font-size:10px;color:var(--txt2)">اكتمال</div></div>';
  headerHtml += '</div>';
  headerHtml += '<div class="progress-bar" style="height:6px;margin-bottom:20px"><div class="progress-fill" style="width:'+prog+'%;background:'+(b?b.color:'var(--accent)')+'"></div></div>';

  // Kanban Board — 4 Arabic columns
  var boardCols = [
    {id:'todo',      label:'قيد الانتظار', color:'var(--txt2)'},
    {id:'in_progress',label:'جاري التنفيذ', color:'var(--accent)'},
    {id:'waiting',   label:'معلق',          color:'var(--warning)'},
    {id:'done',      label:'تم',            color:'var(--success)'}
  ];

  var boardHtml = '<div class="proj-board">';
  boardCols.forEach(function(col){
    var colTasks = pTasks.filter(function(t){ return t.status === col.id; });
    boardHtml += '<div class="proj-board-col" id="pbc-'+col.id+'" ondragover="event.preventDefault()" ondrop="dropTaskToCol(event,\''+col.id+'\',\''+p.id+'\')">';
    boardHtml += '<div class="proj-board-col-hdr"><span style="color:'+col.color+'">'+col.label+'</span><span class="badge badge-muted">'+colTasks.length+'</span></div>';
    colTasks.forEach(function(t){
      var daysSinceUpdate = t.updatedAt ? Math.floor((Date.now()-new Date(t.updatedAt))/(1000*60*60*24)) : null;
      boardHtml += '<div class="proj-task-card" draggable="true" ondragstart="dragTaskStart(event,\''+t.id+'\')" onclick="openTaskPanel(\''+t.id+'\')">';
      boardHtml += '<div class="ptc-actions" onclick="event.stopPropagation()">';
      boardHtml += '<button class="ptc-btn arch" title="أرشفة" onclick="event.stopPropagation();quickArchiveSubTask(\''+t.id+'\')">🗄️</button>';

      if (daysSinceUpdate !== null && daysSinceUpdate > 2) boardHtml += '<span style="font-size:9px;color:var(--txt3);margin-right:auto">'+daysSinceUpdate+' يوم بدون تحرك</span>';
      boardHtml += '</div>';

    });

    boardHtml += '<div class="proj-board-add"><input placeholder="+ مهمة..." onkeydown="if(event.key===\'Enter\')addTaskToCol(this,\''+col.id+'\',\''+p.id+'\',\''+p.brandId+'\')"><button onclick="addTaskToCol(this.previousElementSibling,\''+col.id+'\',\''+p.id+'\',\''+p.brandId+'\')">+</button></div>';
    boardHtml += '</div>';
  });
  boardHtml += '</div>';

  // Related decisions
  var decHtml = '';
  if (pDec.length) {
    decHtml = '<div class="pnl" style="margin-top:20px"><div class="pnl-h"><h3>⚖️ القرارات المرتبطة</h3></div>';
    pDec.forEach(function(d){
      decHtml += '<div style="padding:8px 0;border-bottom:1px solid var(--brd);cursor:pointer" onclick="go(\'decisions\')">';
      decHtml += '<div style="font-size:12px;font-weight:600">'+d.title+'</div>';
      decHtml += '<span class="badge '+(d.status==='pending'?'badge-warning':'badge-success')+'" style="margin-top:4px">'+statusLabel(d.status)+'</span>';
      decHtml += '</div>';
    });
    decHtml += '</div>';
  }

  el.innerHTML = breadcrumb + headerHtml + boardHtml + decHtml;
}

// Drag & Drop for board
function dragTaskStart(event, taskId) {
  event.dataTransfer.setData('taskId', taskId);
}

function dropTaskToCol(event, newStatus, projId) {
  event.preventDefault();
  var taskId = event.dataTransfer.getData('taskId');
  var t = TASKS.find(function(x){ return x.id === taskId; });
  if (!t) return;
  snap('نقل مهمة');
  t.status = newStatus;
  t.updatedAt = todayStr();
  if (newStatus === 'done' && !t.completedAt) t.completedAt = todayStr();
  if (newStatus !== 'done') t.completedAt = null;
  saveData();
  renderProjectDetail();
  toast('✅ تم نقل المهمة');
}

function addTaskToCol(input, status, projId, brandId) {
  var v = input.value.trim();
  if (!v) return;
  snap('إضافة مهمة');
  TASKS.push({id:genId(), projectId:projId, brandId:brandId, title:v, desc:'', status:status, priority:'medium', dueDate:null, completedAt:null, updatedAt:todayStr(), tags:[], notes:'', checklist:[], subtasks:[]});
  input.value = '';
  saveData(); toast('✅'); renderProjectDetail();
}

var _iePopup = null;

function ieClosePopup() {
  if (_iePopup) { _iePopup.classList.remove('on'); _iePopup = null; }
}

function ieCreatePopup(items, onSelect) {
  ieClosePopup();
  var div = document.createElement('div');
  div.className = 'ie-popup on';
  items.forEach(function(item) {
    var el = document.createElement('div');
    el.className = 'ie-popup-item' + (item.active ? ' active' : '');
    el.innerHTML = (item.dot ? '<span style="width:8px;height:8px;border-radius:50%;background:'+item.dot+';display:inline-block"></span>' : '') + item.label;
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      onSelect(item.value);
      ieClosePopup();
    });
    div.appendChild(el);
  });
  document.body.appendChild(div);
  _iePopup = div;
  // Close on outside click
  setTimeout(function() {
    document.addEventListener('click', function _c() {
      ieClosePopup();
      document.removeEventListener('click', _c);
    });
  }, 10);
  return div;
}

function iePositionPopup(popup, anchorEl) {
  var rect = anchorEl.getBoundingClientRect();
  popup.style.top = (rect.bottom + 4) + 'px';
  popup.style.right = (window.innerWidth - rect.right) + 'px';
  popup.style.left = 'auto';
}

function ieUpdateTitle(taskId, newTitle) {
  var t = TASKS.find(function(x){ return x.id === taskId; });
  if (!t || !newTitle.trim()) return;
  if (t.title === newTitle.trim()) return;
  snap('تعديل عنوان مهمة');
  t.title = newTitle.trim();
  t.updatedAt = todayStr();
  saveData();
}

function ieShowBrandPicker(taskId, anchorEl) {
  var t = TASKS.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var items = [{value: null, label: '— بدون براند', active: !t.brandId}];
  BRANDS.forEach(function(b) {
    items.push({value: b.id, label: b.name, dot: b.color, active: t.brandId === b.id});
  });
  var popup = ieCreatePopup(items, function(val) {
    snap('تغيير براند المهمة');
    t.brandId = val;
    t.updatedAt = todayStr();
    saveData();
    renderSubtasks();
    toast('✅ تم تغيير البراند');
  });
  iePositionPopup(popup, anchorEl);
}

function ieShowStatusPicker(taskId, anchorEl) {
  var t = TASKS.find(function(x){ return x.id === taskId; });
  if (!t) return;
  var statuses = [
    {value:'todo', label:'قيد الانتظار'},
    {value:'in_progress', label:'جاري التنفيذ'},
    {value:'waiting', label:'معلق'},
    {value:'done', label:'تم'}
  ];
  var items = statuses.map(function(s) {
    return {value: s.value, label: s.label, active: t.status === s.value};
  });
  var popup = ieCreatePopup(items, function(val) {

    renderSubtasks();
    toast('✅ تم تغيير الحالة');

  iePositionPopup(popup, anchorEl);

    toast('✅ تم تغيير الأولوية');
  });
  iePositionPopup(popup, anchorEl);
}

// TASK LIST DRAG REORDER
// ============================
var _tlDragId = null;

function tlDragStart(event, taskId) {
  _tlDragId = taskId;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', taskId);
  var row = event.currentTarget;
  setTimeout(function(){ if(row) row.classList.add('tl-dragging'); }, 0);
}

function tlDragEnd(event) {
  var row = event.currentTarget;
  if (row) row.classList.remove('tl-dragging');
  document.querySelectorAll('.tl-drag-above,.tl-drag-below').forEach(function(r){ r.classList.remove('tl-drag-above','tl-drag-below'); });
  _tlDragId = null;
}

function tlDragOver(event) {
  if (!_tlDragId) return;
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  var row = event.currentTarget;
  if (!row || row.dataset.tid === _tlDragId) return;
  document.querySelectorAll('.tl-drag-above,.tl-drag-below').forEach(function(r){ r.classList.remove('tl-drag-above','tl-drag-below'); });
  var rect = row.getBoundingClientRect();
  var mid = rect.top + rect.height / 2;
  if (event.clientY < mid) {
    row.classList.add('tl-drag-above');
  } else {
    row.classList.add('tl-drag-below');
  }
}

function tlDragLeave(event) {
  var row = event.currentTarget;
  if (row) { row.classList.remove('tl-drag-above','tl-drag-below'); }
}

function tlDrop(event, targetId) {
  event.preventDefault();
  var dragId = _tlDragId;
  if (!dragId || dragId === targetId) return;

  document.querySelectorAll('.tl-drag-above,.tl-drag-below').forEach(function(r){ r.classList.remove('tl-drag-above','tl-drag-below'); });

  var row = event.currentTarget;
  var rect = row.getBoundingClientRect();
  var insertBefore = event.clientY < (rect.top + rect.height / 2);

  // Get current sorted order of ALL tasks
  TASKS.forEach(function(t, i){ if (t.sortOrder == null) t.sortOrder = i; });
  var sorted = TASKS.slice().sort(function(a,b){ return (a.sortOrder||0) - (b.sortOrder||0); });

  // Remove dragged task from sorted array
  var dragIdx = sorted.findIndex(function(t){ return t.id === dragId; });
  var targetIdx = sorted.findIndex(function(t){ return t.id === targetId; });
  if (dragIdx === -1 || targetIdx === -1) return;

  var dragged = sorted.splice(dragIdx, 1)[0];
  // Recalculate targetIdx after removal
  targetIdx = sorted.findIndex(function(t){ return t.id === targetId; });
  var insertIdx = insertBefore ? targetIdx : targetIdx + 1;
  sorted.splice(insertIdx, 0, dragged);

  // Reassign sortOrder
  sorted.forEach(function(t, i){ t.sortOrder = i; });

  snap('إعادة ترتيب المهام');
  saveData();
  renderSubtasks();
}
