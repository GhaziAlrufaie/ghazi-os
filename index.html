function buildCalGrid(month, year) {
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  var now = new Date();
  var isCur = now.getMonth() === month && now.getFullYear() === year;
  var td = isCur ? now.getDate() : -1;
  
  // Build as table with direction:ltr
  var html = '<table style="width:100%;border-collapse:collapse;direction:ltr"><thead><tr>';
  DAYS.forEach(function(d){ html += '<th style="font-size:10px;color:var(--txt3);padding:4px 2px;font-weight:600;text-align:center">'+d+'</th>'; });
  html += '</tr></thead><tbody><tr>';
  
  var cell = 0;
  // Empty cells before first day
  for (var i = 0; i < firstDay; i++) {
    html += '<td></td>';
    cell++;
  }
  
  for (var d = 1; d <= daysInMonth; d++) {
    var evs = EVENTS.filter(function(e){ return e.day === d && e.month === month && e.year === year; });
    var taskEvs = TASKS.filter(function(t){ return t.dueDate && new Date(t.dueDate).getDate()===d && new Date(t.dueDate).getMonth()===month && new Date(t.dueDate).getFullYear()===year; });
    var isToday = d === td;
    var hasEv = evs.length || taskEvs.length;
    var title = evs.map(function(e){ return e.title; }).concat(taskEvs.map(function(t){ return t.title; })).join(', ');
    var style = 'padding:5px 2px;font-size:11px;border-radius:6px;text-align:center;cursor:pointer;position:relative;';
    if (isToday) style += 'background:var(--gold);color:var(--bg);font-weight:700;';
    else if (hasEv) style += 'color:var(--gold);font-weight:600;';
    else style += 'color:var(--txt3);';
    html += '<td style="'+style+'" title="'+title+'" onclick="showDayPanel('+d+','+month+','+year+')">'+num(d)+(hasEv&&!isToday?'<div style="width:4px;height:4px;border-radius:50%;background:var(--gold);margin:0 auto"></div>':'')+'</td>';
    cell++;
    if (cell % 7 === 0 && d < daysInMonth) html += '</tr><tr>';
  }
  
  // Fill remaining cells
  var remaining = 7 - (cell % 7);
  if (remaining < 7) for (var j = 0; j < remaining; j++) html += '<td></td>';
  
  html += '</tr></tbody></table>';
  return html;
}

function renderPerformance() {
  var el = document.getElementById('s-performance');
  var fb = state.perfBrand;

  var brandOpts = '<option value="all">كل البراندات</option>'+BRANDS.map(function(b){ return '<option value="'+b.id+'"'+(fb===b.id?' selected':'')+'>'+b.name+'</option>'; }).join('');
  var filterHtml = '<div class="filters"><select class="filter-select" onchange="state.perfBrand=this.value;render()">'+brandOpts+'</select></div>';

  var filteredMetrics = fb === 'all' ? METRICS : METRICS.filter(function(m){ return m.brandId === fb; });

  // Summary stats
  var totalRev = filteredMetrics.reduce(function(s,m){ return s+m.revenue; }, 0);
  var totalOrders = filteredMetrics.reduce(function(s,m){ return s+m.orders; }, 0);
  var totalSpend = filteredMetrics.reduce(function(s,m){ return s+m.adSpend; }, 0);
  var avgROAS = totalSpend > 0 ? (totalRev / totalSpend).toFixed(1) : 0;

  var statsHtml = '<div class="stats-grid"><div class="stat-card"><div class="n">'+fmt(totalRev)+'</div><div class="l">إجمالي الإيرادات (ر.س)</div></div><div class="stat-card"><div class="n">'+fmt(totalOrders)+'</div><div class="l">إجمالي الطلبات</div></div><div class="stat-card"><div class="n">'+fmt(totalSpend)+'</div><div class="l">الإنفاق الإعلاني</div></div><div class="stat-card"><div class="n" style="color:var(--success)">'+num(avgROAS)+'x</div><div class="l">متوسط ROAS</div></div></div>';

  // Revenue chart
  var revenueByMonth = {};
  filteredMetrics.forEach(function(m){
    var key = m.date.substring(0,7);
    if (!revenueByMonth[key]) revenueByMonth[key] = 0;
    revenueByMonth[key] += m.revenue;
  });
  var months = Object.keys(revenueByMonth).sort();
  var maxRev = Math.max.apply(null, months.map(function(k){ return revenueByMonth[k]; })) || 1;

  var revChartHtml = '<div class="chart-container"><div class="chart-title">📈 الإيرادات الشهرية</div><div class="chart-area"><div class="chart-bars">';
  months.forEach(function(m){
    var val = revenueByMonth[m];
    var h = Math.round(val / maxRev * 100);
    revChartHtml += '<div class="chart-bar" style="height:'+h+'%;background:var(--gold);opacity:0.8" title="'+m+': '+fmt(val)+' ر.س"><div class="chart-bar-label">'+m.substring(5)+'</div></div>';
  });
  revChartHtml += '</div></div></div>';

  // ROAS by brand
  var roasByBrand = {};
  METRICS.forEach(function(m){
    if (!roasByBrand[m.brandId]) roasByBrand[m.brandId] = {rev:0,spend:0};
    roasByBrand[m.brandId].rev += m.revenue;
    roasByBrand[m.brandId].spend += m.adSpend;
  });
  var roasHtml = '<div class="chart-container"><div class="chart-title">📊 ROAS حسب البراند</div><div class="chart-area"><div class="chart-bars">';
  var maxROAS = 1;
  Object.keys(roasByBrand).forEach(function(bid){
    var r = roasByBrand[bid];
    var roas = r.spend > 0 ? r.rev / r.spend : 0;
    if (roas > maxROAS) maxROAS = roas;
  });
  Object.keys(roasByBrand).forEach(function(bid){
    var b = getBrand(bid);
    var r = roasByBrand[bid];
    var roas = r.spend > 0 ? r.rev / r.spend : 0;
    var h = Math.round(roas / maxROAS * 100);
    roasHtml += '<div class="chart-bar" style="height:'+h+'%;background:'+(b?b.color:'var(--accent)')+'" title="'+(b?b.name:bid)+': '+roas.toFixed(1)+'x"><div class="chart-bar-label">'+(b?b.name.substring(0,4):bid)+'</div></div>';
  });
  roasHtml += '</div></div></div>';

  // Data entry table
  var tableHtml = '<div class="settings-section"><h3>📋 سجل البيانات</h3><table class="tasks-table"><thead><tr><th>التاريخ</th><th>البراند</th><th>الإيرادات</th><th>الطلبات</th><th>الإنفاق</th><th>ROAS</th></tr></thead><tbody>';
  filteredMetrics.sort(function(a,b){ return new Date(b.date)-new Date(a.date); }).forEach(function(m){
    var b = getBrand(m.brandId);
    tableHtml += '<tr><td>'+m.date+'</td><td>'+(b?'<span class="brand-tag" style="background:'+b.color+'22;color:'+b.color+'">'+b.name+'</span>':'—')+'</td><td>'+fmt(m.revenue)+'</td><td>'+num(m.orders)+'</td><td>'+fmt(m.adSpend)+'</td><td style="color:var(--success)">'+m.roas.toFixed(1)+'x</td></tr>';
  });
  if (!filteredMetrics.length) tableHtml += '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--txt3)">لا توجد بيانات — أضف أول إدخال</td></tr>';
  tableHtml += '</tbody></table></div>';

  el.innerHTML = filterHtml + statsHtml + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' + revChartHtml + roasHtml + '</div>' + tableHtml;
}

function calcExpenseTotal() {
  var total = 0;
  EXPENSES.forEach(function(sec){ sec.items.forEach(function(item){ total += (item.amount||0); }); });
  return total;
}

function calcSectionTotal(sec) {
  return sec.items.reduce(function(s,item){ return s + (item.amount||0); }, 0);
}

function updateExpenseAmount(secId, itemId, val) {
  var sec = EXPENSES.find(function(s){ return s.id === secId; });
  if (!sec) return;
  var item = sec.items.find(function(i){ return i.id === itemId; });
  if (!item) return;
  var n = parseFloat(String(val).replace(/[^0-9.]/g,''));
  if (!isNaN(n)) item.amount = n;
  saveData();
  var secEl = document.getElementById('exp-sec-total-'+secId);
  if (secEl) secEl.textContent = fmt(calcSectionTotal(sec)) + ' ريال';
  var grandEl = document.getElementById('exp-grand-total');
  if (grandEl) grandEl.textContent = fmt(calcExpenseTotal()) + ' ريال';
}

var _waSettings = null;
var _waContacts = [];
var _waDailyMsgs = [];

function waLoadSettings() {
  // تحميل الإعدادات
  _sb.from('whatsapp_settings').select('*').eq('id','main').single().then(function(res){
    if (res.data) {
      _waSettings = res.data;
    } else {
      _waSettings = {id:'main', enabled:false, morning_reminder_enabled:true, morning_reminder_time:'08:00', owner_phone:'whatsapp:+966562122212'};
    }
    waUpdateSettingsUI();
  });
  // تحميل جهات الفريق
  _sb.from('team_contacts').select('*').order('created_at').then(function(res){
    _waContacts = res.data || [];
    waRenderContacts();
  });
  // تحميل الرسائل اليومية
  _sb.from('daily_messages').select('*, team_contacts(name)').order('send_time').then(function(res){
    _waDailyMsgs = res.data || [];
    waRenderDailyMsgs();
  });
}

function waUpdateSettingsUI() {
  if (!_waSettings) return;
  var toggleBtn = document.getElementById('wa-toggle-btn');
  var morningBtn = document.getElementById('wa-morning-toggle');
  var morningTime = document.getElementById('wa-morning-time');
  var ownerPhone = document.getElementById('wa-owner-phone');
  if (toggleBtn) toggleBtn.textContent = _waSettings.enabled ? '✅ مفعّل' : '❌ معطّل';
  if (morningBtn) morningBtn.textContent = _waSettings.morning_reminder_enabled ? '✅ مفعّل' : '❌ معطّل';
  if (morningTime) morningTime.value = _waSettings.morning_reminder_time || '08:00';
  if (ownerPhone) ownerPhone.value = (_waSettings.owner_phone || '').replace('whatsapp:','');
}

function waToggle() {
  if (!_waSettings) return;
  _waSettings.enabled = !_waSettings.enabled;
  _sb.from('whatsapp_settings').upsert(_waSettings, {onConflict:'id'}).then(function(){
    waUpdateSettingsUI();
    toast(_waSettings.enabled ? '✅ تم تفعيل التنبيهات' : '❌ تم إيقاف التنبيهات');
  });
}

function waMorningToggle() {
  if (!_waSettings) return;
  _waSettings.morning_reminder_enabled = !_waSettings.morning_reminder_enabled;

function waSaveTime(val) {
  if (!_waSettings) return;

function waSaveOwnerPhone() {
  if (!_waSettings) return;

function exportData() {
  var data = {brands:BRANDS,projects:PROJECTS,tasks:TASKS,decisions:DECISIONS,campaigns:CAMPAIGNS,metrics:METRICS,events:EVENTS,employees:EMPLOYEES,archive:ARCHIVE,expenses:EXPENSES,bizExpenses:BIZ_EXPENSES,exportedAt:new Date().toISOString()};
  var blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ghazi-os-backup-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();
  toast('📤 تم التصدير!');
}

function importData(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var d = JSON.parse(e.target.result);
      snap('استيراد');
      if (d.brands) BRANDS = d.brands;
      if (d.projects) PROJECTS = d.projects;
      if (d.tasks) TASKS = d.tasks;
  // v2 migration: clear all task dueDates (make optional)
  if (!d.datesMigrated_v2) {
    if (d.tasks) d.tasks.forEach(function(t){ t.dueDate = null; });
    if (d.personalTasks) d.personalTasks.forEach(function(t){ t.dueDate = null; });
    d.datesMigrated_v2 = true;
  }

      if (d.decisions) DECISIONS = d.decisions;
      if (d.campaigns) CAMPAIGNS = d.campaigns;
      if (d.metrics) METRICS = d.metrics;
      if (d.events) EVENTS = d.events;
      if (d.employees) EMPLOYEES = d.employees;
      if (d.archive) ARCHIVE = d.archive;
      saveData(); toast('📥 تم الاستيراد!'); render();
    } catch(err) { toast('⚠️ خطأ في الملف', 'err'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function resetData() {
  if (!confirm('هل أنت متأكد؟ سيتم حذف جميع البيانات!')) return;
  localStorage.removeItem('ghazi-os-v7');
  location.reload();
}

// Calculate monthly equivalent of an item
function expItemMonthly(item) {
  if (item.cycle === 'yearly') return Math.round((item.amount || 0) / 12);
  return item.amount || 0;
}

// Calculate section monthly total
function calcSectionMonthly(sec) {
  return sec.items.reduce(function(s, item) { return s + expItemMonthly(item); }, 0);
}

// Calculate grand monthly total
function calcExpenseTotal() {
  var total = 0;
  EXPENSES.forEach(function(sec) { total += calcSectionMonthly(sec); });
  return total;
}

// Section colors map
var EXP_SEC_COLORS = ['#C9A84C','#6366F1','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#EC4899'];
function expSecColor(idx) { return EXP_SEC_COLORS[idx % EXP_SEC_COLORS.length]; }

// Build the full finance HTML
function buildPersonalFinanceHtml() {
  var grandTotal = calcExpenseTotal();
  var budget = state.finBudget || 0;
  var prevData = state.finPrev || null;
  var showCompare = state.finCompare || false;

  // Nav tabs (same structure as kanban tabs)

  tabsHtml += '<button class="bbn-tab" onclick="switchPersonalCat(0)">مهام الشخصي</button>';
  PERSONAL_CATS.forEach(function(cat, i) {
    tabsHtml += '<button class="bbn-tab" onclick="switchPersonalCat(' + (i + 1) + ')">' + cat.icon + ' ' + cat.label + '</button>';
  });
  tabsHtml += '</div>';
  tabsHtml += '<button class="bbn-tab on" style="border-color:var(--gold-b);color:var(--gold)" onclick="switchPersonalCat(99)">💰 المالي</button>';
  tabsHtml += '</div>';

  var html = tabsHtml + '<div class="fin-wrap">';

  // Budget input row
  html += '<div class="fin-budget-input-row">';
  html += '<span class="fin-budget-label">🎯 الحد الأقصى الشهري:</span>';
  html += '<input class="fin-budget-input" type="number" value="' + (budget || '') + '" placeholder="0" id="fin-budget-inp" onchange="finSaveBudget(this.value)">';
  html += '<span style="font-size:11px;color:var(--txt3)">ريال</span>';
  html += '</div>';

  // Alert
  if (budget > 0) {
    var diff = grandTotal - budget;
    if (diff > 0) {
      html += '<div class="fin-alert-over">⚠️ تجاوزت الحد بـ ' + fmt(diff) + ' ريال (الإجمالي: ' + fmt(grandTotal) + ' ريال)</div>';
    } else {
      html += '<div class="fin-alert-ok">✅ ضمن الحد — متبقي ' + fmt(-diff) + ' ريال</div>';
    }
  }

  // Header card
  html += '<div class="fin-header-card">';
  html += '<div>';
  html += '<div class="fin-total-label">🏠 إجمالي المصاريف الشخصية الشهرية</div>';
  html += '<div class="fin-total-amount">' + fmt(grandTotal) + ' ريال</div>';
  html += '<div class="fin-total-yearly">' + fmt(grandTotal * 12) + ' ريال سنوياً</div>';
  html += '</div>';
  html += '<button class="fin-compare-btn' + (showCompare ? ' active' : '') + '" onclick="finToggleCompare()">' + (showCompare ? '📊 إخفاء المقارنة' : '📊 مقارنة بالشهر السابق') + '</button>';
  html += '</div>';

  // Distribution bar
  if (grandTotal > 0) {
    html += '<div class="fin-dist-bar">';
    EXPENSES.forEach(function(sec, idx) {
      var secTotal = calcSectionMonthly(sec);
      var pct = Math.round((secTotal / grandTotal) * 100);
      var color = expSecColor(idx);
      html += '<div class="fin-dist-seg" style="width:' + pct + '%;background:' + color + ';flex:' + pct + '"></div>';
    });
    html += '</div>';
    html += '<div class="fin-dist-legend">';
    EXPENSES.forEach(function(sec, idx) {
      var secTotal = calcSectionMonthly(sec);
      var pct = Math.round((secTotal / grandTotal) * 100);
      html += '<div class="fin-dist-item">';
      html += '<div class="fin-dist-dot" style="background:' + expSecColor(idx) + '"></div>';
      html += '<span>' + sec.title + ' ' + pct + '%</span>';
      html += '</div>';
    });
    html += '</div>';
  }

  html += '<div style="height:14px"></div>';

  // Sections
  EXPENSES.forEach(function(sec, secIdx) {
    var secColor = expSecColor(secIdx);
    var secMonthly = calcSectionMonthly(sec);
    var secPct = grandTotal > 0 ? Math.round((secMonthly / grandTotal) * 100) : 0;

    html += '<div class="fin-section">';
    html += '<div class="fin-section-hdr">';
    html += '<div style="display:flex;align-items:center;gap:8px">';
    html += '<div style="width:4px;height:20px;border-radius:2px;background:' + secColor + ';flex-shrink:0"></div>';
    html += '<input class="fin-sec-name-input" value="' + sec.title.replace(/"/g,'&quot;') + '" onblur="finRenameSection(\'' + sec.id + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">';
    html += '</div>';
    html += '<div class="fin-section-meta">';
    html += '<span class="fin-section-total" style="color:' + secColor + '">' + fmt(secMonthly) + ' ر</span>';
    html += '<span class="fin-section-pct">' + num(secPct) + '%</span>';
    html += '<button class="btn btn-sm btn-plain" style="color:var(--danger);padding:2px 6px;font-size:11px" onclick="finDeleteSection(\'' + sec.id + '\')" title="حذف القسم">🗑️</button>';
    html += '</div>';
    html += '</div>';

    // Table
    html += '<table class="fin-table">';
    html += '<thead><tr>';
    html += '<th style="width:35%">البند</th>';
    html += '<th style="width:18%">المبلغ الشهري</th>';
    html += '<th class="fin-hide-mob">النوع</th>';
    html += '<th class="fin-hide-mob">الدورة</th>';
    if (showCompare) html += '<th>السابق</th>';
    html += '<th class="fin-hide-mob">ملاحظة</th>';
    html += '<th style="width:40px"></th>';
    html += '</tr></thead>';
    html += '<tbody>';

    sec.items.forEach(function(item) {
      var monthly = expItemMonthly(item);
      var isVar = item.kind === 'variable';
      var isYearly = item.cycle === 'yearly';
      var varAlert = '';

      // Check variable item increase > 20%
      if (isVar && prevData && showCompare) {
        var prevSec = prevData.find(function(s) { return s.id === sec.id; });
        if (prevSec) {
          var prevItem = prevSec.items.find(function(i) { return i.id === item.id; });
          if (prevItem && prevItem.amount > 0) {
            var change = ((item.amount - prevItem.amount) / prevItem.amount) * 100;
            if (change > 20) varAlert = ' <span style="color:var(--warning);font-size:9px">⚠️ +' + Math.round(change) + '%</span>';
          }
        }
      }

      html += '<tr>';
      // Name
      html += '<td class="fin-name-cell">';
      html += '<input class="fin-name-input" value="' + item.name.replace(/"/g, '&quot;') + '" onblur="finRenameItem(\'' + sec.id + '\',\'' + item.id + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">';
      if (isYearly) html += '<span class="fin-yearly-note">(' + fmt(item.amount) + ' ريال سنوياً)</span>';
      html += '</td>';
      // Amount
      html += '<td class="fin-amount-cell">';
      html += '<input class="fin-amount-input" type="number" value="' + monthly + '" onblur="finUpdateAmount(\'' + sec.id + '\',\'' + item.id + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">';
      html += varAlert;
      html += '</td>';
      // Kind
      html += '<td class="fin-hide-mob">';
      html += '<span class="fin-kind-badge ' + (isVar ? 'fin-kind-variable' : 'fin-kind-fixed') + '">' + (isVar ? '🔄 متغير' : '🔒 ثابت') + '</span>';
      html += '</td>';
      // Cycle
      html += '<td class="fin-hide-mob">';
      html += '<span class="fin-cycle-badge">' + (isYearly ? '📅 سنوي' : '🗓️ شهري') + '</span>';
      html += '</td>';
      // Compare column
      if (showCompare) {
        var prevMonthly = 0;
        var diffHtml = '<span class="fin-diff-same">—</span>';
        if (prevData) {
          var prevSec2 = prevData.find(function(s) { return s.id === sec.id; });
          if (prevSec2) {
            var prevItem2 = prevSec2.items.find(function(i) { return i.id === item.id; });
            if (prevItem2) {
              prevMonthly = expItemMonthly(prevItem2);
              var d = monthly - prevMonthly;
              if (d > 0) diffHtml = '<span class="fin-diff-up">↑ +' + fmt(d) + '</span>';
              else if (d < 0) diffHtml = '<span class="fin-diff-down">↓ ' + fmt(d) + '</span>';
            }
          }
        }
        html += '<td class="fin-prev-cell">' + (prevMonthly > 0 ? fmt(prevMonthly) + ' ر ' : '') + diffHtml + '</td>';
      }
      // Note
      html += '<td class="fin-note-cell fin-hide-mob">' + (item.note || '') + '</td>';
      // Delete
      html += '<td style="text-align:center">';
      html += '<button class="fin-del-btn" onclick="finDeleteItem(\'' + sec.id + '\',\'' + item.id + '\')" title="حذف">✕</button>';
      html += '</td>';
      html += '</tr>';
    });

    html += '</tbody></table>';

    // Add item button
    html += '<div class="fin-add-row">';
    html += '<button class="fin-add-btn" onclick="finAddItem(\'' + sec.id + '\')">' + '+ بند جديد</button>';
    html += '</div>';
    html += '</div>';
  });

  // Add section button
  html += '<button class="fin-add-section-btn" onclick="finAddSection()">+ قسم جديد</button>';
  html += '</div>';
  return html;
}

    html += '</div>';
    // Table
    html += '<table class="fin-table">';
    html += '<thead><tr>';
    html += '<th class="fin-th-name">البند</th>';
    html += '<th class="fin-th-amount">المبلغ (ريال)</th>';
    html += '<th class="fin-th-kind">النوع</th>';
    html += '<th class="fin-th-cycle">الدورة</th>';
    html += '<th class="fin-th-note">ملاحظة</th>';
    html += '<th class="fin-th-del"></th>';
    html += '</tr></thead>';
    html += '<tbody>';
    sec.items.forEach(function(item) {
      var monthly = expItemMonthly(item);
      var prevItem = null;
      if (showCompare && prevData) {
        var prevSec = prevData.find(function(s) { return s.id === sec.id; });
        if (prevSec) prevItem = prevSec.items.find(function(i) { return i.id === item.id; });
      }
      var alertHtml = '';
      if (prevItem && prevItem.amount > 0) {
        var change = ((item.amount - prevItem.amount) / prevItem.amount) * 100;
        if (change > 20) alertHtml = ' <span class="fin-alert-badge" title="ارتفع ' + Math.round(change) + '% عن الشهر السابق">⚠️</span>';
      }
      html += '<tr class="fin-row">';
      html += '<td class="fin-td-name"><input class="fin-name-input" value="' + item.name.replace(/"/g, '&quot;') + '" onblur="bizRenameItem(\'' + sec.id + '\',\'' + item.id + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></td>';
      html += '<td class="fin-td-amount">';
      html += '<input class="fin-amount-input" type="number" value="' + monthly + '" onblur="bizUpdateAmount(\'' + sec.id + '\',\'' + item.id + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()">';
      html += alertHtml;
      html += '</td>';
      html += '<td class="fin-td-kind">';
      html += '<select class="fin-kind-sel" onchange="bizUpdateKind(\'' + sec.id + '\',\'' + item.id + '\',this.value)">';
      html += '<option value="fixed"' + (item.kind === 'fixed' ? ' selected' : '') + '>ثابت 🔒</option>';
      html += '<option value="variable"' + (item.kind === 'variable' ? ' selected' : '') + '>متغير 📊</option>';
      html += '</select>';
      html += '</td>';
      html += '<td class="fin-td-cycle">';
      html += '<select class="fin-cycle-sel" onchange="bizUpdateCycle(\'' + sec.id + '\',\'' + item.id + '\',this.value)">';
      html += '<option value="monthly"' + (item.cycle === 'monthly' ? ' selected' : '') + '>شهري</option>';
      html += '<option value="yearly"' + (item.cycle === 'yearly' ? ' selected' : '') + '>سنوي</option>';
      html += '</select>';
      if (item.cycle === 'yearly') {
        html += '<span class="fin-yearly-badge" title="' + fmt(item.amount) + ' ريال سنوياً">' + fmt(monthly) + '/شهر</span>';
      }
      html += '</td>';
      html += '<td class="fin-td-note"><input class="fin-note-input" value="' + (item.note || '').replace(/"/g, '&quot;') + '" placeholder="ملاحظة..." onblur="bizUpdateNote(\'' + sec.id + '\',\'' + item.id + '\',this.value)" onkeydown="if(event.key===\'Enter\')this.blur()"></td>';
      html += '<td class="fin-td-del"><button class="fin-del-btn" onclick="bizDeleteItem(\'' + sec.id + '\',\'' + item.id + '\')" title="حذف">✕</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    html += '<button class="fin-add-btn" onclick="bizAddItem(\'' + sec.id + '\')">+ بند جديد</button>';
    html += '</div>';
  });
  html += '</div>';
  // Add section button
  html += '<button class="fin-add-section-btn" onclick="bizAddSection()">+ قسم جديد</button>';
  html += '</div>';
  return html;
}

// ── Finance action functions ──

function finSaveBudget(val) {
  var n = parseInt(String(val).replace(/[^0-9]/g, '')) || 0;
  state.finBudget = n;
  saveData();
  renderPersonal();
}

function finToggleCompare() {
  var cur = state.finCompare || false;
  state.finCompare = !cur;
  // Save current as prev if enabling compare and no prev data
  if (!cur && !state.finPrev) {
    state.finPrev = JSON.parse(JSON.stringify(EXPENSES));
  }
  saveData();
  renderPersonal();
}

function finRenameSection(secId, newName) {
  var sec = EXPENSES.find(function(s) { return s.id === secId; });
  if (!sec || !newName.trim()) return;
  sec.title = newName.trim();
  saveData();
}

function finRenameItem(secId, itemId, newName) {
  var sec = EXPENSES.find(function(s) { return s.id === secId; });
  if (!sec) return;
  var item = sec.items.find(function(i) { return i.id === itemId; });
  if (!item || !newName.trim()) return;
  item.name = newName.trim();
  saveData();
}

function finUpdateAmount(secId, itemId, val) {
  var sec = EXPENSES.find(function(s) { return s.id === secId; });
  if (!sec) return;
  var item = sec.items.find(function(i) { return i.id === itemId; });
  if (!item) return;
  var n = parseFloat(String(val).replace(/[^0-9.]/g, ''));
  if (isNaN(n)) return;
  // If yearly, store the yearly amount (monthly * 12)
  if (item.cycle === 'yearly') item.amount = Math.round(n * 12);
  else item.amount = n;
  saveData();
  renderPersonal();
}

function finDeleteItem(secId, itemId) {
  if (!confirm('حذف هذا البند؟')) return;
  var sec = EXPENSES.find(function(s) { return s.id === secId; });
  if (!sec) return;
  snap('حذف بند مصاريف');
  sec.items = sec.items.filter(function(i) { return i.id !== itemId; });
  saveData(); toast('حذفنا البند', 'dim'); renderPersonal();
}

function finDeleteSection(secId) {
  if (!confirm('حذف هذا القسم بكل بنوده؟')) return;
  snap('حذف قسم مصاريف');
  EXPENSES = EXPENSES.filter(function(s) { return s.id !== secId; });
  saveData(); toast('حذفنا القسم', 'dim'); renderPersonal();
}

function renderPersonal() {
  var el = document.getElementById('s-personal');
  if (!el) return;

  var catIdx = state.personalCatIdx || 0;
  if (catIdx > PERSONAL_CATS.length && catIdx !== 99) catIdx = 0; // 0 = "all", 99 = finance

  // ── Finance tab ──
  if (catIdx === 99) {
    el.innerHTML = buildPersonalFinanceHtml();
    return;
  }

  // ── Migration: convert legacy 'blocked' status to 'waiting' ──
  var needsMigration = false;
  PERSONAL_TASKS.forEach(function(t){
    if (t.status === 'blocked') { t.status = 'waiting'; needsMigration = true; }
  });
  if (needsMigration) saveData();

  // ── 4 Kanban columns ──
  var COLS = [
    {id:'todo',        label:'قيد الانتظار', color:'var(--accent)'},
    {id:'in_progress', label:'جاري التنفيذ',  color:'var(--gold)'},
    {id:'waiting',     label:'معلق',          color:'var(--danger)'},
    {id:'done',        label:'تم',            color:'var(--success)'}
  ];

  // ── Filter tasks by selected tab ──
  var visibleTasks;
  if (catIdx === 0) {
    visibleTasks = PERSONAL_TASKS; // all
  } else {
    var selCat = PERSONAL_CATS[catIdx - 1];
    visibleTasks = PERSONAL_TASKS.filter(function(t){ return t.category === selCat.id; });
  }

  // ── Nav tabs ──
  var tabsHtml = '<div class="brand-boards-nav">';
  tabsHtml += '<button class="btn btn-sm" onclick="openAddPersonalTaskM()">+ مهمة</button>';
  tabsHtml += '<div class="bbn-tabs">';
  // "All" tab
  tabsHtml += '<button class="bbn-tab ' + (catIdx === 0 ? 'on' : '') + '" onclick="switchPersonalCat(0)">مهام الشخصي</button>';
  // Category tabs
  PERSONAL_CATS.forEach(function(cat, i) {
    tabsHtml += '<button class="bbn-tab ' + (catIdx === i + 1 ? 'on' : '') + '" onclick="switchPersonalCat(' + (i + 1) + ')">' + cat.icon + ' ' + cat.label + '</button>';
  });
  tabsHtml += '</div>';
  tabsHtml += '<button class="btn btn-sm btn-plain" onclick="openAddPersonalCatM()" style="white-space:nowrap">+ فئة</button>';
  tabsHtml += '<button class="bbn-tab ' + (catIdx === 99 ? 'on' : '') + '" onclick="switchPersonalCat(99)" style="margin-right:4px;border-color:var(--gold-b);color:' + (catIdx === 99 ? 'var(--gold)' : 'var(--txt2)') + '">💰 المالي</button>';
  tabsHtml += '</div>';

  // ── Board columns ──
  var boardHtml = '<div class="brand-board-cols brand-board-cols-personal" style="grid-template-columns:repeat(4,minmax(280px,1fr))">';
  COLS.forEach(function(col) {
    var colTasks = visibleTasks.filter(function(t){ return t.status === col.id; });
    var catLabel = catIdx === 0 ? '' : ''; // no extra label needed when filtered
    var CATS_MAP = {};
    PERSONAL_CATS.forEach(function(c){ CATS_MAP[c.id] = c.icon + ' ' + c.label; });

    boardHtml += '<div class="brand-board-col"';
    boardHtml += ' ondragover="event.preventDefault();this.classList.add(\'drag-over\')"';
    boardHtml += ' ondragleave="this.classList.remove(\'drag-over\')"';
    boardHtml += ' data-colid="' + col.id + '"';
    boardHtml += ' ondrop="personalBoardDrop(event,\'' + col.id + '\')">';
    boardHtml += '<div class="brand-board-col-hdr"><span class="col-name" style="color:' + col.color + '">' + col.label + '</span><span class="col-count">' + colTasks.length + '</span></div>';
    boardHtml += '<div class="brand-board-cards">';
    colTasks.forEach(function(t) {
      var cl = t.checklist || [];
      var clDone = cl.filter(function(c){ return c.done; }).length;
      boardHtml += '<div class="brand-task-card" draggable="true" data-tid="' + t.id + '"';
      boardHtml += ' ondragstart="personalDragStart(event,this.dataset.tid)"';
      boardHtml += ' onclick="openPersonalTaskPanel(this.dataset.tid)">';
      // ── Hover Actions Bar ──
      boardHtml += '<div class="ptc-actions" onclick="event.stopPropagation()">';
      boardHtml += '<button class="ptc-btn edit" title="تعديل" onclick="event.stopPropagation();ptcStartInlineEdit(\''+t.id+'\')">✏️</button>';
      boardHtml += '<button class="ptc-btn arch" title="أرشفة" onclick="event.stopPropagation();archivePersonalTask(\''+t.id+'\')">🗄️</button>';
      boardHtml += '<button class="ptc-btn del" title="حذف" onclick="event.stopPropagation();ptcDeleteCard(\''+t.id+'\')">🗑️</button>';
      boardHtml += '</div>';
      // ── Title (with inline-edit support) ──
      boardHtml += '<div class="btc-title" id="ptc-title-'+t.id+'">' + t.title + '</div>';
      boardHtml += '<div class="btc-meta">';
      boardHtml += '<div class="priority-dot ' + t.priority + '"></div>';
      if (catIdx === 0 && t.category) {
        boardHtml += '<span style="font-size:9px;color:var(--txt3);background:var(--bg2);padding:1px 4px;border-radius:3px">' + (CATS_MAP[t.category] || t.category) + '</span>';
      }
      if (t.dueDate) boardHtml += '<span class="btc-due">' + daysLeftLabel(t.dueDate) + '</span>';
      boardHtml += '</div>';
      // Content icons row
      var hasLinks2 = t.links && t.links.length > 0;
      var hasCl2 = cl.length > 0;
      var hasNotes2 = (t.notes && t.notes.trim().length > 0) || (t.desc && t.desc.trim().length > 0);
      var hasSubs2 = t.subtasks && t.subtasks.length > 0;
      var hasAtts2 = t.attachments && t.attachments.length > 0;
      if (hasLinks2 || hasCl2 || hasNotes2 || hasSubs2 || hasAtts2) {
        boardHtml += '<div class="btc-icons">';
        if (hasCl2) boardHtml += '<span class="btc-icon">☑ '+clDone+'/'+cl.length+'</span>';
        if (hasSubs2) boardHtml += '<span class="btc-icon">🔀 '+t.subtasks.length+'</span>';
        if (hasNotes2) boardHtml += '<span class="btc-icon">📝</span>';
        if (hasLinks2) boardHtml += '<span class="btc-icon">🔗</span>';
        if (hasAtts2) boardHtml += '<span class="btc-icon">🖼️ '+t.attachments.length+'</span>';
        boardHtml += '</div>';
      }
      boardHtml += '</div>';
    });
    boardHtml += '</div>';
    // Quick-add input
    var inputId = 'pba-' + col.id + (catIdx > 0 ? '-' + PERSONAL_CATS[catIdx-1].id : '-all');
    var pCatId = catIdx > 0 ? PERSONAL_CATS[catIdx-1].id : '';
    boardHtml += '<div class="brand-board-add" id="pbaw-'+col.id+'-'+pCatId+'">';
    boardHtml += '<div class="brand-board-add-row">';
    boardHtml += '<input id="' + inputId + '" data-colid="' + col.id + '" placeholder="+ مهمة..."';
    boardHtml += ' onkeydown="if(event.key===\'Enter\')showQAPriPicker(\'personal\',\''+col.id+'\',\'' + pCatId + '\',\'\')">'
    boardHtml += '<button onclick="showQAPriPicker(\'personal\',\''+col.id+'\',\''+pCatId+'\',\'\')"  >+</button>';
    boardHtml += '</div></div>';
    boardHtml += '</div>';
  });
  boardHtml += '</div>';

  el.innerHTML = tabsHtml + boardHtml;
}

function personalDragStart(e, taskId) {
  e.dataTransfer.setData('text/plain', 'personal:'+taskId);
}

function personalBoardDrop(e, newStatus) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  var data = e.dataTransfer.getData('text/plain');
  if (!data.startsWith('personal:')) return;
  var taskId = data.split(':')[1];
  var t = PERSONAL_TASKS.find(function(x){ return x.id === taskId; });
  if (!t) return;
  snap('نقل مهمة شخصية');
  t.status = newStatus;
  saveData(); renderPersonal();
}

// Legacy wrappers
function personalColDrop(e, colId, colType) { personalBoardDrop(e, colId); }
function personalCategoryDrop(e, newCategory) { /* no-op */ }
function personalStatusDrop(e, newStatus) { personalBoardDrop(e, newStatus); }

function quickAddPersonalBoardTask(statusId, catId) {
  // find the right input
  var inputId = 'pba-' + statusId + (catId ? '-' + catId : '-all');
  var inp = document.getElementById(inputId);
  if (!inp) return;
  var title = inp.value.trim();
  if (!title) return;
  snap('إضافة مهمة شخصية');
  var newTask = {
    id: 'pt' + Date.now(),
    title: title,
    status: statusId,
    category: catId || (PERSONAL_CATS[0] ? PERSONAL_CATS[0].id : 'personal'),
    priority: 'medium',
    dueDate: '',
    notes: '',
    checklist: [],
    subtasks: []
  };
  PERSONAL_TASKS.push(newTask);
  inp.value = '';
  saveData(); renderPersonal();
}

function doAddPersonalCat() {
  var name = document.getElementById('pcat-name').value.trim();
  if (!name) { toast('⚠️ أدخل اسم الفئة', 'err'); return; }
  var icon = document.getElementById('pcat-icon').value.trim() || '📌';
  var catId = 'cat_' + Date.now();
  PERSONAL_CATS.push({id: catId, label: name, icon: icon});
  saveData(); closeM(); toast('✅ تمت إضافة الفئة!');
  state.personalCatIdx = PERSONAL_CATS.length; // switch to new tab
  renderPersonal();
}

function openPersonalTaskPanel(taskId) {
  var t = PERSONAL_TASKS.find(function(x){ return x.id === taskId; });
  if (!t) return;
  // Migrate old data structure
  if (!t.checklist)      t.checklist      = [];
  if (!t.subtasks)       t.subtasks       = [];
  if (!t.links)          t.links          = [];
  if (!t.tags)           t.tags           = [];
  if (!t.activity)       t.activity       = [];
  if (!t.attachments)    t.attachments    = [];
  if (!t.startDate)      t.startDate      = '';
  if (!t.desc)           t.desc           = '';
  if (!t.notes)          t.notes          = '';
  if (!t.dependency)     t.dependency     = '';
  if (!t.timeSpent)      t.timeSpent      = 0;
  if (!t.timerStart)     t.timerStart     = null;
  // Migrate subtasks → subtaskGroups
  if (!t.subtaskGroups) {
    if (t.subtasks && t.subtasks.length > 0) {
      t.subtaskGroups = [{id:'psg'+Date.now(), title:'', subtasks: t.subtasks}];
    } else {
      t.subtaskGroups = [];
    }
    t.subtasks = [];
    saveData();
  }
  t.subtaskGroups.forEach(function(g){ if (!g.subtasks) g.subtasks = []; });

  // ── Status / Priority chips (same as brands) ──
  var statusChips = [
    {v:'todo',       lbl:'قيد الانتظار', cls:'status-todo'},
    {v:'in_progress',lbl:'جاري التنفيذ', cls:'status-in_progress'},
    {v:'waiting',    lbl:'معلق',          cls:'status-waiting'},
    {v:'done',       lbl:'تم',            cls:'status-done'}
  ];
  var priChips = [
    {v:'critical',lbl:'🔴 حرج',    cls:'pri-critical'},
    {v:'high',    lbl:'🟠 عالي',   cls:'pri-high'},
    {v:'medium',  lbl:'🟡 متوسط',  cls:'pri-medium'},
    {v:'low',     lbl:'⬇️ منخفض', cls:'pri-low'}
  ];
  var activeStatus = statusChips.find(function(c){ return c.v===t.status; }) || statusChips[0];
  var activePri    = priChips.find(function(c){ return c.v===t.priority; }) || priChips[2];

  var statusDdItems = statusChips.map(function(c){
    var dot = {todo:'#2196f3',in_progress:'#ff9800',waiting:'#e91e63',done:'#4caf50'}[c.v]||'#999';
    return '<div class="tp-dd-item'+(t.status===c.v?' active':'')+'" onclick="ptpSetStatus(\''+taskId+'\',\''+c.v+'\');tpCloseDd(this)">'
      +'<span class="tp-dd-dot" style="background:'+dot+'"></span>'+c.lbl+'</div>';
  }).join('');
  var statusChipsHtml = '<div class="tp-dd-wrap">'
    +'<div class="tp-dd-btn tp-chip '+activeStatus.cls+'" onclick="tpToggleDd(this)">'+activeStatus.lbl+'</div>'
    +'<div class="tp-dd-menu">'+statusDdItems+'</div>'
    +'</div>';

  var priDdItems = priChips.map(function(c){
    var dot = {critical:'#f44336',high:'#ff9800',medium:'#ffc107',low:'#9e9e9e'}[c.v]||'#999';
    return '<div class="tp-dd-item'+(t.priority===c.v?' active':'')+'" onclick="ptpSetPriority(\''+taskId+'\',\''+c.v+'\');tpCloseDd(this)">'
      +'<span class="tp-dd-dot" style="background:'+dot+'"></span>'+c.lbl+'</div>';
  }).join('');
  var priChipsHtml = '<div class="tp-dd-wrap">'
    +'<div class="tp-dd-btn tp-chip '+activePri.cls+'" onclick="tpToggleDd(this)">'+activePri.lbl+'</div>'
    +'<div class="tp-dd-menu">'+priDdItems+'</div>'
    +'</div>';

  // ── Subtask Groups HTML ──
  var stTotalAll = 0, stDoneAll = 0;
  t.subtaskGroups.forEach(function(g){
    stTotalAll += g.subtasks.length;
    stDoneAll  += g.subtasks.filter(function(s){ return s.status==='done'||s.done; }).length;
  });
  var stPct = stTotalAll ? Math.round(stDoneAll/stTotalAll*100) : 0;
  var subtasksHtml = t.subtaskGroups.map(function(g, gIdx){
    var stRows = g.subtasks.map(function(st, si){
      var d = st.status==='done'||st.done;
      return '<div class="tp-st-row">'
        +'<div class="tp-st-cb '+(d?'done':'')+'" onclick="ptpToggleSub(\''+taskId+'\','+gIdx+','+si+')">'
        +(d?'<span style="color:#fff;font-size:10px;font-weight:700">✓</span>':'')
        +'</div>'
        +'<span class="tp-st-text '+(d?'done':'')+'">'+st.title+'</span>'
        +'<button class="tp-st-del" onclick="ptpRemoveSub(\''+taskId+'\','+gIdx+','+si+')">✕</button>'
        +'</div>';
    }).join('');
    return '<div class="stg-block">'
      +'<div class="stg-header">'
        +'<input class="stg-title-input" value="'+g.title.replace(/"/g,'&quot;')+'" placeholder="اسم المجموعة..." onblur="ptpUpdateGroupTitle(\''+taskId+'\','+gIdx+',this.value)">'
        +'<button class="stg-del-btn" onclick="ptpRemoveGroup(\''+taskId+'\','+gIdx+')">✕</button>'
      +'</div>'
      +'<div class="stg-subtasks">'+stRows+'</div>'
      +'<div class="tp-st-add"><input id="ptg-input-'+taskId+'-'+gIdx+'" placeholder="+ أضف خطوة... اضغط Enter للحفظ" onkeydown="if(event.key===\'Enter\')ptpAddSubToGroup(\''+taskId+'\','+gIdx+')"></div>'
      +'</div>';
  }).join('');

  // ── Checklist HTML ──
  var clDone  = t.checklist.filter(function(ci){ return ci.done; }).length;
  var clTotal = t.checklist.length;
  var clPct   = clTotal ? Math.round(clDone/clTotal*100) : 0;
  var checklistHtml = t.checklist.map(function(ci, idx){
    return '<div class="tp-st-row">'
      +'<div class="tp-st-cb '+(ci.done?'done':'')+'" onclick="ptpToggleChecklist(\''+taskId+'\','+idx+')">'
      +(ci.done?'<span style="color:#fff;font-size:11px;font-weight:700">✓</span>':'')
      +'</div>'
      +'<span class="tp-st-text '+(ci.done?'done':'')+'">'+ci.text+'</span>'
      +'<button class="tp-st-del" onclick="ptpRemoveChecklist(\''+taskId+'\','+idx+')">✕</button>'
      +'</div>';
  }).join('');

  // ── Links HTML ──
  var linksHtml = t.links.map(function(lk, idx){
    return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--brd)">'
      +'<a href="'+lk.url+'" target="_blank" style="flex:1;font-size:11px;color:var(--gold);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🔗 '+(lk.label||lk.url)+'</a>'
      +'<button onclick="ptpRemoveLink(\''+taskId+'\','+idx+')" style="background:none;border:none;color:var(--txt3);cursor:pointer;font-size:12px;padding:0 4px">✕</button>'
      +'</div>';
  }).join('');

  // ── Tags HTML ──
  var TAG_COLORS = ['#e91e63','#9c27b0','#3f51b5','#2196f3','#009688','#4caf50','#ff9800','#795548'];
  var tagsHtml = (t.tags||[]).map(function(tag, ti){
    var col = TAG_COLORS[ti % TAG_COLORS.length];
    return '<span class="tp-tag" style="background:'+col+'22;color:'+col+'">'+tag
      +'<button class="tp-tag-del" onclick="ptpRemoveTag(\''+taskId+'\','+ti+')">✕</button></span>';
  }).join('');

  // ── Activity HTML ──
  var actHtml = (t.activity||[]).slice().reverse().map(function(a){
    var isComment = a.type==='comment';
    return '<div class="tp-activity-item">'
      +'<div class="tp-activity-dot '+(isComment?'comment':'')+'"></div>'
      +'<div style="flex:1"><div style="color:var(--txt)">'+a.text+'</div>'
      +'<div class="tp-activity-time">'+a.ts+'</div></div>'
      +'</div>';
  }).join('');

  // ── Attachments HTML ──
  var attHtml = buildAttThumbs(taskId, t.attachments||[]);

  // ── Time Tracker ──
  var isRunning   = !!t.timerStart;
  var timeSpent   = (t.timeSpent||0) + (isRunning ? Math.floor((Date.now()-t.timerStart)/1000) : 0);
  var timeDisplay = Math.floor(timeSpent/3600)+'h '+Math.floor((timeSpent%3600)/60)+'m '+Math.floor(timeSpent%60)+'s';

  // ── Breadcrumb ──
  var catLabel = '';
  if (PERSONAL_CATS) {
    var cat = PERSONAL_CATS.find(function(c){ return c.id===t.category; });
    if (cat) catLabel = cat.icon+' '+cat.label;
  }
  var taskShortId = taskId.slice(-6).toUpperCase();
  var bcHtml = '<span style="color:var(--txt3)">الشخصي</span>'
    +(catLabel ? '<span style="color:var(--txt3)"> › </span><span style="color:var(--txt2)">'+catLabel+'</span>' : '')
    +'<span style="color:var(--txt3)"> › </span><span style="font-weight:700;color:var(--txt2)">'+t.title+'</span>';

  // ══════════════════════════════════════════
  // BUILD HTML — same structure as brands panel
  // ══════════════════════════════════════════
  var html = '';
  html += '<div class="tp-header">';
  html += '<div class="tp-breadcrumb">'+bcHtml+'</div>';
  html += '<div class="tp-actions">';
  html += '<span class="tp-task-id">'+taskShortId+'</span>';
  html += '<button class="tp-close-btn" onclick="closeTaskPanel()">✕</button>';
  html += '</div></div>';

  // ── BODY ──
  html += '<div class="tp-body">';

  // ════ MAIN COLUMN (70%) ════
  html += '<div class="tp-col-main">';

  // Title
  html += '<input id="ptp-title-'+taskId+'" class="tp-title-input" value="'+t.title.replace(/"/g,'&quot;')+'" '
    +'placeholder="عنوان المهمة..." '
    +'onblur="ptpSaveTitle(\''+taskId+'\',this.value)" '
    +'onkeydown="if(event.key===\'Escape\')closeTaskPanel()" >';

  // Description
  html += '<div style="margin-bottom:20px">';
  html += '<div style="font-size:10px;color:var(--txt3);margin-bottom:4px">الوصف — يدعم Markdown (** عريض **، - نقطة)</div>';
  html += '<textarea id="ptp-desc-'+taskId+'" class="tp-desc-area" rows="4" '
    +'placeholder="اكتب وصفاً تفصيلياً..." '
    +'onblur="ptSaveField(\''+taskId+'\',\'desc\',this.value)">'+( t.desc||'')+'</textarea>';
  html += '</div>';

  // Subtask Groups
  html += '<div style="margin-bottom:20px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  html += '<span style="font-size:12px;font-weight:700;color:var(--txt)">🔀 المهام الفرعية';
  if (stTotalAll) html += ' <span style="font-size:11px;color:var(--txt3);font-weight:400">('+stDoneAll+'/'+stTotalAll+')</span>';
  html += '</span></div>';
  if (stTotalAll) {
    html += '<div class="tp-st-progress"><div class="tp-st-progress-fill" style="width:'+stPct+'%"></div></div>';
  }
  html += '<div id="ptp-subtasks-'+taskId+'">'+subtasksHtml+'</div>';
  html += '<button class="stg-add-group" onclick="ptpAddGroup(\''+taskId+'\')">+ إضافة مجموعة جديدة</button>';
  html += '</div>';

  // Links
  if (t.links.length) {
    html += '<div style="margin-bottom:20px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:8px">🔗 روابط</div>';
    html += linksHtml;
    html += '</div>';
  }
  html += '<div style="display:flex;gap:4px;margin-bottom:20px">';
  html += '<input id="ptp-link-url-'+taskId+'" placeholder="https://..." style="flex:2;background:transparent;border:none;border-bottom:1px solid var(--brd);font-size:12px;color:var(--txt);font-family:inherit;padding:4px 0;outline:none" onfocus="this.style.borderBottomColor=\'var(--gold)\'" onblur="this.style.borderBottomColor=\'var(--brd)\'">';
  html += '<input id="ptp-link-lbl-'+taskId+'" placeholder="عنوان الرابط" style="flex:1;background:transparent;border:none;border-bottom:1px solid var(--brd);font-size:12px;color:var(--txt);font-family:inherit;padding:4px 0;outline:none" onfocus="this.style.borderBottomColor=\'var(--gold)\'" onblur="this.style.borderBottomColor=\'var(--brd)\'">';
  html += '<button onclick="ptpAddLink(\''+taskId+'\')" style="background:var(--gold-dim);border:1px solid var(--gold-b);color:var(--gold);border-radius:6px;padding:4px 10px;cursor:pointer;font-weight:700;flex-shrink:0">+</button>';
  html += '</div>';

  // Checklist
  html += '<div style="margin-bottom:20px">';
  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">';
  html += '<span style="font-size:12px;font-weight:700;color:var(--txt)">☑ قائمة المراجعة';
  if (clTotal) html += ' <span style="font-size:11px;color:var(--txt3);font-weight:400">('+clDone+'/'+clTotal+' — '+clPct+'%)</span>';
  html += '</span></div>';
  if (clTotal) {
    html += '<div class="tp-st-progress"><div class="tp-st-progress-fill" style="width:'+clPct+'%"></div></div>';
  }
  html += '<div id="ptp-checklist-'+taskId+'">'+checklistHtml+'</div>';
  html += '<div class="tp-st-add"><input id="ptp-cl-input-'+taskId+'" placeholder="+ بند جديد... اضغط Enter للحفظ" onkeydown="if(event.key===\'Enter\')ptpAddChecklist(\''+taskId+'\')"></div>';
  html += '</div>';

  // Activity & Notes
  html += '<div style="border-top:1px solid var(--brd);padding-top:16px;margin-top:4px">';
  html += '<div style="font-size:12px;font-weight:700;color:var(--txt);margin-bottom:12px">💬 النشاطات والملاحظات</div>';
  html += '<div id="ptp-activity-'+taskId+'">'+(actHtml||'<div style="font-size:12px;color:var(--txt3);padding:8px 0">لا يوجد نشاط بعد</div>')+'</div>';
  html += '<div style="margin-top:12px">';
  html += '<textarea id="ptp-comment-'+taskId+'" class="tp-comment-box" placeholder="أضف ملاحظة أو تعليق..." rows="2"></textarea>';
  html += '<button onclick="ptpAddComment(\''+taskId+'\')" style="margin-top:6px;background:var(--gold-dim);border:1px solid var(--gold-b);color:var(--gold);border-radius:6px;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:700">إضافة</button>';
  html += '</div></div>';

  html += '</div>'; // end tp-col-main

  // ════ SIDE COLUMN (30%) ════
  html += '<div class="tp-col-side">';

  // Status
  html += '<div class="tp-section-label">الحالة</div>';
  html += '<div class="tp-chip-row">'+statusChipsHtml+'</div>';

  // Priority
  html += '<div class="tp-section-label">الأولوية</div>';
  html += '<div class="tp-chip-row">'+priChipsHtml+'</div>';

  // Category
  html += '<div class="tp-section-label">🏷 الفئة</div>';
  var catOpts = (PERSONAL_CATS||[]).map(function(c){
    return '<option value="'+c.id+'"'+(t.category===c.id?' selected':'')+'>'+c.icon+' '+c.label+'</option>';
  }).join('');
  html += '<select style="width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--txt);font-family:inherit" onchange="ptSaveField(\''+taskId+'\',\'category\',this.value)">'+catOpts+'</select>';

  // Due Date
  html += '<div class="tp-section-label">📅 الموعد النهائي</div>';
  html += '<input type="date" style="width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--txt);font-family:inherit;outline:none" '

  html += '<input type="date" style="width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--txt);font-family:inherit;outline:none" '
    +'value="'+(t.startDate||'')+'" onchange="ptSaveField(\''+taskId+'\',\'startDate\',this.value||null)">';

  // Tags
  html += '<div class="tp-section-label">🏷️ الوسوم</div>';
  html += '<div id="ptp-tags-'+taskId+'" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">'+tagsHtml+'</div>';
  html += '<div style="display:flex;gap:4px">';
  html += '<input id="ptp-tag-input-'+taskId+'" placeholder="+ وسم جديد..." style="flex:1;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:4px 8px;font-size:11px;color:var(--txt);font-family:inherit;outline:none" onkeydown="if(event.key===\'Enter\')ptpAddTag(\''+taskId+'\')" onfocus="this.style.borderColor=\'var(--gold)\'" onblur="this.style.borderColor=\'var(--brd)\'">';
  html += '<button onclick="ptpAddTag(\''+taskId+'\')" style="background:var(--gold-dim);border:1px solid var(--gold-b);color:var(--gold);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:12px">+</button>';
  html += '</div>';

  // Time Tracker
  html += '<div class="tp-section-label">⏱️ متتبع الوقت</div>';
  html += '<div class="tp-timer">';
  html += '<div class="tp-timer-display" id="ptp-timer-display-'+taskId+'">'+timeDisplay+'</div>';
  html += '<button class="tp-timer-btn '+(isRunning?'running':'')+'" id="ptp-timer-btn-'+taskId+'" onclick="ptpToggleTimer(\''+taskId+'\')">'+(isRunning?'⏸ إيقاف':'▶️ تشغيل')+'</button>';
  html += '</div>';
  if (timeSpent > 0) {
    html += '<div style="font-size:10px;color:var(--txt3);margin-top:4px">إجمالي الوقت: '+Math.round(timeSpent/60)+' دقيقة</div>';
  }

  // Dependency
  html += '<div class="tp-section-label">🔗 موقوفة بسبب</div>';
  html += '<input class="tp-dep-input" placeholder="اكتب عائق أو تبعية..." value="'+(t.dependency||'')+'" onblur="ptSaveField(\''+taskId+'\',\'dependency\',this.value)" onfocus="this.style.borderColor=\'var(--gold)\'" onblur_extra="this.style.borderColor=\'var(--brd)\'">';

  // Attachments
  html += '<div class="tp-section-label">🖼️ مرفقات</div>';
  html += '<div class="att-grid" id="ptp-att-grid-'+taskId+'">'+attHtml;
  html += '<button class="att-upload-btn" onclick="triggerAttUpload(\''+taskId+'\',\'personal\')" title="رفع ملف">+</button>';
  html += '</div>';
  html += '<div class="tp-drop-zone" id="ptp-drop-'+taskId+'" '
    +'ondragover="event.preventDefault();this.classList.add(\'drag-over\')" '
    +'ondragleave="this.classList.remove(\'drag-over\')" '
    +'ondrop="tpHandleDrop(event,\''+taskId+'\')" '
    +'onclick="triggerAttUpload(\''+taskId+'\',\'personal\')">'
    +'📎 اسحب ملفاً أو انقر للرفع</div>';

  // Actions
  html += '<div style="margin-top:16px;display:flex;flex-direction:column;gap:6px">';
  html += '<button class="btn btn-sm" style="width:100%" onclick="closeTaskPanel();archivePersonalTask(\''+taskId+'\')">🗄️ أرشفة</button>';
  html += '<button class="btn btn-sm btn-plain" style="width:100%;color:var(--danger)" onclick="deletePersonalTask(\''+taskId+'\')">🗑 حذف</button>';
  html += '</div>';

  html += '</div>'; // end tp-col-side
  html += '</div>'; // end tp-body

  document.getElementById('task-panel-content').innerHTML = html;
  document.getElementById('task-panel-overlay').classList.add('on');
  document.getElementById('task-panel').classList.add('on');
  document._tpEscHandler = function(e){ if(e.key==='Escape') closeTaskPanel(); };
  document.addEventListener('keydown', document._tpEscHandler);
}

function ptcStartInlineEdit(taskId) {
  var titleEl = document.getElementById('ptc-title-' + taskId);
  if (!titleEl) return;
  var currentTitle = titleEl.textContent.trim();
  var card = titleEl.closest('.brand-task-card');
  if (!card) return;
  // Disable drag while editing
  card.setAttribute('draggable', 'false');
  card.onclick = null;
  // Replace title with input
  var input = document.createElement('input');
  input.className = 'ptc-inline-input';
  input.value = currentTitle;
  titleEl.replaceWith(input);
  input.focus();
  input.select();
  function saveEdit() {
    var newTitle = input.value.trim();
    if (newTitle && newTitle !== currentTitle) {
      var t = PERSONAL_TASKS.find(function(x){ return x.id === taskId; });
      if (t) {

        t.title = newTitle;

    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }

  });
}

// ============================
function archiveItem(type, id, reason) {
  snap('أرشفة عنصر');
  var item = null;
  if (type === 'task') {
    item = TASKS.find(function(t){ return t.id === id; });
    if (!item) return;
    TASKS = TASKS.filter(function(t){ return t.id !== id; });
  } else if (type === 'subtask') {
    item = TASKS.find(function(t){ return t.id === id; });
    if (!item) return;
    TASKS = TASKS.filter(function(t){ return t.id !== id; });
  } else if (type === 'project') {
    item = PROJECTS.find(function(p){ return p.id === id; });
    if (!item) return;
    PROJECTS = PROJECTS.filter(function(p){ return p.id !== id; });
  } else if (type === 'decision') {
    item = DECISIONS.find(function(d){ return d.id === id; });
    if (!item) return;
    DECISIONS = DECISIONS.filter(function(d){ return d.id !== id; });
  }
  if (!item) return;
  ARCHIVE.push({
    id: genId(),
    type: type,
    reason: reason || 'manual',
    archivedAt: new Date().toISOString(),
    archivedMonth: state.activeMonth,
    archivedYear: state.activeYear,
    data: JSON.parse(JSON.stringify(item))
  });
  saveData();
  toast('🗄️ تم الأرشفة!', 'dim');
  render();
}

function restoreItem(archiveId) {
  var entry = ARCHIVE.find(function(a){ return a.id === archiveId; });
  if (!entry) return;
  snap('استعادة من الأرشيف');
  if (entry.type === 'task' || entry.type === 'subtask') TASKS.push(entry.data);
  else if (entry.type === 'project') PROJECTS.push(entry.data);
  else if (entry.type === 'decision') DECISIONS.push(entry.data);
  ARCHIVE = ARCHIVE.filter(function(a){ return a.id !== archiveId; });
  saveData();
  toast('↩️ تم الاستعادة!', 'ok');
  render();
}

function deleteArchiveItem(archiveId) {
  if (!confirm('حذف نهائيًا؟')) return;
  ARCHIVE = ARCHIVE.filter(function(a){ return a.id !== archiveId; });
  saveData();
  toast('🗑️ تم الحذف!', 'err');
  render();
}

function loadSalesData() {
  var url = SUPABASE_URL + '/rest/v1/salla_orders?select=*&order=created_at.desc&limit=200';
  fetch(url, {
    headers: {
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'apikey': SUPABASE_ANON_KEY
    }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    _salesLoading = false;
    _salesData = Array.isArray(data) ? data : [];
    if (state.currentPage === 'sales') renderSales();
  })
  .catch(function(err) {
    _salesLoading = false;
    _salesData = [];
    console.error('Sales load error:', err);
    if (state.currentPage === 'sales') renderSales();
  });
}

function renderWorlds() {
  var el = document.getElementById('s-worlds');
  if (!el) return;
  
  // إيقاف الساعة القديمة
  if (W2_CLOCK_INTERVAL) { clearInterval(W2_CLOCK_INTERVAL); W2_CLOCK_INTERVAL = null; }
  
  var tabs = [
    {id:'zen', label:'خلاصة اليوم', icon:'🌅', desc:'نبضة يومك'},
    {id:'family', label:'العائلة', icon:'👨‍👩‍👧‍👦', desc:'أحبابك'},
    {id:'health', label:'الصحة', icon:'💚', desc:'جسدك وعقلك'},
    {id:'growth', label:'التطوير', icon:'🚀', desc:'رحلتك'},
    {id:'wealth', label:'المالي', icon:'💎', desc:'ثروتك'}
  ];
  
  var tabsHtml = '<div class="w2-tabs-wrap"><div class="w2-tabs">' + tabs.map(function(t) {
    var active = W2_TAB === t.id;
    return '<button class="w2-tab' + (active ? ' active' : '') + '" onclick="W2_TAB=\'' + t.id + '\';renderWorlds()">'
      + '<span class="w2-tab-icon">' + t.icon + '</span>'
      + '<span class="w2-tab-label">' + t.label + '</span>'
      + '</button>';
  }).join('') + '</div></div>';
  
  var body = '';
  if (W2_TAB === 'zen') body = renderW2Zen();
  else if (W2_TAB === 'family') body = renderW2Family();
  else if (W2_TAB === 'health') body = renderW2Health();
  else if (W2_TAB === 'growth') body = renderW2Growth();
  else if (W2_TAB === 'wealth') body = renderW2Wealth();
  
  el.innerHTML = '<div class="w2-wrap">' + tabsHtml + '<div class="w2-body">' + body + '</div></div>';
  
  // تشغيل الساعة إذا كنا في خلاصة اليوم
  if (W2_TAB === 'zen') {
    W2_CLOCK_INTERVAL = setInterval(function() {
      var clockEl = document.getElementById('w2-clock');
      if (clockEl) {
        var now = new Date();
        var h = now.getHours().toString().padStart(2,'0');
        var m = now.getMinutes().toString().padStart(2,'0');
        var s = now.getSeconds().toString().padStart(2,'0');
        clockEl.textContent = h + ':' + m + ':' + s;
      } else {
        clearInterval(W2_CLOCK_INTERVAL);
      }
    }, 1000);
  }
}

  var membersHtml = W2_FAMILY_MEMBERS.map(function(m) {
    var daysUntilBday = w2DaysUntil(m.birthday.replace(/^\d{4}/, new Date().getFullYear().toString()));
    if (daysUntilBday < 0) daysUntilBday += 365;
    return '<div class="w2-member-card">'
      + '<div class="w2-member-avatar" style="background:' + m.color + '20;border:2px solid ' + m.color + '">' + m.emoji + '</div>'
      + '<div class="w2-member-info">'
      + '<div class="w2-member-name">' + m.name + '</div>'
      + '<div class="w2-member-relation" style="color:' + m.color + '">' + m.relation + '</div>'
      + '<div class="w2-member-note">' + m.lastNote + '</div>'
      + '</div>'
      + '<div class="w2-member-bday" style="color:' + m.color + '">🎂 ' + daysUntilBday + 'د</div>'
      + '</div>';
  }).join('');
  
  // Timeline الأحداث
  var upcomingEvents = W2_FAMILY_EVENTS.filter(function(e) { return e.date >= today; })
    .sort(function(a,b) { return a.date.localeCompare(b.date); });
  
  var timelineHtml = upcomingEvents.map(function(e) {
    var daysLeft = w2DaysUntil(e.date);
    var urgency = daysLeft <= 3 ? 'urgent' : daysLeft <= 7 ? 'soon' : 'normal';
    return '<div class="w2-timeline-item ' + urgency + '">'
      + '<div class="w2-timeline-dot" style="background:' + e.memberColor + '"></div>'
      + '<div class="w2-timeline-content">'
      + '<div class="w2-timeline-title">' + e.emoji + ' ' + e.title + '</div>'
      + '<div class="w2-timeline-meta">'
      + '<span>📅 ' + w2FormatDate(e.date) + ' — ' + e.time + '</span>'
      + (e.location ? '<span>📍 ' + e.location + '</span>' : '')
      + '</div>'
      + '</div>'
      + '<div class="w2-timeline-days" style="background:' + e.memberColor + '20;color:' + e.memberColor + '">'
      + (daysLeft === 0 ? 'اليوم!' : daysLeft + ' يوم')
      + '</div>'
      + '</div>';
  }).join('');
  
  // مهام العائلة
  var pendingTasks = W2_FAMILY_TASKS.filter(function(t) { return t.status === 'pending'; });
  var doneTasks = W2_FAMILY_TASKS.filter(function(t) { return t.status === 'done'; });
  var pct = Math.round((doneTasks.length / W2_FAMILY_TASKS.length) * 100);
  
  var priorityColors = {high:'#ef4444', medium:'#f59e0b', low:'#10b981'};
  var tasksHtml = W2_FAMILY_TASKS.map(function(t, i) {
    return '<div class="w2-ftask ' + (t.status==='done'?'done':'') + '" onclick="w2ToggleFamilyTask(' + i + ')">'
      + '<div class="w2-ftask-check" style="border-color:' + (t.status==='done'?priorityColors[t.priority]:priorityColors[t.priority]) + ';background:' + (t.status==='done'?priorityColors[t.priority]:'transparent') + '">'
      + (t.status==='done' ? '✓' : '')
      + '</div>'
      + '<div class="w2-ftask-body">'
      + '<div class="w2-ftask-title">' + t.title + '</div>'
      + '<div class="w2-ftask-meta">'
      + '<span class="w2-ftask-badge" style="background:' + priorityColors[t.priority] + '20;color:' + priorityColors[t.priority] + '">' + (t.priority==='high'?'عالي':t.priority==='medium'?'متوسط':'منخفض') + '</span>'
      + '<span style="color:var(--txt3);font-size:11px">👤 ' + t.assignee + '</span>'
      + (t.dueDate ? '<span style="color:var(--txt3);font-size:11px">📅 ' + w2FormatDate(t.dueDate) + '</span>' : '')
      + '</div>'
      + '</div>'
      + '</div>';
  }).join('');
  
  return '<div class="w2-family">'
    // Header
    + '<div class="w2-family-header">'
    + '<div>'
    + '<h2 class="w2-page-title">👨‍👩‍👧‍👦 العائلة</h2>'
    + '<p class="w2-page-sub">أحبابك وأحداثهم ومهامهم</p>'
    + '</div>'
    + '<div class="w2-family-progress">'
    + '<div class="w2-family-progress-bar"><div style="width:' + pct + '%;height:100%;border-radius:4px;background:linear-gradient(90deg,#10b981,#34d399)"></div></div>'
    + '<span style="font-size:12px;color:var(--txt2)">' + doneTasks.length + '/' + W2_FAMILY_TASKS.length + ' مهمة</span>'
    + '</div>'
    + '</div>'
    
    // Layout
    + '<div class="w2-family-layout">'
    
    // يمين — أفراد العائلة
    + '<div class="w2-family-members">'
    + '<h3 class="w2-section-title">👥 أفراد العائلة</h3>'
    + '<div class="w2-members-list">' + membersHtml + '</div>'
    + '</div>'
    
    // يسار — Timeline + مهام
    + '<div class="w2-family-main">'
    
    // Timeline
    + '<div class="w2-family-section">'
    + '<div class="w2-section-header">'
    + '<h3 class="w2-section-title">📅 الأحداث القادمة</h3>'
    + '<button class="w2-add-btn-sm" onclick="w2AddFamilyEvent()">+ حدث</button>'
    + '</div>'
    + '<div class="w2-timeline">' + (timelineHtml || '<div class="w2-empty">لا أحداث قادمة 🎉</div>') + '</div>'
    + '</div>'
    
    // مهام العائلة
    + '<div class="w2-family-section">'
    + '<div class="w2-section-header">'
    + '<h3 class="w2-section-title">✅ مهام العائلة</h3>'
    + '<button class="w2-add-btn-sm" onclick="w2AddFamilyTask()">+ مهمة</button>'
    + '</div>'
    + '<div class="w2-ftasks-list">' + tasksHtml + '</div>'
    + '</div>'
    
    + '</div>'
    + '</div>'
    + '</div>';
}

// ═══════════════════════════════════════
// 3. HEALTH — الصحة
// ═══════════════════════════════════════
function renderW2Health() {
  var today = new Date();
  var todayStr = today.toISOString().split('T')[0];
  
  // حساب الإحصائيات
  var last7 = [];
  for (var i = 6; i >= 0; i--) {
    var d = new Date(today);
    d.setDate(d.getDate() - i);
    last7.push(d.toISOString().split('T')[0]);
  }
  
  var weekStats = W2_HABITS.map(function(h) {
    var done = last7.filter(function(d) { return W2_HABIT_LOG[d] && W2_HABIT_LOG[d][h.id]; }).length;
    return {habit: h, done: done, pct: Math.round((done / 7) * 100)};
  });
  
  var totalScore = Math.round(weekStats.reduce(function(s, ws) { return s + ws.pct; }, 0) / weekStats.length);
  var streak = w2CalcStreak();
  
  // KPI Cards
  var kpiHtml = '<div class="w2-health-kpis">'
    + '<div class="w2-kpi" style="background:linear-gradient(135deg,#d1fae5,#a7f3d0)">'
    + '<div class="w2-kpi-icon">💪</div>'
    + '<div class="w2-kpi-val">' + totalScore + '%</div>'
    + '<div class="w2-kpi-label">نقاط الصحة</div>'
    + '</div>'
    + '<div class="w2-kpi" style="background:linear-gradient(135deg,#dbeafe,#bfdbfe)">'
    + '<div class="w2-kpi-icon">🔥</div>'
    + '<div class="w2-kpi-val">' + streak + '</div>'
    + '<div class="w2-kpi-label">يوم متواصل</div>'
    + '</div>'
    + '<div class="w2-kpi" style="background:linear-gradient(135deg,#fef3c7,#fde68a)">'
    + '<div class="w2-kpi-icon">🎯</div>'
    + '<div class="w2-kpi-val">' + weekStats.filter(function(ws){return ws.pct>=70}).length + '/' + W2_HABITS.length + '</div>'
    + '<div class="w2-kpi-label">عادة على المسار</div>'
    + '</div>'
    + '<div class="w2-kpi" style="background:linear-gradient(135deg,#ede9fe,#ddd6fe)">'
    + '<div class="w2-kpi-icon">📅</div>'
    + '<div class="w2-kpi-val">' + W2_APPOINTMENTS.filter(function(a){return a.status==='upcoming'}).length + '</div>'
    + '<div class="w2-kpi-label">موعد قادم</div>'
    + '</div>'
    + '</div>';
  
  // Habit Contribution Matrix — آخر 28 يوم
  var last28 = [];
  for (var j = 27; j >= 0; j--) {
    var dd = new Date(today);
    dd.setDate(dd.getDate() - j);
    last28.push(dd.toISOString().split('T')[0]);
  }
  
  var dayLabels = ['أح','إث','ثل','أر','خم','جم','سب'];
  
  var matrixHtml = '<div class="w2-habit-matrix">'
    + '<div class="w2-matrix-header">'
    + '<div class="w2-matrix-habit-col"></div>'
    + last28.slice(-7).map(function(d) {
        var dayIdx = new Date(d).getDay();
        return '<div class="w2-matrix-day-label">' + dayLabels[dayIdx] + '</div>';
      }).join('')
    + '</div>';
  
  W2_HABITS.forEach(function(h) {
    matrixHtml += '<div class="w2-matrix-row">'
      + '<div class="w2-matrix-habit-name">'
      + '<span class="w2-habit-icon">' + h.icon + '</span>'
      + '<span>' + h.name + '</span>'
      + '</div>';
    last28.forEach(function(dateStr) {
      var done = W2_HABIT_LOG[dateStr] && W2_HABIT_LOG[dateStr][h.id];
      var isToday = dateStr === todayStr;
      matrixHtml += '<div class="w2-matrix-cell' + (done ? ' done' : '') + (isToday ? ' today' : '') + '" '
        + 'style="' + (done ? 'background:' + h.color + ';opacity:0.85' : '') + '"'
        + ' onclick="w2ToggleHabit(\'' + h.id + '\',\'' + dateStr + '\')" '
        + ' title="' + h.name + ' — ' + dateStr + '"></div>';
    });
    matrixHtml += '</div>';
  });
  matrixHtml += '</div>';
  
  // المواعيد الطبية
  var apptHtml = W2_APPOINTMENTS.map(function(a) {
    return '<div class="w2-appt-card" style="border-inline-start:4px solid ' + a.color + '">'
      + '<div class="w2-appt-icon" style="background:' + a.color + '15">' + a.icon + '</div>'
      + '<div class="w2-appt-body">'
      + '<div class="w2-appt-doctor">' + a.doctor + '</div>'
      + '<div class="w2-appt-specialty" style="color:' + a.color + '">' + a.specialty + '</div>'
      + '<div class="w2-appt-meta">'
      + '<span>📅 ' + w2FormatDate(a.date) + ' — ' + a.time + '</span>'
      + '<span>🏥 ' + a.hospital + '</span>'
      + '</div>'
      + '</div>'
      + '<div class="w2-appt-status ' + a.status + '">' + (a.status==='upcoming'?'قادم':'مكتمل') + '</div>'
      + '</div>';
  }).join('');
  
  return '<div class="w2-health">'
    + '<div class="w2-page-header">'
    + '<h2 class="w2-page-title">💚 الصحة</h2>'
    + '<p class="w2-page-sub">جسدك وعقلك — عاداتك اليومية ومواعيدك الطبية</p>'
    + '</div>'
    + kpiHtml
    + '<div class="w2-health-layout">'
    + '<div class="w2-health-main">'
    + '<div class="w2-section-header">'
    + '<h3 class="w2-section-title">📊 مصفوفة العادات — آخر 28 يوم</h3>'
    + '<button class="w2-add-btn-sm" onclick="w2AddHabit()">+ عادة</button>'
    + '</div>'
    + matrixHtml
    + '</div>'
    + '<div class="w2-health-side">'
    + '<div class="w2-section-header">'
    + '<h3 class="w2-section-title">🩺 المواعيد الطبية</h3>'
    + '<button class="w2-add-btn-sm" onclick="w2AddAppt()">+ موعد</button>'
    + '</div>'
    + '<div class="w2-appts-list">' + apptHtml + '</div>'
    + '</div>'
    + '</div>'
    + '</div>';
}

// ═══════════════════════════════════════
// 4. GROWTH — التطوير الشخصي
// ═══════════════════════════════════════
function renderW2Growth() {
  // Kanban التعلم
  var cols = [
    {id:'active', label:'قيد التعلم', icon:'📖', color:'#3B82F6'},
    {id:'done', label:'مكتمل', icon:'✅', color:'#10B981'},
    {id:'backlog', label:'قائمة الانتظار', icon:'📋', color:'#8B5CF6'}
  ];
  
  var typeIcons = {book:'📚', course:'🎓', podcast:'🎙️'};
  var typeColors = {book:'#F59E0B', course:'#3B82F6', podcast:'#EC4899'};
  
  var kanbanHtml = '<div class="w2-growth-kanban">' + cols.map(function(col) {
    var items = W2_LEARNING.filter(function(l) { return l.status === col.id; });
    return '<div class="w2-kanban-col2">'
      + '<div class="w2-kanban-col2-header" style="border-bottom:2px solid ' + col.color + '">'
      + '<span>' + col.icon + ' ' + col.label + '</span>'
      + '<span class="w2-kanban-count" style="background:' + col.color + '20;color:' + col.color + '">' + items.length + '</span>'
      + '</div>'
      + items.map(function(item) {
          return '<div class="w2-learning-card">'
            + '<div class="w2-learning-card-top">'
            + '<span class="w2-learning-type" style="background:' + typeColors[item.type] + '15;color:' + typeColors[item.type] + '">' + typeIcons[item.type] + ' ' + (item.type==='book'?'كتاب':item.type==='course'?'دورة':'بودكاست') + '</span>'
            + (item.rating > 0 ? '<span class="w2-learning-rating">★'.repeat(item.rating) + '☆'.repeat(5-item.rating) + '</span>' : '')
            + '</div>'
            + '<div class="w2-learning-title">' + item.title + '</div>'
            + '<div class="w2-learning-author">' + item.author + '</div>'
            + (item.progress > 0 ? '<div class="w2-learning-progress-wrap"><div class="w2-learning-progress-bar" style="width:' + item.progress + '%;background:' + col.color + '"></div></div><div class="w2-learning-pct">' + item.progress + '%</div>' : '')
            + (item.notes ? '<div class="w2-learning-notes">💬 ' + item.notes + '</div>' : '')
            + '</div>';
        }).join('')
      + '<button class="w2-kanban-add" onclick="w2AddLearning(\'' + col.id + '\')">+ إضافة</button>'
      + '</div>';
  }).join('') + '</div>';
  
  // أفكار التطوير — Masonry
  var ideasHtml = '<div class="w2-ideas-grid">' + W2_IDEAS.map(function(idea) {
    var statusColors = {active:'#10B981', backlog:'#8B5CF6'};
    return '<div class="w2-idea-card" style="border-top:3px solid ' + idea.color + '">'
      + '<div class="w2-idea-header">'
      + '<span class="w2-idea-status" style="background:' + statusColors[idea.status] + '15;color:' + statusColors[idea.status] + '">' + (idea.status==='active'?'🔥 نشط':'📋 انتظار') + '</span>'
      + '<span class="w2-idea-date">' + w2FormatDate(idea.date) + '</span>'
      + '</div>'
      + '<div class="w2-idea-title">' + idea.title + '</div>'
      + '<div class="w2-idea-desc">' + idea.desc + '</div>'
      + '<div class="w2-idea-tags">' + idea.tags.map(function(tag) {
          return '<span class="w2-idea-tag" style="background:' + idea.color + '15;color:' + idea.color + '">#' + tag + '</span>';
        }).join('') + '</div>'
      + '</div>';
  }).join('') + '</div>';
  
  // XP Points
  var xpTotal = W2_LEARNING.filter(function(l){return l.status==='done'}).length * 100
    + W2_LEARNING.filter(function(l){return l.status==='active'}).reduce(function(s,l){return s+l.progress},0)
    + W2_IDEAS.filter(function(i){return i.status==='active'}).length * 25;
  var xpLevel = Math.floor(xpTotal / 200) + 1;
  var xpInLevel = xpTotal % 200;
  
  return '<div class="w2-growth">'
    + '<div class="w2-page-header">'
    + '<div>'
    + '<h2 class="w2-page-title">🚀 التطوير الشخصي</h2>'
    + '<p class="w2-page-sub">رحلة التعلم والأفكار والنمو المستمر</p>'
    + '</div>'
    + '<div class="w2-xp-badge">'
    + '<div class="w2-xp-level">المستوى ' + xpLevel + '</div>'
    + '<div class="w2-xp-bar"><div style="width:' + Math.round((xpInLevel/200)*100) + '%;height:100%;border-radius:4px;background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div></div>'
    + '<div class="w2-xp-pts">' + xpTotal + ' XP</div>'
    + '</div>'
    + '</div>'
    
    + '<div class="w2-growth-layout">'
    
    + '<div class="w2-growth-main">'
    + '<div class="w2-section-header">'
    + '<h3 class="w2-section-title">📚 مكتبة التعلم</h3>'
    + '<button class="w2-add-btn-sm" onclick="w2AddLearning(\'backlog\')">+ إضافة</button>'
    + '</div>'
    + kanbanHtml
    + '</div>'
    
    + '<div class="w2-growth-ideas">'
    + '<div class="w2-section-header">'
    + '<h3 class="w2-section-title">💡 أفكاري</h3>'
    + '<button class="w2-add-btn-sm" onclick="w2AddIdea()">+ فكرة</button>'
    + '</div>'
    + ideasHtml
    + '</div>'
    
    + '</div>'
    + '</div>';
}

// ═══════════════════════════════════════
// 5. WEALTH — المالي الشخصي
// ═══════════════════════════════════════
function renderW2Wealth() {
  var totalBalance = W2_ACCOUNTS.reduce(function(s,a){return s+a.balance},0);
  var totalIncome = W2_TRANSACTIONS.filter(function(t){return t.type==='income'}).reduce(function(s,t){return s+t.amount},0);
  var totalExpense = W2_TRANSACTIONS.filter(function(t){return t.type==='expense'}).reduce(function(s,t){return s+t.amount},0);
  var savings = totalIncome - totalExpense;
  var savingsRate = totalIncome > 0 ? Math.round((savings/totalIncome)*100) : 0;
  
  // Health Score
  var healthScore = Math.min(100, Math.round(
    (savingsRate * 0.4) + 
    (totalBalance > 50000 ? 30 : (totalBalance/50000)*30) + 
    (W2_ACCOUNTS.filter(function(a){return a.balance>0}).length / W2_ACCOUNTS.length * 30)
  ));
  
  // KPIs
  var kpiHtml = '<div class="w2-wealth-hero">'
    + '<div class="w2-wealth-net">'
    + '<div class="w2-wealth-net-label">💎 صافي الثروة</div>'
    + '<div class="w2-wealth-net-amount">' + totalBalance.toLocaleString('ar-SA') + ' <span>ر.س</span></div>'
    + '<div class="w2-wealth-health">'
    + '<span>صحة مالية</span>'
    + '<div class="w2-health-score-bar"><div style="width:' + healthScore + '%;height:100%;border-radius:4px;background:linear-gradient(90deg,#10b981,#34d399)"></div></div>'
    + '<span style="color:#10b981;font-weight:700">' + healthScore + '/100</span>'
    + '</div>'
    + '</div>'
    + '<div class="w2-wealth-kpis">'
    + '<div class="w2-wealth-kpi income">'
    + '<div class="w2-wealth-kpi-icon">📈</div>'
    + '<div class="w2-wealth-kpi-val">+' + totalIncome.toLocaleString('ar-SA') + '</div>'
    + '<div class="w2-wealth-kpi-label">الدخل الشهري</div>'
    + '</div>'
    + '<div class="w2-wealth-kpi expense">'
    + '<div class="w2-wealth-kpi-icon">📉</div>'
    + '<div class="w2-wealth-kpi-val">-' + totalExpense.toLocaleString('ar-SA') + '</div>'
    + '<div class="w2-wealth-kpi-label">المصروفات</div>'
    + '</div>'
    + '<div class="w2-wealth-kpi savings">'
    + '<div class="w2-wealth-kpi-icon">💰</div>'
    + '<div class="w2-wealth-kpi-val">' + savings.toLocaleString('ar-SA') + '</div>'
    + '<div class="w2-wealth-kpi-label">الوفر (' + savingsRate + '%)</div>'
    + '</div>'
    + '</div>'
    + '</div>';
  
  // الحسابات
  var accountsHtml = '<div class="w2-accounts-list">' + W2_ACCOUNTS.map(function(a) {
    var maxBal = Math.max.apply(null, W2_ACCOUNTS.map(function(x){return Math.abs(x.balance)}));
    var pct = Math.round((Math.abs(a.balance) / maxBal) * 100);
    var isNeg = a.balance < 0;
    return '<div class="w2-account-card">'
      + '<div class="w2-account-top">'
      + '<div class="w2-account-icon" style="background:' + a.color + '20">' + a.icon + '</div>'
      + '<div class="w2-account-info">'
      + '<div class="w2-account-name">' + a.name + '</div>'
      + '<div class="w2-account-bank">' + a.bank + '</div>'
      + '</div>'
      + '<div class="w2-account-balance" style="color:' + (isNeg?'#ef4444':a.color) + '">'
      + (isNeg?'-':'') + Math.abs(a.balance).toLocaleString('ar-SA') + ' ر.س'
      + '</div>'
      + '</div>'
      + '<div class="w2-account-bar"><div style="width:' + pct + '%;height:100%;border-radius:4px;background:' + (isNeg?'#ef4444':a.color) + ';opacity:0.7"></div></div>'
      + '</div>';
  }).join('') + '</div>';
  
  // المعاملات
  var sortedTx = W2_TRANSACTIONS.slice().sort(function(a,b){return b.date.localeCompare(a.date)});
  var txHtml = '<div class="w2-tx-list">' + sortedTx.map(function(t) {
    return '<div class="w2-tx-item">'
      + '<div class="w2-tx-icon">' + t.icon + '</div>'
      + '<div class="w2-tx-body">'
      + '<div class="w2-tx-desc">' + t.desc + '</div>'
      + '<div class="w2-tx-date">' + w2FormatDate(t.date) + '</div>'
      + '</div>'
      + '<div class="w2-tx-amount ' + t.type + '">' + (t.type==='income'?'+':'-') + t.amount.toLocaleString('ar-SA') + ' ر.س</div>'
      + '</div>';
  }).join('') + '</div>';
  
  // توزيع الإنفاق
  var catTotals = {};
  W2_TRANSACTIONS.filter(function(t){return t.type==='expense'}).forEach(function(t){
    catTotals[t.cat] = (catTotals[t.cat]||0) + t.amount;

function w2FormatDate(dateStr) {
  if (!dateStr) return '';
  var months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  var parts = dateStr.split('-');
  return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1];
}

function w2DaysUntil(dateStr) {
  var today = new Date();
  today.setHours(0,0,0,0);
  var target = new Date(dateStr);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
}

function w2CalcStreak() {
  var today = new Date();
  var streak = 0;
  for (var i = 0; i < 30; i++) {
    var d = new Date(today);
    d.setDate(d.getDate() - i);
    var dateStr = d.toISOString().split('T')[0];
    var log = W2_HABIT_LOG[dateStr];
    if (!log) break;
    var anyDone = Object.values(log).some(function(v){return v});
    if (anyDone) streak++;
    else break;
  }
  return streak;
}

// ── Dropdown helpers ──
function tpToggleDd(btn) {
  var menu = btn.nextElementSibling;
  if (!menu) return;
  // Close all other open dropdowns first
  document.querySelectorAll('.tp-dd-menu.open').forEach(function(m){
    if (m !== menu) m.classList.remove('open');
  });
  menu.classList.toggle('open');
  // Close on outside click
  if (menu.classList.contains('open')) {
    setTimeout(function(){
      document.addEventListener('click', function _close(e){
        if (!menu.contains(e.target) && e.target !== btn) {
          menu.classList.remove('open');
          document.removeEventListener('click', _close);
        }
      });
    }, 10);
  }
}
function tpCloseDd(item) {
  var menu = item.closest('.tp-dd-menu');
  if (menu) menu.classList.remove('open');
}

// ── Time Tracker ──
window._tpTimerTask = null;
window._tpTimerInterval = null;
window._tpTimerStart = null;

function tpToggleTimer(taskId) {
  var t = TASKS.find(function(x){ return x.id === taskId; });
  if (!t) return;
  if (!t.timeSpent) t.timeSpent = 0;

  if (window._tpTimerTask === taskId && window._tpTimerInterval) {
    // Stop
    clearInterval(window._tpTimerInterval);
    var elapsed = Math.floor((Date.now() - window._tpTimerStart) / 1000);
    t.timeSpent += elapsed;
    window._tpTimerInterval = null;
    window._tpTimerTask = null;
    window._tpTimerStart = null;
    saveData();
    var btn = document.getElementById('tp-timer-btn-'+taskId);
    if (btn) { btn.textContent = '▶️ تشغيل'; btn.classList.remove('running'); }
    tpLogActivity(taskId, 'تم تسجيل '+elapsed+' ثانية من العمل');
  } else {
    // Stop any other running timer
    if (window._tpTimerInterval) clearInterval(window._tpTimerInterval);
    window._tpTimerTask = taskId;
    window._tpTimerStart = Date.now();
    var btn2 = document.getElementById('tp-timer-btn-'+taskId);
    if (btn2) { btn2.textContent = '⏸ إيقاف'; btn2.classList.add('running'); }
    window._tpTimerInterval = setInterval(function(){
      var elapsed2 = Math.floor((Date.now() - window._tpTimerStart) / 1000);
      var total = (t.timeSpent||0) + elapsed2;
      var h = Math.floor(total/3600), m = Math.floor((total%3600)/60), s = total%60;
      var disp = (h?h+'h ':'')+( m<10?'0':'')+m+':'+(s<10?'0':'')+s;
      var dispEl = document.getElementById('tp-timer-display-'+taskId);
      if (dispEl) dispEl.textContent = disp;
    }, 1000);
  }
}
