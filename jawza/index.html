<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الجوزاء — المدير التنفيذي الافتراضي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ==============================
       DESIGN SYSTEM — الجوزاء
       خلفية داكنة #0a1628 + ذهبي #C9963B
       Typography: IBM Plex Sans Arabic
       ============================== */
    :root {
      --bg-deep:    #0a1628;
      --bg-card:    #0f1e38;
      --bg-hover:   #142240;
      --gold:       #C9963B;
      --gold-light: #E8C068;
      --gold-dim:   rgba(201,150,59,0.15);
      --white:      #ffffff;
      --white-80:   rgba(255,255,255,0.80);
      --white-50:   rgba(255,255,255,0.50);
      --white-20:   rgba(255,255,255,0.20);
      --white-08:   rgba(255,255,255,0.08);
      --mono:       'IBM Plex Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans Arabic', sans-serif;
      background: var(--bg-deep);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      top: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: #10b981;
      color: #fff;
      padding: .7rem 1.6rem;
      border-radius: 2rem;
      font-size: .95rem;
      font-weight: 600;
      z-index: 9999;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(16,185,129,.4);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--white-08);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(10,22,40,.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--gold-dim);
      border: 1px solid var(--gold);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .logo-text { font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .logo-sub  { font-size: .75rem; color: var(--white-50); margin-top: 1px; }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .ghost-mode {
      display: flex; align-items: center; gap: .5rem;
      font-size: .8rem; color: var(--white-50);
      padding: .35rem .9rem;
      border: 1px solid var(--white-20);
      border-radius: 2rem;
    }
    .ghost-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(1.4); }
    }

    /* ── CASH WIDGET ── */
    .cash-widget {
      background: var(--bg-card);
      border: 1px solid var(--white-08);
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      margin: 1.5rem 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 1.5rem;
      align-items: center;
    }
    .cash-item { display: flex; flex-direction: column; gap: .4rem; }
    .cash-label { font-size: .75rem; color: var(--white-50); }
    .cash-value { font-size: .95rem; font-weight: 600; color: var(--white); }
    .cash-bar {
      height: 5px;
      background: var(--white-08);
      border-radius: 3px;
      overflow: hidden;
    }
    .cash-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .8s ease;
    }
    .cash-fill.high   { background: #10b981; }
    .cash-fill.medium { background: var(--gold); }
    .cash-fill.low    { background: #ef4444; }
    .cash-alert {
      background: rgba(201,150,59,.12);
      border: 1px solid rgba(201,150,59,.3);
      border-radius: 10px;
      padding: .6rem 1rem;
      font-size: .8rem;
      color: var(--gold-light);
      text-align: center;
      line-height: 1.5;
    }

    /* ── FOCUS MODE ── */
    #focus-mode {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,.97);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      padding: 2rem;
    }
    #focus-mode.active { display: flex; }
    .focus-header { text-align: center; }
    .focus-greeting { font-size: 2rem; font-weight: 700; color: var(--gold); margin-bottom: .5rem; }
    .focus-date { font-size: 1rem; color: var(--white-50); }
    .focus-divider { width: 100%; max-width: 600px; height: 1px; background: var(--white-08); }
    .focus-label { font-size: .85rem; color: var(--white-50); text-align: center; letter-spacing: .05em; }
    .focus-card-wrap { width: 100%; max-width: 600px; }
    .focus-actions {
      display: flex; gap: 1rem;
    }
    .btn-focus-done {
      background: #10b981;
      color: #fff;
      border: none;
      padding: .8rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform .15s, box-shadow .15s;
    }
    .btn-focus-done:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(16,185,129,.4); }
    .btn-focus-more {
      background: var(--white-08);
      color: var(--white-80);
      border: 1px solid var(--white-20);
      padding: .8rem 2rem;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
    }
    .btn-focus-more:hover { background: var(--white-20); }

    /* ── MAIN LAYOUT ── */
    .main-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 4rem;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 2rem 0 1.2rem;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--white-50);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .section-count {
      font-size: .8rem;
      color: var(--white-50);
      background: var(--white-08);
      padding: .2rem .7rem;
      border-radius: 2rem;
    }

    /* ── COMMAND CARD ── */
    .cmd-card {
      border-radius: 16px;
      border: 1px solid;
      padding: 1.5rem;
      margin-bottom: 1rem;
      position: relative;
      overflow: hidden;
      animation: slideIn .4s cubic-bezier(.34,1.2,.64,1) both;
      transition: transform .2s, box-shadow .2s;
    }
    .cmd-card:hover { transform: translateY(-2px); }

    @keyframes slideIn {
      from { opacity:0; transform: translateX(30px); }
      to   { opacity:1; transform: translateX(0); }
    }

    /* glow on entry */
    .cmd-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0;
      transition: opacity 1.5s;
      pointer-events: none;
    }
    .cmd-card.glow::before { opacity: 1; }

    /* card types */
    .card-urgent      { background: rgba(239,68,68,.08);   border-color: #ef4444; }
    .card-urgent::before { box-shadow: 0 0 30px rgba(239,68,68,.2) inset; }
    .card-opportunity { background: rgba(245,158,11,.08);  border-color: #f59e0b; }
    .card-opportunity::before { box-shadow: 0 0 30px rgba(245,158,11,.2) inset; }
    .card-planning    { background: rgba(16,185,129,.06);  border-color: #10b981; }
    .card-celebration { background: rgba(201,150,59,.12);  border-color: #C9963B; }
    .card-warning     { background: rgba(249,115,22,.08);  border-color: #f97316; }
    .card-waiting     { background: rgba(148,163,184,.05); border-color: #64748b; }
    .card-info        { background: rgba(59,130,246,.06);  border-color: #3b82f6; }

    /* card header row */
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }
    .card-badge {
      display: flex; align-items: center; gap: .5rem;
      font-size: .8rem; font-weight: 600;
    }
    .badge-dot { font-size: 1rem; }
    .badge-urgency {
      font-family: var(--mono);
      font-size: .75rem;
      padding: .2rem .6rem;
      border-radius: 2rem;
      background: var(--white-08);
      color: var(--white-50);
    }
    .card-timing {
      font-size: .78rem;
      color: var(--white-50);
      display: flex; align-items: center; gap: .3rem;
    }

    /* title */
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      line-height: 1.5;
      margin-bottom: .8rem;
    }

    /* context */
    .card-context {
      font-size: .9rem;
      color: var(--white-80);
      line-height: 1.7;
      margin-bottom: 1rem;
    }
    .card-context .num {
      font-family: var(--mono);
      color: var(--gold);
      font-weight: 500;
    }

    /* divider */
    .card-divider {
      height: 1px;
      background: var(--white-08);
      margin: 1rem 0;
    }

    /* outcome rows */
    .card-outcomes { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1rem; }
    .outcome-row { display: flex; gap: .6rem; font-size: .88rem; line-height: 1.5; }
    .outcome-icon { flex-shrink: 0; margin-top: .1rem; }
    .outcome-if   { color: #6ee7b7; }
    .outcome-else { color: #fca5a5; }

    /* saudi context tag */
    .saudi-tag {
      display: inline-flex; align-items: center; gap: .4rem;
      font-size: .78rem;
      background: rgba(201,150,59,.1);
      border: 1px solid rgba(201,150,59,.25);
      color: var(--gold-light);
      padding: .3rem .8rem;
      border-radius: 2rem;
      margin-bottom: 1rem;
    }

    /* action buttons */
    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      margin-top: .5rem;
    }
    .btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .55rem 1.1rem;
      border-radius: 9px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: transform .15s, box-shadow .15s, opacity .15s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0) scale(.97); }

    .btn-magic {
      background: var(--gold);
      color: #0a1628;
    }
    .btn-magic:hover { box-shadow: 0 6px 20px rgba(201,150,59,.5); }

    .btn-magic-2 {
      background: rgba(201,150,59,.15);
      color: var(--gold-light);
      border: 1px solid rgba(201,150,59,.3);
    }
    .btn-magic-2:hover { background: rgba(201,150,59,.25); }

    .btn-done {
      background: rgba(16,185,129,.15);
      color: #6ee7b7;
      border: 1px solid rgba(16,185,129,.3);
    }
    .btn-done:hover { background: rgba(16,185,129,.25); }

    .btn-snooze {
      background: var(--white-08);
      color: var(--white-50);
      border: 1px solid var(--white-20);
    }
    .btn-snooze:hover { background: var(--white-20); }

    .btn-remind {
      background: rgba(59,130,246,.12);
      color: #93c5fd;
      border: 1px solid rgba(59,130,246,.25);
    }

    /* expand section */
    .card-expand {
      margin-top: 1rem;
      border-top: 1px solid var(--white-08);
      padding-top: .8rem;
    }
    .expand-toggle {
      background: none;
      border: none;
      color: var(--white-50);
      font-size: .82rem;
      cursor: pointer;
      font-family: inherit;
      display: flex; align-items: center; gap: .4rem;
      padding: 0;
      transition: color .15s;
    }
    .expand-toggle:hover { color: var(--white-80); }
    .expand-content {
      display: none;
      margin-top: .8rem;
      font-size: .85rem;
      color: var(--white-50);
      line-height: 1.7;
      background: var(--white-08);
      border-radius: 8px;
      padding: .8rem 1rem;
    }
    .expand-content.open { display: block; }

    /* executed/snoozed states */
    .cmd-card.executed {
      animation: shrinkOut .5s ease forwards;
    }
    .cmd-card.snoozed {
      opacity: .45;
      transform: scale(.98);
      transition: opacity .4s, transform .4s;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    @keyframes shrinkOut {
      to { opacity:0; transform: scale(.9); max-height:0; padding:0; margin:0; overflow:hidden; }
    }

    /* ── TOP CONTROLS ── */
    .top-controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0 0;
    }
    .btn-focus-open {
      background: var(--gold-dim);
      border: 1px solid rgba(201,150,59,.4);
      color: var(--gold);
      padding: .55rem 1.2rem;
      border-radius: 9px;
      font-size: .88rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex; align-items: center; gap: .5rem;
      transition: background .15s;
    }
    .btn-focus-open:hover { background: rgba(201,150,59,.2); }

    .filter-tabs {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .filter-tab {
      background: var(--white-08);
      border: 1px solid var(--white-20);
      color: var(--white-50);
      padding: .4rem .9rem;
      border-radius: 2rem;
      font-size: .8rem;
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .filter-tab.active, .filter-tab:hover {
      background: var(--gold-dim);
      border-color: rgba(201,150,59,.4);
      color: var(--gold);
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--white-20); border-radius: 3px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .cash-widget { grid-template-columns: 1fr 1fr; }
      .card-title { font-size: 1rem; }
      header { padding: .8rem 1rem; }
    }
  </style>
</head>
<body>

<!-- TOAST -->
<div id="toast">✓ تم النسخ</div>

<!-- FOCUS MODE OVERLAY -->
<div id="focus-mode">
  <div class="focus-header">
    <div class="focus-greeting" id="focus-greeting">صباح الخير يا غازي ☀️</div>
    <div class="focus-date" id="focus-date"></div>
  </div>
  <div class="focus-divider"></div>
  <div class="focus-label">⬇ قرار اليوم الذي لا يُؤجّل</div>
  <div class="focus-card-wrap" id="focus-card-wrap"></div>
  <div class="focus-actions">
    <button class="btn-focus-done" onclick="closeFocus(true)">نفّذت ✅</button>
    <button class="btn-focus-more" onclick="closeFocus(false)">عرض باقي القرارات ←</button>
  </div>
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">🌙</div>
    <div>
      <div class="logo-text">الجوزاء</div>
      <div class="logo-sub">المدير التنفيذي الافتراضي — بيت الجوزاء</div>
    </div>
  </div>
  <div class="header-meta">
    <div class="ghost-mode">
      <div class="ghost-dot"></div>
      الجوزاء يراقب...
    </div>
  </div>
</header>

<!-- CASH WIDGET -->
<div style="max-width:900px;margin:0 auto;padding:0 1.5rem;">
  <div class="cash-widget">
    <div class="cash-item">
      <div class="cash-label">💰 الرواتب</div>
      <div class="cash-value">بعد <span style="color:var(--gold);font-family:var(--mono)">3</span> أيام</div>
      <div class="cash-bar"><div class="cash-fill high" style="width:85%"></div></div>
    </div>
    <div class="cash-item">
      <div class="cash-label">🏦 حساب المواطن</div>
      <div class="cash-value">بعد <span style="color:var(--gold);font-family:var(--mono)">15</span> يوم</div>
      <div class="cash-bar"><div class="cash-fill medium" style="width:40%"></div></div>
    </div>
    <div class="cash-item">
      <div class="cash-label">🌙 العيد</div>
      <div class="cash-value">بعد <span style="color:var(--gold);font-family:var(--mono)">12</span> يوم</div>
      <div class="cash-bar"><div class="cash-fill high" style="width:70%"></div></div>
    </div>
    <div class="cash-alert">
      🔥 فرصة ذهبية<br>
      الرواتب + العيد = ذروة الإنفاق
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main-wrap">

  <!-- TOP CONTROLS -->
  <div class="top-controls">
    <button class="btn-focus-open" onclick="openFocus()">☀️ وضع التركيز الصباحي</button>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterCards('all', this)">الكل</button>
      <button class="filter-tab" onclick="filterCards('urgent', this)">🔴 عاجل</button>
      <button class="filter-tab" onclick="filterCards('opportunity', this)">🟡 فرصة</button>
      <button class="filter-tab" onclick="filterCards('planning', this)">🟢 تخطيط</button>
      <button class="filter-tab" onclick="filterCards('waiting', this)">⚪ انتظار</button>
    </div>
  </div>

  <div class="section-header">
    <div class="section-title">أوامر الجوزاء اليوم</div>
    <div class="section-count" id="cards-count">15 قرار</div>
  </div>

  <!-- CARDS CONTAINER -->
  <div id="cards-container"></div>

</div>

<script>
/* ==============================
   MOCK DATA — 15 سيناريو
   ============================== */
const scenarios = [
  {
    id: 1,
    type: 'urgent',
    badge: '🔴 عاجل',
    urgency: '9/10',
    timing: 'اليوم',
    title: 'يا غازي، اطلب ٥٠٠ وحدة من "إصدار خاص القديم" الآن',
    context: 'يبيع <span class="num">٣ قطع/يوم</span>. المخزون <span class="num">١٥ قطعة = ٥ أيام</span>. المصنع يحتاج <span class="num">٧ أيام</span>. الفجوة يومين. رمضان بعد <span class="num">٣ أسابيع</span> = ذروة المبيعات.',
    ifExecuted: 'ربح متوقع <span class="num">١٩,٢٥٠ ريال</span> خلال ٣٣ يوم — مخزون جاهز قبل ذروة رمضان',
    ifDelayed: 'نفاد مخزون + خسارة <span class="num">٦,٠٠٠ ريال</span> مبيعات فائتة + عميلات يروحون للمنافس',
    saudiTag: '🇸🇦 الرواتب بعد ٣ أيام + رمضان قريب',
    buttons: [
      { label: '⚡ نسخ رسالة المصنع', type: 'magic', text: 'السلام عليكم ورحمة الله وبركاته أستاذ محمد،\n\nأحتاج دفعة جديدة عاجلة:\n• المنتج: بخاخ "إصدار خاص القديم"\n• الكمية: ٥٠٠ وحدة\n• المواصفات: نفس السابقة (تركيز ٢٠%، حجم ١٠٠ مل)\n• موعد التسليم المطلوب: خلال ٧ أيام\n• الدفع: نفس الاتفاق السابق\n\nالموسم على الأبواب والمخزون قارب ينفد.\nالرجاء التأكيد وإعطائي تاريخ التسليم.\n\nشاكر تعاونكم،\nغازي' },
      { label: '📞 اتصل بأبو محمد', type: 'magic-2', text: null },
      { label: '✅ نفّذت', type: 'done' },
      { label: '💤 ذكرني بكرة', type: 'snooze' }
    ],
    why: 'قاعدة الجوزاء: المخزون يكفي ٥ أيام، المصنع يحتاج ٧. الفجوة يومين تعني نفاد مؤكد قبل وصول الشحنة. رمضان يضاعف الطلب ٣ مرات. القرار واضح.'
  },
  {
    id: 2,
    type: 'opportunity',
    badge: '🟡 فرصة',
    urgency: '8/10',

/* ==============================
   RENDER ENGINE
   ============================== */
function renderCard(s, delay = 0) {
  const card = document.createElement('div');
  card.className = `cmd-card card-${s.type}`;
  card.id = `card-${s.id}`;
  card.style.animationDelay = `${delay}ms`;
  card.dataset.type = s.type;

  const urgencyBadge = s.urgency
    ? `<span class="badge-urgency">${s.urgency}</span>`
    : '';

  const saudiTag = s.saudiTag
    ? `<div class="saudi-tag">🇸🇦 ${s.saudiTag.replace('🇸🇦 ','')}</div>`
    : '';

  const buttonsHtml = s.buttons.map(b => {
    let cls = 'btn ';
    if (b.type === 'magic')   cls += 'btn-magic';
    else if (b.type === 'magic-2') cls += 'btn-magic-2';
    else if (b.type === 'done')    cls += 'btn-done';
    else if (b.type === 'snooze')  cls += 'btn-snooze';
    else if (b.type === 'remind')  cls += 'btn-remind';

    const onclick = b.text
      ? `copyText(${JSON.stringify(b.text)}, this)`
      : b.type === 'done'
        ? `markDone(${s.id})`
        : b.type === 'snooze'
          ? `markSnoozed(${s.id})`
          : '';

    return `<button class="${cls}" onclick="${onclick}">${b.label}</button>`;
  }).join('');

  card.innerHTML = `
    <div class="card-top">
      <div class="card-badge">
        <span class="badge-dot">${s.badge.split(' ')[0]}</span>
        <span>${s.badge.split(' ').slice(1).join(' ')}</span>
        ${urgencyBadge}
      </div>
      <div class="card-timing">⏱️ ${s.timing}</div>
    </div>
    <div class="card-title">${s.title}</div>
    <div class="card-context">${s.context}</div>
    <div class="card-divider"></div>
    <div class="card-outcomes">
      <div class="outcome-row outcome-if">
        <span class="outcome-icon">✅</span>
        <span><strong>لو نفّذت:</strong> ${s.ifExecuted}</span>
      </div>
      <div class="outcome-row outcome-else">
        <span class="outcome-icon">⚠️</span>
        <span><strong>لو تأخرت:</strong> ${s.ifDelayed}</span>
      </div>
    </div>
    ${saudiTag}
    <div class="card-actions">${buttonsHtml}</div>
    <div class="card-expand">
      <button class="expand-toggle" onclick="toggleExpand(this)">▼ لماذا هذا القرار؟</button>
      <div class="expand-content">${s.why}</div>
    </div>
  `;

  // glow on entry
  setTimeout(() => card.classList.add('glow'), 100 + delay);

  return card;
}

function renderAll(filter = 'all') {
  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  const filtered = filter === 'all' ? scenarios : scenarios.filter(s => s.type === filter);
  filtered.forEach((s, i) => container.appendChild(renderCard(s, i * 60)));
  document.getElementById('cards-count').textContent = `${filtered.length} قرار`;
}

/* ==============================
   INTERACTIONS
   ============================== */
function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ تم النسخ — الصق وأرسل');
    // shake animation on card
    const card = btn.closest('.cmd-card');
    card.style.animation = 'shake .4s ease';
    setTimeout(() => card.style.animation = '', 400);
    // confirm after 3s
    setTimeout(() => {
      if (confirm('هل أرسلت الرسالة؟')) {
        markDone(parseInt(card.id.replace('card-','')));
      }
    }, 3000);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ تم النسخ');
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function markDone(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.classList.add('executed');
  showToast('✅ تم تسجيل القرار كمنفّذ');
  setTimeout(() => card.remove(), 500);
}

function markSnoozed(id) {
  const card = document.getElementById(`card-${id}`);
  if (!card) return;
  card.classList.add('snoozed');
  showToast('💤 سيُذكّرك الجوزاء لاحقاً');
}

function toggleExpand(btn) {
  const content = btn.nextElementSibling;
  content.classList.toggle('open');
  btn.textContent = content.classList.contains('open')
    ? '▲ إخفاء التفاصيل'
    : '▼ لماذا هذا القرار؟';
}

function filterCards(type, btn) {
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderAll(type);
}

/* ==============================
   FOCUS MODE
   ============================== */
function openFocus() {
  const fm = document.getElementById('focus-mode');
  fm.classList.add('active');

  // set date
  const now = new Date();
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  document.getElementById('focus-date').textContent =
    `${days[now.getDay()]} ${now.toLocaleDateString('ar-SA-u-ca-islamic', {day:'numeric',month:'long',year:'numeric'})}`;

  // set greeting
  const h = now.getHours();
  const greeting = h < 12 ? 'صباح الخير يا غازي ☀️'
                 : h < 17 ? 'مساء الخير يا غازي 🌤️'
                 :           'مساء النور يا غازي 🌙';
  document.getElementById('focus-greeting').textContent = greeting;

  // render top priority card
  const wrap = document.getElementById('focus-card-wrap');
  wrap.innerHTML = '';
  const topCard = renderCard(scenarios[0], 0);
  wrap.appendChild(topCard);
}

function closeFocus(done) {
  document.getElementById('focus-mode').classList.remove('active');
  if (done) markDone(scenarios[0].id);
}

/* ==============================
   INIT
   ============================== */
renderAll();
</script>
